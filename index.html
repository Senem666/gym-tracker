                ["tired", "😴", "Устал сильно", 1],
                ["normal", "😐", "Нормально", 3],
                ["good", "😊", "Бодро", 4],
                ["great", "⚡", "Летаю", 5]
              ].map(([id, emoji, label, energy]) => `
                <button type="button" data-action="recovery-answer" data-feeling="${id}" data-energy="${energy}">
                  <strong>${emoji}</strong>
                  <span>${escapeHtml(label)}</span>
                </button>
              `).join("")}
            </div>
          </section>
        </div>
      `;
    }

    function renderStatsTab() {
      const stats = monthStats();
      const libraryItems = Object.entries(EXERCISES);
      return `
        <div class="layout">
          <section class="stack">
            <div class="panel">
              <div class="section-title">
                <h2>${icon("volume", 22)}Статистика месяца</h2>
                <small>${monthId()}</small>
              </div>
              <div class="stat-grid">
                <div class="stat-tile"><strong>${stats.workouts}</strong><span>тренировок</span></div>
                <div class="stat-tile"><strong>${stats.sets}</strong><span>готовых подходов</span></div>
                <div class="stat-tile"><strong>${stats.volume}</strong><span>кг общего объема</span></div>
              </div>
            </div>

            <div class="panel">
              <div class="section-title">
                <h2>${icon("calendar", 22)}История</h2>
                <small>последние записи</small>
              </div>
              <div class="history-list">
                ${stats.history.length ? stats.history.map(item => `
                  <div class="history-row">
                    <span>
                      <strong>${escapeHtml(item.title)}</strong>
                      <span>${escapeHtml(item.focus)}</span>
                    </span>
                    <span class="pill">${formatDateTime(item.completedAt)}</span>
                  </div>
                `).join("") : `<div class="empty-state">Заверши первую тренировку, и здесь появится история.</div>`}
              </div>
            </div>

            <div class="panel">
              <div class="section-title">
                <h2>${icon("dumbbell", 22)}Библиотека упражнений</h2>
                <small>${libraryItems.length} вариантов</small>
              </div>
              <div class="library-grid">
                ${libraryItems.map(([id, item]) => `
                  <article class="library-item">
                    <span class="pill" style="color:${MUSCLE_COLOR[item.muscles] || "var(--muted)"}">${escapeHtml(item.muscles)}</span>
                    <h3>${escapeHtml(item.name)}</h3>
                    <p>${escapeHtml(item.tip)}</p>
                    <a class="button" href="${escapeAttr(item.video)}" target="_blank" rel="noreferrer">${icon("video")}Техника</a>
                  </article>
                `).join("")}
              </div>
            </div>
          </section>
          <aside class="stack side-column">
            ${renderQuickStats()}
            ${renderIphonePanel()}
            ${renderExportPanel()}
            ${renderNutritionPanel()}
          </aside>
        </div>
      `;
    }

    /* UX Pilot hybrid render layer. These functions intentionally replace the
       earlier v3/v4 visual shell while reusing the same data/actions. */
    function render() {
      const app = document.getElementById("app");
      app.classList.add("gp-root");
      app.classList.toggle("motion-settled", ui.hasMounted);
      if (!userProfile) {
        app.innerHTML = renderOnboarding();
        document.getElementById("floating-root").innerHTML = "";
        bindEvents();
        return;
      }
      app.innerHTML = `
        <section class="gp-shell">
          ${renderPageHeader()}
          ${ui.activeTab === "today" ? renderTodayTab() : ""}
          ${ui.activeTab === "training" ? renderTrainingTab() : ""}
          ${ui.activeTab === "progress" ? renderProgressTab() : ""}
          ${ui.activeTab === "nutrition" ? renderNutritionTab() : ""}
          ${ui.activeTab === "more" ? renderStatsTab() : ""}
          <nav class="gp-bottom-nav" aria-label="Разделы">
            ${tabButton("today", "home", "Сегодня")}
            ${tabButton("training", "dumbbell", "Трен")}
            ${tabButton("progress", "trendingUp", "Прогресс")}
            ${tabButton("nutrition", "apple", "Питание")}
            ${tabButton("more", "more", "Ещё")}
          </nav>
        </section>
      `;
      document.getElementById("floating-root").innerHTML = `${renderPullIndicator()}${renderMiniTimer()}${renderActionSheet()}${ui.celebrating ? renderConfetti() : ""}${renderRecoveryOverlay()}`;
      bindEvents();
      ensureTicker();
      setTimeout(checkSmartReminders, 450);
      if (!ui.hasMounted) {
        ui.hasMounted = true;
        setTimeout(() => app.classList.add("motion-settled"), 240);
      }
    }

    function renderPageHeader() {
      const progress = progressStats();
      const profileName = String(userProfile?.name || "").trim();
      const labels = {
        today: ["Сегодня", profileName ? `Привет, ${escapeHtml(profileName)}` : "Привет"],
        training: ["Тренировка", currentWorkout().focus],
        progress: ["Аналитика", "Прогресс"],
        nutrition: ["Питание", "Вода и энергия"],
        more: ["Gymper", "Настройки"]
      };
      const [kicker, title] = labels[ui.activeTab] || labels.today;
      const date = new Date().toLocaleDateString("ru-RU", { weekday: "long", day: "numeric", month: "long" });
      return `
        <header class="gp-header">
          <div class="gp-header-copy">
            <p>${escapeHtml(ui.activeTab === "today" ? date : kicker)}</p>
            <h1>${title}</h1>
          </div>
          <div class="gp-header-actions">
            <button type="button" class="gp-icon-btn" data-action="open-sheet" data-sheet="reminders" aria-label="Напоминания">${icon("bell", 19, "Напоминания")}</button>
            <div class="gp-streak-pill">${icon("flame", 16, "Стрик")}<strong>${progress.streak}</strong><span>нед</span></div>
          </div>
        </header>
      `;
    }

    function tabButton(id, iconName, label) {
      return `<button type="button" class="gp-nav-item ${ui.activeTab === id ? "active" : ""}" data-action="tab" data-tab="${id}">${icon(iconName, 22, label)}<span>${label}</span></button>`;
    }

    function renderOnboarding() {
      const draft = profileDraft();
      return `
        <section class="gp-shell gp-onboarding-shell">
          <div class="gp-onboarding-mark">${icon("bolt", 34, "Gymper")}</div>
          <div class="gp-card gp-onboarding-card">
            <p class="gp-kicker">Первый запуск</p>
            <h1>Настроим Gymper под твой план</h1>
            <p class="gp-muted">Стрик будет считаться по выбранным дням зала. Все данные хранятся локально и не сбросятся при обновлении.</p>
            <div class="gp-form-grid">
              <label class="gp-input-label">
                <span>Имя</span>
                <input type="text" autocomplete="off" inputmode="text" placeholder="можно пустым" data-profile-field="name" value="${escapeAttr(draft.name)}">
              </label>
              <label class="gp-input-label">
                <span>Вес, кг</span>
                <input type="number" min="0" max="250" step="0.5" inputmode="decimal" autocomplete="off" placeholder="70" data-profile-field="bodyWeight" value="${escapeAttr(draft.bodyWeight)}">
              </label>
            </div>
            <div class="gp-section-head"><h2>Опыт</h2><span>выбери один</span></div>
            <div class="gp-chip-grid">
              ${["Новичок", "После перерыва", "Уверенный", "Продвинутый"].map(item => `
                <button type="button" class="gp-choice ${draft.experience === item ? "active" : ""}" data-action="profile-experience" data-value="${escapeAttr(item)}">${escapeHtml(item)}</button>
              `).join("")}
            </div>
            <div class="gp-section-head"><h2>Дни зала</h2><span>1-7 дней</span></div>
            <div class="gp-week-picker">
              ${WEEKDAYS.map(({ day, short }) => `
                <button type="button" class="${draft.gymDays.includes(Number(day)) ? "active" : ""}" data-action="profile-day" data-day="${day}" aria-label="${escapeAttr(short)}">${escapeHtml(short)}</button>
              `).join("")}
            </div>
            ${ui.profileError ? `<p class="gp-form-error" role="alert">${escapeHtml(ui.profileError)}</p>` : ""}
            <button type="button" class="gp-primary-btn" data-action="save-profile">${icon("check", 18)}Начать</button>
          </div>
        </section>
      `;
    }

    function renderTodayTab() {
      const plan = todayPlan();
      const yoga = todayYogaProgram();
      const gymDayIdx = plan.type === "gym" ? plan.dayIdx : state.dayIdx;
      const workout = PLAN[state.weekIdx].days[gymDayIdx] || currentWorkout();
      const gymProgress = workoutProgress(state.weekIdx, gymDayIdx);
      const home = currentHomeWorkout();
      const homeStats = homeProgress(home);
      const yogaState = yogaDayState(yoga);
      const daily = dailyState();
      const recovery = recoveryScore();
      const game = progressStats();
      const workoutPct = plan.type === "gym" ? gymProgress.pct : plan.type === "home" ? homeStats.pct : yogaState.done ? 100 : 0;
      const schedule = workout.exercises.slice(0, 4).map((item, idx) => {
        const ex = EXERCISES[item.id];
        const done = gymProgress.doneExercises > idx;
        return `<div class="gp-mini-schedule-row ${done ? "done" : ""}"><span></span><b>${idx + 1}</b><p>${escapeHtml(ex?.name || item.id)}</p><em>${item.sets}×${escapeHtml(item.reps)}</em></div>`;
      }).join("");
      return `
        <main class="gp-page gp-today">
          <section class="gp-card gp-readiness-card">
            <div class="gp-readiness-top">
              <div><p class="gp-kicker">Готовность</p><h2>Сегодняшний день</h2></div>
              <span>${escapeHtml(plan.label)}</span>
            </div>
            ${renderReadinessRing(recovery.value, 170)}
            <div class="gp-mini-metrics">
              ${renderMiniMetric("Восстановление", `${recovery.value}%`, "#22c55e")}
              ${renderMiniMetric("Нагрузка", `${Math.min(99, 40 + gymProgress.doneSets * 4)}%`, "#f97316")}
              ${renderMiniMetric("Статус", recovery.value > 70 ? "Высокий" : recovery.value > 45 ? "Норм" : "Легче", "#06b6d4")}
            </div>
          </section>

          <section class="gp-stat-strip">
            ${renderStatTile("Серия", game.streak, "недель", "flame", "#f97316")}
            ${renderStatTile("Вода", daily.water, "/ 6", "hydration", "#06b6d4")}
            ${renderStatTile("Уровень", game.level, escapeHtml(game.levelName), "trophy", "#8B5CF6")}
            ${renderStatTile("Сеты", gymProgress.doneSets, `/ ${gymProgress.totalSets}`, "dumbbell", "#22c55e")}
          </section>

          <section class="gp-card gp-next-card">
            <div class="gp-next-head">
              <div class="gp-icon-orb">${icon("bolt", 20, "Тренировка")}</div>
              <div><p class="gp-kicker">Следующая тренировка</p><h2>${escapeHtml(workout.typeLabel || workout.type)} · ${escapeHtml(workout.focus)}</h2></div>
              <button type="button" class="gp-chevron-btn" data-action="today-open" data-mode="gym" aria-label="Открыть тренировку">${icon("chevron", 19, "Открыть")}</button>
            </div>
            <div class="gp-progress-line"><span style="--bar-scale:${workoutPct / 100}"></span></div>
            <div class="gp-next-meta"><span>${gymProgress.doneSets}/${gymProgress.totalSets} подходов</span><span>~55 мин</span><span>цикл ${state.cycleNumber || 1}</span></div>
            <div class="gp-muscle-chips">
              ${(workout.exercises || []).slice(0, 4).map(item => `<span>${escapeHtml(EXERCISES[item.id]?.muscles || "Мышцы")}</span>`).join("")}
            </div>
            <div class="gp-mini-schedule">${schedule}</div>
            <button type="button" class="gp-primary-btn" data-action="today-open" data-mode="gym">${icon("play", 18)}Начать тренировку</button>
          </section>

          <section class="gp-grid-two">
            <button type="button" class="gp-action-card" data-action="today-open" data-mode="nutrition">
              ${icon("hydration", 22, "Вода")}<strong>Питание</strong><span>${daily.water}/6 воды · белок после</span>
            </button>
            <button type="button" class="gp-action-card" data-action="today-open" data-mode="yoga">
              ${icon("stretch", 22, "Йога")}<strong>Йога</strong><span>${yogaState.done ? "готово" : `${yoga.poses.length} поз`}</span>
            </button>
          </section>

          ${renderGpRecoveryCard()}
          ${renderNutritionPanel()}
        </main>
      `;
    }

    function renderMiniMetric(label, value, color) {
      return `<div style="--metric:${color}"><strong>${escapeHtml(value)}</strong><span>${escapeHtml(label)}</span></div>`;
    }

    function renderStatTile(label, value, unit, iconName, color) {
      return `<div class="gp-stat-tile" style="--tile:${color}">${icon(iconName, 16, label)}<strong>${escapeHtml(value)}</strong><span>${escapeHtml(unit)}</span><em>${escapeHtml(label)}</em></div>`;
    }

    function renderReadinessRing(value, size = 170) {
      const stroke = 8;
      const r = (size - stroke) / 2;
      const c = Math.round(2 * Math.PI * r * 100) / 100;
      const offset = Math.round((c - (Math.max(0, Math.min(100, value)) / 100) * c) * 100) / 100;
      const id = `gp-ring-${size}-${Math.round(value)}`;
      return `
        <div class="gp-ring" style="--ring-size:${size}px">
          <svg viewBox="0 0 ${size} ${size}" aria-hidden="true">
            <defs><linearGradient id="${id}" x1="0" x2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8B5CF6"/></linearGradient></defs>
            <circle cx="${size / 2}" cy="${size / 2}" r="${r}" fill="none" stroke="rgba(139,92,246,.14)" stroke-width="${stroke}"/>
            <circle cx="${size / 2}" cy="${size / 2}" r="${r}" fill="none" stroke="url(#${id})" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${offset}"/>
          </svg>
          <div><strong>${value}</strong><span>/ 100</span></div>
        </div>
      `;
    }

    function renderGpRecoveryCard() {
      const recovery = recoveryScore();
      const muscles = muscleMapForWeek();
      const items = ["Грудь", "Спина", "Плечи", "Ноги"].map(name => {
        const sets = muscles[name]?.sets || 0;
        const value = Math.max(18, 95 - sets * 8);
        const color = value > 70 ? "#22c55e" : value > 45 ? "#f97316" : "#ef4444";
        return `<div class="gp-recovery-row"><span>${escapeHtml(name)}</span><div><i style="--bar-scale:${value / 100};--row:${color}"></i></div><b style="color:${color}">${value}%</b></div>`;
      }).join("");
      return `
        <section class="gp-card gp-recovery-card">
          <div class="gp-section-head"><h2>Карта восстановления</h2><span>${recovery.value}% общее</span></div>
          <div class="gp-recovery-layout">
            <div class="gp-body-mini">${renderBodySvg("front", muscles)}</div>
            <div class="gp-recovery-bars">${items}</div>
          </div>
        </section>
      `;
    }

    function renderTrainingTab() {
      return `
        <main class="gp-page gp-training">
          <div class="gp-segment">
            ${modeButton("gym", "dumbbell", "Зал")}
            ${modeButton("home", "activity", "Дом")}
            ${modeButton("yoga", "stretch", "Йога")}
          </div>
          ${ui.trainingMode === "gym" ? renderWorkoutTab() : ""}
          ${ui.trainingMode === "home" ? renderHomeTrainingTab() : ""}
          ${ui.trainingMode === "yoga" ? renderYogaTrainingTab() : ""}
        </main>
      `;
    }

    function modeButton(id, iconName, label) {
      return `<button type="button" class="${ui.trainingMode === id ? "active" : ""}" data-action="mode" data-mode="${id}">${icon(iconName, 17, label)}<span>${escapeHtml(label)}</span></button>`;
    }

    function renderWorkoutTab() {
      const week = currentWeek();
      const workout = currentWorkout();
      const progress = workoutProgress();
      return `
        <section class="gp-card gp-workout-hero" style="--workout:${workout.color};--pct:${progress.pct}%">
          <div class="gp-workout-hero-top">
            <div><p class="gp-kicker">${escapeHtml(phaseMeta(week).label)} · неделя ${week.week}</p><h2>${escapeHtml(workout.focus)}</h2></div>
            <span>${progress.pct}%</span>
          </div>
          <div class="gp-progress-line"><span style="--bar-scale:${progress.pct / 100}"></span></div>
          <div class="gp-next-meta"><span>${progress.doneExercises}/${progress.totalExercises} упр.</span><span>${progress.doneSets}/${progress.totalSets} подходов</span><span>${escapeHtml(workout.schedule)}</span></div>
        </section>

        <section class="gp-plan-rail" aria-label="Недели программы">
          ${PLAN.map((item, idx) => {
            const total = item.days.length;
            const done = item.days.filter((_, dayIdx) => workoutProgress(idx, dayIdx).doneSets >= workoutProgress(idx, dayIdx).totalSets).length;
            return `<button type="button" class="${idx === state.weekIdx ? "active" : ""}" data-action="week" data-week="${idx}"><strong>${item.week} неделя</strong><span>${escapeHtml(item.label)} · ${done}/${total}</span></button>`;
          }).join("")}
        </section>

        <section class="gp-week-rail">
          ${week.days.map((day, idx) => {
            const p = workoutProgress(state.weekIdx, idx);
            return `<button type="button" class="${idx === state.dayIdx ? "active" : ""}" style="--day:${day.color}" data-action="day" data-day="${idx}"><strong>${day.type}</strong><span>${p.doneSets}/${p.totalSets}</span></button>`;
          }).join("")}
        </section>

        ${renderTimerPanel()}
        ${renderWarmup()}

        <section class="gp-exercise-list">
          <div class="gp-section-head"><h2>Упражнения</h2><span>вес · повторы · RPE</span></div>
          ${workout.exercises.map((item, exIdx) => renderExercise(state.weekIdx, state.dayIdx, exIdx)).join("")}
        </section>

        ${renderStretch()}
        ${renderFinish()}
      `;
    }

    function renderExercise(weekIdx, dayIdx, exIdx) {
      const exData = displayExercise(weekIdx, dayIdx, exIdx);
      const base = prescribedExercise(weekIdx, dayIdx, exIdx);
      const eKey = exerciseKey(weekIdx, dayIdx, exIdx);
      const progress = exerciseProgress(weekIdx, dayIdx, exIdx);
      const expanded = ui.expanded === eKey;
      const muscleColor = MUSCLE_COLOR[exData.muscles] || "#8B5CF6";
      const repsLabel = exData.reps >= 25 && exData.planId === "plank" ? `${exData.reps} сек` : exData.reps;
      return `
        <article class="exercise gp-exercise-card ${expanded ? "expanded" : ""} ${progress.complete ? "done" : ""}" style="--muscle:${muscleColor}">
          <button type="button" class="gp-exercise-head" data-action="expand" data-key="${eKey}">
            <span class="gp-exercise-icon">${icon("dumbbell", 18, "Упражнение")}</span>
            <span class="gp-exercise-copy">
              <strong>${escapeHtml(exData.name)}${exData.isReplacement ? `<em>замена</em>` : ""}</strong>
              <small>${escapeHtml(exData.muscles)} · ${base.sets}×${escapeHtml(repsLabel)} · ${formatTimer(base.restSec)}</small>
            </span>
            <span class="gp-exercise-progress">${progress.done}/${progress.total}</span>
          </button>
          ${expanded ? renderExerciseDetail(weekIdx, dayIdx, exIdx, exData, base) : ""}
        </article>
      `;
    }

    function renderExerciseDetail(weekIdx, dayIdx, exIdx, exData, base) {
      const eKey = exerciseKey(weekIdx, dayIdx, exIdx);
      return `
        <div class="gp-exercise-detail">
          <div class="gp-detail-metrics">
            <div><span>Тренажер</span><strong>${escapeHtml(exData.machine)}</strong></div>
            <div><span>Вес</span><strong>${escapeHtml(compactWeightHint(base.planId))}</strong></div>
            <div><span>Отдых</span><strong>${formatTimer(base.restSec)}</strong></div>
          </div>
          <div class="gp-cue-box"><strong>Техника</strong><p>${escapeHtml(exData.tip)}</p></div>
          <div class="gp-inline-actions">
            <a href="${escapeAttr(exData.video)}" target="_blank" rel="noreferrer">${icon("video", 17)}Видео</a>
            <button type="button" data-action="timer-start" data-seconds="${base.restSec}" data-label="${escapeAttr(exData.name)}">${icon("timer", 17)}Отдых</button>
            ${exData.isReplacement ? `<button type="button" data-action="reset-alt" data-key="${eKey}">${icon("swap", 17)}База</button>` : ""}
          </div>
          <div class="gp-set-list">
            ${Array.from({ length: base.sets }, (_, setIdx) => renderSetRow(weekIdx, dayIdx, exIdx, setIdx, base, exData)).join("")}
          </div>
          <div class="gp-alt-block">
            <div class="gp-section-head"><h3>Если занято</h3><span>${exData.alternatives.length} замены</span></div>
            <div class="gp-alt-grid">
              ${exData.alternatives.map((alt, altIdx) => `
                <button type="button" data-action="choose-alt" data-key="${eKey}" data-alt="${altIdx}">
                  <strong>${escapeHtml(alt.name)}</strong><span>${escapeHtml(alt.machine)}</span>
                </button>
              `).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function compactWeightHint(exerciseId) {
      return isWeightedExercise(exerciseId) ? "по RPE" : "без веса";
    }

    function renderSetRow(weekIdx, dayIdx, exIdx, setIdx, base, exData) {
      const log = getSetLog(weekIdx, dayIdx, exIdx, setIdx);
      const weightValue = log.weight === "" || log.weight === undefined ? "" : log.weight;
      const repsValue = log.reps === "" || log.reps === undefined ? base.reps : log.reps;
      return `
        <div class="gp-set-wrap">
          <div class="set-row gp-set-row ${log.done ? "done" : ""}">
            <button type="button" class="set-check gp-set-check ${log.done ? "done" : ""}" data-action="set-done" data-week="${weekIdx}" data-day="${dayIdx}" data-ex="${exIdx}" data-set="${setIdx}" data-rest="${base.restSec}" data-label="${escapeAttr(exData.name)}" title="Подход готов">${log.done ? icon("check", 16) : ""}</button>
            <span class="gp-set-num">${setIdx + 1}</span>
            <div class="gp-weight-stepper" aria-label="Вес, кг">
              <button type="button" data-action="weight-step" data-week="${weekIdx}" data-day="${dayIdx}" data-ex="${exIdx}" data-set="${setIdx}" data-delta="-2.5" title="-2.5 кг">${icon("minus", 12)}</button>
              <label>
                <input type="number" min="0" max="500" step="0.5" inputmode="decimal" autocomplete="off" placeholder="0" value="${escapeAttr(weightValue)}" data-action="weight" data-week="${weekIdx}" data-day="${dayIdx}" data-ex="${exIdx}" data-set="${setIdx}" aria-label="Вес, кг">
                <span>кг</span>
              </label>
              <button type="button" data-action="weight-step" data-week="${weekIdx}" data-day="${dayIdx}" data-ex="${exIdx}" data-set="${setIdx}" data-delta="2.5" title="+2.5 кг">${icon("plus", 12)}</button>
            </div>
            <label class="gp-reps-pill">
              <input type="number" min="0" max="500" step="1" inputmode="numeric" autocomplete="off" value="${escapeAttr(repsValue)}" data-action="reps" data-week="${weekIdx}" data-day="${dayIdx}" data-ex="${exIdx}" data-set="${setIdx}" aria-label="Повторы">
              <span>${exData.planId === "plank" ? "сек" : "повт"}</span>
            </label>
          </div>
          ${log.done ? renderSetRpe(weekIdx, dayIdx, exIdx, setIdx, log) : ""}

    }

    function renderSetRpe(weekIdx, dayIdx, exIdx, setIdx, log) {
      const selected = log.rpe || "";
      return `
        <div class="gp-rpe-row">
          ${RPE_OPTIONS.map(option => `
            <button type="button" class="${selected === option.id ? "active" : ""}" style="--rpe:${option.color}" data-action="set-rpe" data-week="${weekIdx}" data-day="${dayIdx}" data-ex="${exIdx}" data-set="${setIdx}" data-rpe="${option.id}">
              ${escapeHtml(option.label)}
            </button>
          `).join("")}
        </div>
      `;
    }

    function renderTimerPanel() {
      const timer = state.timer;
      const pct = timer.total ? Math.round((timer.left / timer.total) * 100) : 0;
      return `
        <section class="gp-card gp-timer-card">
          <div class="gp-section-head"><h2>${icon("timer", 19)}Таймер отдыха</h2><span data-timer-status>${timer.running ? "идет" : "пауза"}</span></div>
          <div class="gp-timer-body">
            <div class="gp-timer-ring" data-timer-circle style="--timer-pct:${pct}%"><strong data-timer-time>${formatTimer(timer.left)}</strong></div>
            <div class="gp-timer-copy"><p data-timer-label>${escapeHtml(timer.label || "Отдых между подходами")}</p><span>${timer.running ? "Восстановление..." : "Готов к сету"}</span></div>
          </div>
          <div class="gp-timer-actions">
            <button type="button" data-action="timer-toggle" data-timer-toggle title="${timer.running ? "Пауза" : "Старт"}">${timer.running ? icon("pause", 20, "Пауза") : icon("play", 20, "Старт")}</button>
            <button type="button" data-action="timer-add" data-delta="15" title="+15 секунд">${icon("plus", 16)}</button>
            <button type="button" data-action="timer-add" data-delta="-15" title="-15 секунд">${icon("minus", 16)}</button>
            <button type="button" data-action="timer-reset" title="Сброс">${icon("reset", 20, "Сброс")}</button>
          </div>
        </section>
      `;
    }

    function renderMiniTimer() {
      const timer = state.timer;
      const hidden = !timer.running && (timer.left === timer.total || timer.left === 0);
      return `
        <aside class="mini-timer gp-mini-timer ${hidden ? "is-hidden" : ""}" aria-live="polite" aria-hidden="${hidden ? "true" : "false"}">
          <div><strong data-timer-time>${formatTimer(timer.left)}</strong><span data-timer-label>${escapeHtml(timer.label || "Отдых между подходами")}</span></div>
          <div class="gp-timer-actions">
            <button type="button" data-action="timer-toggle" data-timer-toggle title="${timer.running ? "Пауза" : "Старт"}">${timer.running ? icon("pause", 20, "Пауза") : icon("play", 20, "Старт")}</button>
            <button type="button" data-action="timer-reset" title="Сброс">${icon("reset", 20, "Сброс")}</button>
          </div>
        </aside>
      `;
    }

    function renderWarmup() {
      return `
        <section class="gp-card gp-collapsible-card">
          <button type="button" class="gp-collapsible-head" data-action="toggle-warmup"><span>${icon("activity", 18)}Разминка · 5-7 мин</span><em>${ui.showWarmup ? "Скрыть" : "Открыть"}</em></button>
          ${ui.showWarmup ? `<div class="gp-check-list">${WARMUP.map((item, idx) => renderCheckItem(`${workoutKey()}-warmup-${idx}`, item, "warmup-check", state.warmupDone[`${workoutKey()}-warmup-${idx}`])).join("")}</div>` : ""}
        </section>
      `;
    }

    function renderStretch() {
      const doneCount = STRETCH.filter((_, idx) => state.stretchDone[`${workoutKey()}-stretch-${idx}`]).length;
      return `
        <section class="gp-card gp-collapsible-card">
          <button type="button" class="gp-collapsible-head" data-action="toggle-stretch"><span>${icon("stretch", 18)}Растяжка · ${doneCount}/${STRETCH.length}</span><em>${ui.showStretch ? "Скрыть" : "Открыть"}</em></button>
          ${ui.showStretch ? `<div class="gp-check-list">${STRETCH.map((item, idx) => renderCheckItem(`${workoutKey()}-stretch-${idx}`, item, "stretch-check", state.stretchDone[`${workoutKey()}-stretch-${idx}`])).join("")}</div>` : ""}
        </section>
      `;
    }

    function renderCheckItem(key, text, action, done) {
      return `<div class="gp-check-row"><button type="button" class="check-box gp-check ${done ? "done" : ""}" data-action="${action}" data-key="${escapeAttr(key)}" title="Отметить">${done ? icon("check", 15) : ""}</button><span>${escapeHtml(text)}</span></div>`;
    }

    function renderFinish() {
      const key = workoutKey();
      const progress = workoutProgress();
      const completed = state.completedWorkouts[key];
      const ready = progress.doneSets === progress.totalSets;
      const feelingRecord = state.workoutFeeling[key] || "";
      const feeling = typeof feelingRecord === "string" ? feelingRecord : feelingRecord.feeling || "";
      return `
        <section class="gp-card gp-finish-card">
          <div class="gp-section-head"><h2>Финиш тренировки</h2><span>${completed ? "записано" : `${progress.doneSets}/${progress.totalSets}`}</span></div>
          <div class="gp-chip-grid gp-feeling-grid">
            ${[
              ["great", "отлично", "#22c55e"],
              ["ok", "норм", "#06b6d4"],
              ["tired", "устал", "#f97316"],
              ["pain", "боль", "#ef4444"]
            ].map(([id, label, color]) => `<button type="button" class="gp-choice ${feeling === id ? "active" : ""}" style="--choice:${color}" data-action="feeling" data-key="${key}" data-feeling="${id}">${label}</button>`).join("")}
          </div>
          <button type="button" class="gp-primary-btn ${completed ? "complete" : ""}" data-action="finish" ${ready ? "" : "disabled"}>${icon("check", 18)}${completed ? "Тренировка записана" : "Завершить тренировку"}</button>
          ${completed ? `<button type="button" class="gp-ghost-btn" data-action="share-workout">${icon("download", 18)}Поделиться</button>` : ""}
        </section>
      `;
    }

    function renderHomeTrainingTab() {
      const workout = currentHomeWorkout();
      const progress = homeProgress(workout);
      return `
        <section class="gp-card gp-workout-hero" style="--workout:#06b6d4">
          <div class="gp-workout-hero-top"><div><p class="gp-kicker">Дом · 40/20</p><h2>${escapeHtml(workout.name)}</h2></div><span>${progress.pct}%</span></div>
          <div class="gp-progress-line"><span style="--bar-scale:${progress.pct / 100}"></span></div>
          <div class="gp-next-meta"><span>${escapeHtml(workout.focus)}</span><span>${progress.done}/${progress.total}</span><span>20-30 мин</span></div>
        </section>
        ${Array.from({ length: 3 }, (_, roundIdx) => `
          <section class="gp-card">
            <div class="gp-section-head"><h2>Круг ${roundIdx + 1}</h2><span>40 сек работа</span></div>
            <div class="gp-check-list">
              ${workout.exercises.map((name, exIdx) => {
                const key = homeSetKey(workout.id, roundIdx, exIdx);
                const done = !!state.homeDone[key];
                return `<div class="gp-check-row"><button type="button" class="check-box gp-check ${done ? "done" : ""}" data-action="home-check" data-key="${key}" title="Отметить">${done ? icon("check", 15) : ""}</button><span>${escapeHtml(name)}</span><button type="button" class="gp-small-btn" data-action="home-timer">${icon("timer", 16)}</button></div>`;
              }).join("")}
            </div>
          </section>
        `).join("")}
        <button type="button" class="gp-primary-btn" data-action="home-finish" ${progress.complete ? "" : "disabled"}>${icon("check", 18)}Домашняя тренировка готова</button>
      `;
    }

    function renderYogaTrainingTab() {
      const program = todayYogaProgram();
      const yState = yogaDayState(program);
      const activePose = program.poses[Math.min(yState.poseIdx, program.poses.length - 1)];
      const pct = yState.done ? 100 : Math.round((yState.poseIdx / program.poses.length) * 100);
      return `
        <section class="gp-card gp-workout-hero" style="--workout:#22c55e">
          <div class="gp-workout-hero-top"><div><p class="gp-kicker">Йога · 10-15 мин</p><h2>${escapeHtml(program.name)}</h2></div><span>${pct}%</span></div>
          <div class="gp-progress-line"><span style="--bar-scale:${pct / 100}"></span></div>
        </section>
        <section class="gp-card gp-yoga-focus">
          <div class="gp-icon-orb">${icon(program.icon, 26)}</div>
          <h2>${escapeHtml(activePose ? activePose[0] : "Практика готова")}</h2>
          <div class="gp-inline-actions">
            ${activePose ? `<button type="button" data-action="yoga-start-pose" data-seconds="${activePose[1]}" data-label="${escapeAttr(activePose[0])}">${icon("timer", 17)}${activePose[1]} сек</button>` : ""}
            <button type="button" data-action="yoga-next">${yState.done ? "Сбросить" : "Следующая"}</button>
            <a href="${escapeAttr(program.youtube)}" target="_blank" rel="noreferrer">${icon("video", 17)}Видео</a>
          </div>
        </section>
        <section class="gp-card">
          <div class="gp-check-list">
            ${program.poses.map(([name, seconds], idx) => `<div class="gp-check-row"><button type="button" class="check-box gp-check ${yState.done || idx < yState.poseIdx ? "done" : ""}" data-action="yoga-jump" data-pose="${idx}">${yState.done || idx < yState.poseIdx ? icon("check", 15) : ""}</button><span>${escapeHtml(name)} · ${seconds} сек</span></div>`).join("")}
          </div>
          <button type="button" class="gp-primary-btn" data-action="yoga-finish">${icon("check", 18)}${yState.done ? "Йога записана" : "Завершить йогу"}</button>
        </section>
      `;
    }

    function renderProgressTab() {
      const view = ui.progressView || "volume";
      const progress = progressStats();
      return `
        <main class="gp-page gp-progress">
          <section class="gp-progress-hero">
            <div><p class="gp-kicker">Стрик по плану</p><h2>${progress.streak} недель</h2><span>${progress.xp} XP · уровень ${progress.level}</span></div>
            <div class="gp-reward-orb">${icon("flame", 46, "Стрик")}</div>
          </section>
          <div class="gp-progress-tabs">
            ${[
              ["volume", "Объём"],
              ["body", "Тело"],
              ["records", "PR"],
              ["calendar", "Календарь"]
            ].map(([id, label]) => `<button type="button" class="${view === id ? "active" : ""}" data-action="progress-view" data-view="${id}">${label}</button>`).join("")}
          </div>
          ${view === "volume" ? `${renderVolumeTrendPanel()}${renderWeeklyRingsPanel(progress.activity)}${renderAchievementsPanel(progress)}` : ""}
          ${view === "body" ? `${renderBodyMapPanel()}${renderMuscleMapPanel()}${renderBodyWeightPanel()}` : ""}
          ${view === "records" ? `${renderRecordsPanel()}${renderAchievementsPanel(progress)}` : ""}
          ${view === "calendar" ? `${renderCalendarPanel()}${renderExportPanel()}` : ""}
        </main>
      `;
    }

    function renderVolumeTrendPanel() {
      const trend = volumeTrend(7);
      const max = Math.max(1, ...trend.days.map(day => day.volume));
      return `
        <section class="gp-card gp-volume-card">
          <div class="gp-section-head"><h2>Нагрузка на неделе</h2><span>кг · объём</span></div>
          <div class="gp-stat-strip">
            ${renderStatTile("Объём", trend.totalVolume, "кг", "volume", "#8B5CF6")}
            ${renderStatTile("Подходы", trend.totalSets, "готово", "check", "#22c55e")}
            ${renderStatTile("Лучший", trend.best ? Math.round(trend.best.volume) : 0, "кг", "pr", "#06b6d4")}
          </div>
          <div class="gp-bar-chart">
            ${trend.days.map(day => `<div><span style="--h:${Math.max(6, (day.volume / max) * 100)}%"></span><em>${escapeHtml(day.label)}</em></div>`).join("")}
          </div>
        </section>
      `;
    }

    function renderWeeklyRingsPanel(activity) {
      const rings = [
        { label: "Зал", value: activity.gym, goal: plannedWorkoutGoal(), color: "#8B5CF6" },
        { label: "Дом", value: activity.home, goal: 2, color: "#06b6d4" },
        { label: "Йога", value: activity.yoga, goal: 7, color: "#22c55e" }
      ];
      return `<section class="gp-card"><div class="gp-section-head"><h2>Кольца недели</h2><span>${weekKey()}</span></div><div class="gp-ring-grid">${rings.map(item => {
        const pct = Math.min(100, Math.round((item.value / item.goal) * 100));
        return `<div class="gp-ring-tile" style="--ring-color:${item.color}"><div class="gp-small-ring" style="--pct:${pct}%"><strong>${item.value}/${item.goal}</strong></div><span>${escapeHtml(item.label)}</span></div>`;
      }).join("")}</div></section>`;
    }

    function renderBodyMapPanel() {
      const muscleData = muscleMapForWeek();
      const names = Object.keys(MUSCLE_COLOR);
      const selected = ui.bodyDetail && MUSCLE_COLOR[ui.bodyDetail] ? ui.bodyDetail : names[0];
      const selectedData = muscleData[selected] || { sets: 0, volume: 0 };
      const selectedLoad = Math.min(100, selectedData.sets * 14);
      const selectedStatus = selectedLoad > 75 ? "Усталость" : selectedLoad > 40 ? "Нагрузка" : "Готов";
      return `
        <section class="gp-card gp-body-card">
          <div class="gp-section-head"><h2>Карта восстановления</h2><span>нагрузка недели</span></div>
          <div class="gp-body-stage">
            <div class="gp-body-photo-card"><em>Тело</em>${renderBodySvg("front", muscleData)}</div>
            <div class="gp-body-status">
              <p class="gp-kicker">Статус мышц</p>
              ${names.slice(0, 6).map(name => {
                const item = muscleData[name] || { sets: 0, volume: 0 };
                const load = Math.min(100, item.sets * 14);
                const status = load > 75 ? "Усталость" : load > 40 ? "Нагрузка" : "Готов";
                return `<button type="button" class="${selected === name ? "active" : ""}" data-action="body-muscle" data-muscle="${escapeAttr(name)}"><i style="background:${MUSCLE_COLOR[name]}"></i><span>${escapeHtml(name)}</span><em>${status}</em></button>`;
              }).join("")}
            </div>
          </div>
          <div class="gp-muscle-detail">
            <span><strong>${escapeHtml(selected)}</strong><em>${selectedStatus} · ${selectedData.sets} подходов за 7 дней</em></span>
            <b>${Math.round(selectedData.volume || 0)} кг</b>
          </div>
          <div class="gp-muscle-legend">
            ${names.slice(0, 7).map(name => {
              const item = muscleData[name] || { sets: 0, volume: 0 };
              return `<button type="button" class="${selected === name ? "active" : ""}" data-action="body-muscle" data-muscle="${escapeAttr(name)}"><i style="background:${MUSCLE_COLOR[name]}"></i><span>${escapeHtml(name)}</span><b>${item.sets}</b></button>`;
            }).join("")}
          </div>
        </section>
      `;
    }

    function renderMuscleMapPanel() {
      const muscles = muscleMapForWeek();
      const maxSets = Math.max(1, ...Object.values(muscles).map(item => item.sets));
      return `
        <section class="gp-card">
          <div class="gp-section-head"><h2>Нагрузка по мышцам</h2><span>${weekKey()}</span></div>
          <div class="gp-muscle-bars">
            ${Object.keys(MUSCLE_COLOR).map(name => {
              const item = muscles[name] || { sets: 0, volume: 0 };
              return `<div class="gp-recovery-row"><span>${escapeHtml(name)}</span><div><i style="--bar-scale:${item.sets / maxSets};--row:${MUSCLE_COLOR[name]}"></i></div><b>${item.sets}</b></div>`;
            }).join("")}
          </div>
        </section>
      `;
    }

    function renderAchievementsPanel(progress) {
      const unlocked = new Set(progress.badges);
      return `
        <section class="gp-card gp-achievement-card">
          <div class="gp-section-head"><h2>Достижения</h2><span>${unlocked.size}/${ACHIEVEMENTS.length}</span></div>
          <div class="gp-reward-row">
            ${ACHIEVEMENTS.map(item => `<article class="${unlocked.has(item.id) ? "unlocked" : ""}"><div>${item.iconKey ? icon(item.iconKey, 32, item.title) : escapeHtml(item.icon || "")}</div><strong>${escapeHtml(item.title)}</strong><span>${escapeHtml(item.desc)}</span></article>`).join("")}
          </div>
        </section>
      `;
    }

    function renderRecordsPanel() {
      const records = personalRecords();
      const bestWeight = records.bestWeight;
      const bestReps = records.bestReps;
      return `
        <section class="gp-card">
          <div class="gp-section-head"><h2>PR-рекорды</h2><span>по журналу</span></div>
          <div class="gp-grid-two">
            <div class="gp-record-card"><strong>${bestWeight ? `${bestWeight.weight} кг` : "0 кг"}</strong><span>${bestWeight ? bestWeight.name : "лучший вес"}</span></div>
            <div class="gp-record-card"><strong>${bestReps ? `${bestReps.reps}` : "0"}</strong><span>${bestReps ? bestReps.name : "повторы"}</span></div>
            <div class="gp-record-card"><strong>${records.bestVolume.value} кг</strong><span>${records.bestVolume.label}</span></div>
            <div class="gp-record-card"><strong>${Object.keys(records.byExercise).length}</strong><span>упражнений</span></div>
          </div>
        </section>
      `;
    }

    function renderCalendarPanel() {
      const days = monthCalendar();
      const freezes = freezeUsesThisMonth();
      return `
        <section class="gp-card gp-calendar-card">
          <div class="gp-section-head"><h2>Календарь месяца</h2><span>freeze ${freezes}/2</span></div>
          <div class="gp-calendar-grid">
            ${["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"].map(label => `<b>${label}</b>`).join("")}
            ${days.map(day => `<button type="button" class="${day.status} ${day.isToday ? "today" : ""}" data-action="calendar-day" data-date="${day.key}"><span style="${day.inMonth ? "" : "opacity:.25"}">${day.date.getDate()}</span><em>${calendarDayIcon(day.key)}</em></button>`).join("")}
          </div>
          ${ui.calendarDetail ? renderCalendarDetail(ui.calendarDetail) : ""}
        </section>
      `;
    }

    function renderNutritionTab() {
      return `
        <main class="gp-page gp-nutrition">
          ${renderNutritionPanel()}
          <section class="gp-card">
            <div class="gp-section-head"><h2>Мини-план дня</h2><span>без лишнего шума</span></div>
            <div class="gp-check-list">
              ${["Еда за 1-2 часа до тренировки: нормальная порция.", "Во время тренировки: вода маленькими глотками.", "После: белок и обычная еда.", "Боль в суставе: снизь вес и отметь RPE больно."].map(item => `<div class="gp-check-row static"><span class="check-box gp-check done">${icon("check", 15)}</span><span>${escapeHtml(item)}</span></div>`).join("")}
            </div>
          </section>
          ${renderTimerPanel()}
        </main>
      `;
    }

    function renderNutritionPanel() {
      const daily = dailyState();
      const next = state.reminder.enabled && state.reminder.nextAt ? Math.max(0, Math.ceil((state.reminder.nextAt - Date.now()) / 1000)) : 0;

      return `
        <section class="gp-card gp-nutrition-card">

          <div class="gp-nutrition-top">
            <div><p class="gp-kicker">Калории сегодня</p><strong>${calories}</strong><span>/ 2400 ккал</span></div>
            <div class="gp-small-ring nutrition" style="--pct:${Math.round((calories / 2400) * 100)}%"><strong>${Math.round((calories / 2400) * 100)}%</strong></div>
          </div>
          <div class="gp-macro-list">
            ${[
              ["Белки", 142, 180, "#8B5CF6"],
              ["Жиры", 58, 80, "#f97316"],
              ["Углеводы", 180, 260, "#06b6d4"]
            ].map(([name, value, goal, color]) => `<div><header><span style="--dot:${color}">${name}</span><em>${value} / ${goal} г</em></header><div class="gp-progress-line"><span style="--bar-scale:${Number(value) / Number(goal)};--line:${color}"></span></div></div>`).join("")}
          </div>
          <div class="gp-water-row">

            <button type="button" data-action="water-minus">${icon("minus", 16)}</button>
            <button type="button" data-action="water-plus">${icon("plus", 16)}</button>
          </div>
          <div class="gp-check-list">
            ${nutritionCheck("preMeal", "Еда до тренировки")}
            ${nutritionCheck("postProtein", "Белок после")}
            ${nutritionCheck("creatine", "Вода/креатин по плану")}
          </div>
          <button type="button" class="gp-ghost-btn" data-action="reminder-toggle">${state.reminder.enabled ? `Вода через ${formatTimer(next)}` : "Напоминать про воду"}</button>

    function nutritionCheck(key, label) {
      const daily = dailyState();
      return `<div class="gp-check-row"><button type="button" class="check-box gp-check ${daily[key] ? "done" : ""}" data-action="nutrition" data-key="${key}" title="Отметить">${daily[key] ? icon("check", 15) : ""}</button><span>${escapeHtml(label)}</span></div>`;
    }

    function renderBodyWeightPanel() {
      const entries = [...bodyLog].sort((a, b) => (a.loggedAt || a.date).localeCompare(b.loggedAt || b.date)).slice(-30);
      const latest = [...entries].reverse().slice(0, 4);
      return `
        <section class="gp-card">
          <div class="gp-section-head"><h2>Вес тела</h2><span>локальный журнал</span></div>
          <div class="gp-body-weight-input">
            <input type="number" inputmode="decimal" min="30" max="250" step="0.1" autocomplete="off" placeholder="кг сегодня" id="bodyWeightInput" aria-label="Вес тела сегодня">
            <button type="button" data-action="log-body-weight">${icon("check", 16)}Записать</button>
          </div>
          ${renderWeightChart(entries)}
          <div class="gp-history-list">
            ${latest.length ? latest.map(entry => `<div><strong>${entry.weight} кг</strong><span>${escapeHtml(entry.date || (entry.loggedAt || "").slice(0, 10))}</span></div>`).join("") : `<p class="gp-muted">Запиши вес тела, и здесь появится история.</p>`}
          </div>
        </section>
      `;
    }

    function renderStatsTab() {
      const stats = monthStats();
      const progress = progressStats();
      return `
        <main class="gp-page gp-more">
          <section class="gp-card gp-profile-card">
            <div class="gp-profile-mark">${icon("bolt", 28, "Gymper")}</div>
            <div><p class="gp-kicker">Performance OS</p><h2>Gymper</h2><span>${stats.workouts} тренировок · ${progress.xp} XP</span></div>
          </section>
          <section class="gp-stat-strip">
            ${renderStatTile("Месяц", stats.workouts, "трен.", "calendar", "#8B5CF6")}
            ${renderStatTile("Сеты", stats.sets, "готово", "check", "#22c55e")}
            ${renderStatTile("Объём", stats.volume, "кг", "volume", "#06b6d4")}
            ${renderStatTile("Стрик", progress.streak, "нед", "flame", "#f97316")}
          </section>
          <section class="gp-card gp-menu-group">
            <button type="button" data-action="open-sheet" data-sheet="export">${icon("download", 20)}<span><strong>Экспорт данных</strong><em>JSON, CSV, карточка недели</em></span></button>
            <button type="button" data-action="open-sheet" data-sheet="reminders">${icon("bell", 20)}<span><strong>Напоминания</strong><em>вода и подготовка к залу</em></span></button>
            <button type="button" data-action="tab" data-tab="progress">${icon("activity", 20)}<span><strong>Карта тела</strong><em>нагрузка и восстановление</em></span></button>
            <button type="button" data-action="tab" data-tab="training">${icon("dumbbell", 20)}<span><strong>План тренировок</strong><em>неделя ${currentWeek().week}, цикл ${state.cycleNumber || 1}</em></span></button>
          </section>
          ${renderExportPanel()}
        </main>
      `;
    }

    function renderExportPanel() {
      return `
        <section class="gp-card">
          <div class="gp-section-head"><h2>Бэкап прогресса</h2><span>офлайн-first</span></div>
          <div class="gp-grid-two">
            <button type="button" class="gp-action-card" data-action="open-sheet" data-sheet="export">${icon("download", 22)}<strong>Экспорт</strong><span>JSON/CSV</span></button>
            <button type="button" class="gp-action-card" data-action="open-sheet" data-sheet="reminders">${icon("bell", 22)}<strong>Напоминания</strong><span>PWA-friendly</span></button>
          </div>
        </section>
      `;
    }

    function bindEvents() {
      document.querySelectorAll("[data-action]").forEach(el => {
        const action = el.dataset.action;
        if (action === "weight" || action === "reps") {
          el.addEventListener("change", handleInput);
          el.addEventListener("blur", handleInput);
        } else {
          el.addEventListener("click", handleAction);
        }
      });
    }

    function handleInput(event) {
      const target = event.currentTarget;
      const weekIdx = Number(target.dataset.week);
      const dayIdx = Number(target.dataset.day);
      const exIdx = Number(target.dataset.ex);
      const setIdx = Number(target.dataset.set);
      const field = target.dataset.action === "weight" ? "weight" : "reps";
      const current = getSetLog(weekIdx, dayIdx, exIdx, setIdx);
      if (String(current[field] ?? "") === String(target.value ?? "")) return;
      setLog(weekIdx, dayIdx, exIdx, setIdx, { [field]: target.value });
      saveState();
    }

    function handleAction(event) {
      const target = event.currentTarget;
      const action = target.dataset.action;
      if (action === "sheet-stop") {
        event.stopPropagation();
        return;
      }
      if (action === "open-sheet") {
        ui.sheet = target.dataset.sheet || null;
        render();
        return;
      }
      if (action === "close-sheet") {
        ui.sheet = null;
        render();
        return;
      }
      if (action === "tab") {
        ui.activeTab = target.dataset.tab;
        render();
        scrollToAppTop();
        return;
      }
      if (action === "progress-view") {
        ui.progressView = target.dataset.view || "volume";
        render();
        return;
      }
      if (action === "mode") {
        ui.trainingMode = target.dataset.mode;
        ui.expanded = null;
        render();
        return;
      }
      if (action === "today-open") {
        const mode = target.dataset.mode;
        if (mode === "nutrition") {
          ui.activeTab = "nutrition";
        } else {
          ui.activeTab = "training";
          ui.trainingMode = mode === "rest" ? "yoga" : mode;
          if (mode === "gym" && todayPlan().dayIdx !== undefined) state.dayIdx = todayPlan().dayIdx;
        }
        saveState();
        render();
        scrollToAppTop();
        return;
      }
      if (action === "profile-experience") {
        ui.profileError = "";
        profileDraft().experience = target.dataset.value;
        syncProfileDraftTextFieldsOnly();
        render();
        return;
      }
      if (action === "profile-day") {
        const draft = profileDraft();
        const day = Number(target.dataset.day);
        ui.profileError = "";
        draft.gymDays = draft.gymDays.includes(day) ? draft.gymDays.filter(item => item !== day) : [...draft.gymDays, day].sort();
        syncProfileDraftTextFieldsOnly();
        render();
        return;
      }
      if (action === "save-profile") {
        syncProfileDraftTextFieldsOnly();
        if (!profileDraft().experience) {
          ui.profileError = "Выбери уровень опыта, чтобы Gymper спокойнее подбирал нагрузку.";
          haptic(20);
          render();
          return;
        }
        if (!profileDraft().gymDays.length) {
          ui.profileError = "Выбери хотя бы один день зала. Стрик считается только по твоему плану.";
          haptic(20);
          render();
          return;
        }
        userProfile = {
          ...profileDraft(),
          createdAt: new Date().toISOString(),
          gymDays: sortedGymDays(profileDraft().gymDays)
        };
        ui.profileError = "";
        saveState(true);
        haptic([20, 35, 20]);
        render();
        return;
      }
      if (action === "week") {
        const nextWeekIdx = Number(target.dataset.week);
        mutate(draft => {
          draft.weekIdx = nextWeekIdx;
          draft.dayIdx = 0;
          ui.expanded = null;
        });
        phaseToast(nextWeekIdx);
        return;
      }
      if (action === "day") {
        mutate(draft => {
          draft.dayIdx = Number(target.dataset.day);
          ui.expanded = null;
        });
        return;
      }
      if (action === "expand") {
        ui.expanded = ui.expanded === target.dataset.key ? null : target.dataset.key;
        render();
        return;
      }
      if (action === "toggle-warmup") {
        ui.showWarmup = !ui.showWarmup;
        render();
        return;
      }
      if (action === "toggle-stretch") {
        ui.showStretch = !ui.showStretch;
        render();
        return;
      }
      if (action === "recovery-answer") {
        const payload = {
          type: ui.pendingRecovery?.type || "workout",
          key: ui.pendingRecovery?.key || TODAY_KEY,
          title: ui.pendingRecovery?.title || "Тренировка",
          feeling: target.dataset.feeling,
          energy: Number(target.dataset.energy) || 3,
          loggedAt: new Date().toISOString()
        };
        recoveryLog.push(payload);
        state.workoutFeeling[payload.key] = { feeling: payload.feeling, energy: payload.energy, loggedAt: payload.loggedAt };
        ui.pendingRecovery = null;
        saveState(true);
        showToast("Самочувствие записано", `Восстановление сейчас ${recoveryScore().value}%.`);
        haptic([16, 28, 16]);
        render();
        setTimeout(() => showToast("Следующая тренировка", nextWorkoutPrompt()), 650);
        return;
      }
      if (action === "body-muscle") {
        const muscle = target.dataset.muscle || "Мышца";
        ui.bodyDetail = muscle;
        render();
        return;
      }
      if (action === "calendar-day") {
        ui.calendarDetail = ui.calendarDetail === target.dataset.date ? null : target.dataset.date;
        render();
        return;
      }
      if (action === "warmup-check" || action === "stretch-check") {
        const bucket = action === "warmup-check" ? "warmupDone" : "stretchDone";
        mutate(draft => {
          draft[bucket][target.dataset.key] = !draft[bucket][target.dataset.key];
        });
        haptic();
        return;
      }
      if (action === "home-check") {
        mutate(draft => {
          draft.homeDone[target.dataset.key] = !draft.homeDone[target.dataset.key];
        });
        haptic(12);
        return;
      }
      if (action === "home-timer") {
        startTimer(40, "Домашний подход");
        return;
      }
      if (action === "home-finish") {
        const workout = currentHomeWorkout();
        const progress = homeProgress(workout);
        if (!progress.complete) return;
        const already = workoutLog.some(item => item.type === "home" && item.dateKey === TODAY_KEY && item.workoutId === workout.id);
        if (!already) {
          workoutLog.push({ type: "home", workoutId: workout.id, dateKey: TODAY_KEY, completedAt: new Date().toISOString(), title: workout.name, xp: 90 });
        }
        saveState(true);
        showToast("Дом записан", "+90 XP за домашнюю тренировку.");
        haptic([18, 32, 18]);
        queueRecoveryPrompt("home", `${TODAY_KEY}-${workout.id}`, workout.name);
        render();
        return;
      }
      if (action === "yoga-start-pose") {
        startTimer(Number(target.dataset.seconds), target.dataset.label || "Йога");
        return;
      }
      if (action === "yoga-next") {
        mutate(draft => {
          const program = todayYogaProgram();
          const yState = yogaDayState(program);
          if (yState.done) {
            yState.poseIdx = 0;
            yState.done = false;
          } else {
            yState.poseIdx = Math.min(program.poses.length, yState.poseIdx + 1);
            yState.done = yState.poseIdx >= program.poses.length;
          }
        });
        return;
      }
      if (action === "yoga-jump") {
        mutate(draft => {
          const program = todayYogaProgram();
          const yState = yogaDayState(program);
          yState.poseIdx = Math.min(program.poses.length, Number(target.dataset.pose) + 1);
          yState.done = yState.poseIdx >= program.poses.length;
        });
        return;
      }
      if (action === "yoga-finish") {
        mutate(draft => {
          const program = todayYogaProgram();
          const yState = yogaDayState(program);
          yState.poseIdx = program.poses.length;
          yState.done = true;
          if (!workoutLog.some(item => item.type === "yoga" && item.dateKey === TODAY_KEY)) {
            workoutLog.push({ type: "yoga", dateKey: TODAY_KEY, completedAt: new Date().toISOString(), title: program.name, xp: 35 });
          }
        });
        showToast("Йога записана", "+35 XP и плюс к восстановлению.");
        queueRecoveryPrompt("yoga", `${TODAY_KEY}-yoga`, todayYogaProgram().name);
        return;
      }
      if (action === "feeling") {
        mutate(draft => {
          draft.workoutFeeling[target.dataset.key] = target.dataset.feeling;
        });
        haptic(12);
        return;
      }
      if (action === "choose-alt") {
        mutate(draft => {
          draft.replacements[target.dataset.key] = Number(target.dataset.alt);
        });
        showToast("Замена выбрана", "Упражнение обновлено, подходы сохранятся в этой тренировке.");
        return;
      }
      if (action === "reset-alt") {
        mutate(draft => {
          delete draft.replacements[target.dataset.key];
        });
        return;
      }
      if (action === "timer-start") {
        target.blur?.();
        startTimer(Number(target.dataset.seconds), target.dataset.label || "Отдых");
        return;
      }
      if (action === "timer-toggle") {
        target.blur?.();
        state.timer.running = !state.timer.running;
        if (state.timer.left <= 0) state.timer.left = state.timer.total || 90;
        saveState();
        ensureTicker();
        updateTimerDom();
        return;
      }
      if (action === "timer-add") {
        target.blur?.();
        const next = Math.max(0, state.timer.left + Number(target.dataset.delta));
        state.timer.left = next;
        state.timer.total = Math.max(state.timer.total, next);
        saveState();
        updateTimerDom();
        return;
      }
      if (action === "timer-reset") {
        target.blur?.();
        state.timer.left = state.timer.total || 90;
        state.timer.running = false;
        saveState();
        updateTimerDom();
        return;
      }
      if (action === "set-done") {
        const weekIdx = Number(target.dataset.week);
        const dayIdx = Number(target.dataset.day);
        const exIdx = Number(target.dataset.ex);
        const setIdx = Number(target.dataset.set);
        const rest = Number(target.dataset.rest);
        const label = target.dataset.label || "Отдых";
        const current = getSetLog(weekIdx, dayIdx, exIdx, setIdx);
        const planItem = PLAN[weekIdx].days[dayIdx].exercises[exIdx];
        const row = target.closest(".set-row");
        const weightInput = row?.querySelector('[data-action="weight"]');
        const repsInput = row?.querySelector('[data-action="reps"]');
        const rawWeight = weightInput ? weightInput.value : current.weight;
        const rawReps = repsInput ? repsInput.value : current.reps;
        if (!current.done && isWeightedExercise(planItem.id) && String(rawWeight).trim() === "") {
          const card = target.closest(".exercise");
          card?.classList.remove("shake");
          void card?.offsetWidth;
          card?.classList.add("shake");
          showToast("Сначала вес", "Можно поставить 0 кг, но поле не должно быть пустым.");
          haptic([80, 40, 80]);
          return;
        }
        mutate(draft => {
          setLog(weekIdx, dayIdx, exIdx, setIdx, {
            weight: rawWeight,
            reps: rawReps,
            done: !current.done,
            doneAt: current.done ? "" : new Date().toISOString()
          });
        });
        haptic(current.done ? 10 : [16, 35, 16]);
        if (!current.done) startTimer(rest, label);
        return;
      }
      if (action === "set-rpe") {
        const weekIdx = Number(target.dataset.week);
        const dayIdx = Number(target.dataset.day);
        const exIdx = Number(target.dataset.ex);
        const setIdx = Number(target.dataset.set);
        let result;
        mutate(draft => {
          result = saveSetRpe(weekIdx, dayIdx, exIdx, setIdx, target.dataset.rpe);
        });
        haptic([18, 28, 18]);
        if (result) showToast("RPE сохранен", `${result.option.tip} Ориентир: ${result.recommendation} кг.`);
        return;
      }
      if (action === "weight-step") {
        const weekIdx = Number(target.dataset.week);
        const dayIdx = Number(target.dataset.day);
        const exIdx = Number(target.dataset.ex);
        const setIdx = Number(target.dataset.set);
        const delta = Number(target.dataset.delta);
        const current = getSetLog(weekIdx, dayIdx, exIdx, setIdx);
        const next = Math.max(0, Math.round(((numberValue(current.weight) ?? 0) + delta) * 10) / 10);
        mutate(draft => {
          setLog(weekIdx, dayIdx, exIdx, setIdx, { weight: next });
        });
        return;
      }
      if (action === "rep-minus" || action === "rep-plus") {
        const weekIdx = Number(target.dataset.week);
        const dayIdx = Number(target.dataset.day);
        const exIdx = Number(target.dataset.ex);
        const setIdx = Number(target.dataset.set);
        const current = Number(getSetLog(weekIdx, dayIdx, exIdx, setIdx).reps) || 0;
        mutate(draft => {
          setLog(weekIdx, dayIdx, exIdx, setIdx, { reps: Math.max(0, current + (action === "rep-plus" ? 1 : -1)) });
        });
        return;
      }
      if (action === "water-plus" || action === "water-minus") {
        mutate(draft => {
          const daily = dailyState();
          daily.water = Math.max(0, Math.min(6, daily.water + (action === "water-plus" ? 1 : -1)));
        });
        haptic(10);
        return;
      }
      if (action === "nutrition") {
        mutate(draft => {
          const daily = dailyState();
          daily[target.dataset.key] = !daily[target.dataset.key];
        });
        return;
      }
      if (action === "reminder-toggle") {
        ui.sheet = null;
        mutate(draft => {
          draft.reminder.enabled = !draft.reminder.enabled;
          draft.reminder.intervalMin = 20;
          draft.reminder.nextAt = draft.reminder.enabled ? Date.now() + draft.reminder.intervalMin * 60 * 1000 : 0;
        });
        if (state.reminder.enabled && "Notification" in window && Notification.permission === "default") {
          Notification.requestPermission().catch(() => {});
        }
        return;
      }
      if (action === "training-reminder") {
        ui.sheet = null;
        mutate(draft => {
          draft.trainingReminder.enabled = !draft.trainingReminder.enabled;
          draft.trainingReminder.nextAt = draft.trainingReminder.enabled ? nextTrainingReminderTime() : 0;
        });
        if (state.trainingReminder.enabled && "Notification" in window && Notification.permission === "default") {
          Notification.requestPermission().catch(() => {});
        }
        showToast(state.trainingReminder.enabled ? "Напоминание включено" : "Напоминание выключено", state.trainingReminder.enabled ? "Я напомню за час до ближайшей плановой тренировки, если приложение сможет показать уведомление." : "Ок, больше не трогаю перед залом.");
        return;
      }
      if (action === "freeze-day") {
        event.stopPropagation();
        const key = target.dataset.date;
        if (freezeUsesThisMonth() >= 2) {
          showToast("Лимит freeze", "В этом месяце уже использованы 2 заморозки.");
          return;
        }
        mutate(draft => {
          draft.freezes[key] = { usedAt: new Date().toISOString() };
        });
        showToast("Стрик защищен", "Этот пропуск не будет считаться красным днем.");
        return;
      }
      if (action === "log-body-weight") {
        const input = document.getElementById("bodyWeightInput");
        const val = Number(String(input?.value || "").replace(",", "."));
        if (!Number.isFinite(val) || val < 20 || val > 300) {
          showToast("Неверный вес", "Введи вес в кг, например 70.5");
          return;
        }
        bodyLog.push({ date: TODAY_KEY, weight: Math.round(val * 10) / 10, loggedAt: new Date().toISOString() });
        workoutLog.push({ type: "bodyWeight", dateKey: TODAY_KEY, completedAt: new Date().toISOString(), title: "Вес тела", xp: XP_TABLE.bodyWeightLog });
        if (input) input.value = "";
        saveState(true);
        showToast("Вес записан", `${Math.round(val * 10) / 10} кг · +${XP_TABLE.bodyWeightLog} XP.`);
        render();
        return;
      }
      if (action === "export-json") {
        ui.sheet = null;
        exportJson();
        render();
        return;
      }
      if (action === "export-csv") {
        ui.sheet = null;
        exportCsv();
        render();
        return;
      }
      if (action === "share-workout") {
        generateShareCard(currentWorkoutShareData());
        return;
      }
      if (action === "share-week") {
        ui.sheet = null;
        generateShareCard(weeklyShareData());
        render();
        return;
      }
      if (action === "finish") {
        const key = workoutKey();
        const progress = workoutProgress();
        if (progress.doneSets !== progress.totalSets) return;
        if (state.completedWorkouts[key]) {
          showToast("Уже сохранено", "Эта тренировка уже есть в истории.");
          return;
        }
        ui.celebrating = true;
        mutate(draft => {
          const week = currentWeek();
          const day = currentWorkout();
          draft.completedWorkouts[key] = {
            completedAt: new Date().toISOString(),
            title: `Неделя ${week.week}, тренировка ${day.type}`,
            focus: day.focus,
            feeling: draft.workoutFeeling[key] || "",
            xp: 120 + progress.doneSets * 8
          };
          workoutLog.push({
            type: "gym",
            dateKey: TODAY_KEY,
            completedAt: draft.completedWorkouts[key].completedAt,
            workoutKey: key,
            title: `Неделя ${week.week}, тренировка ${day.type}`,
            focus: day.focus,
            xp: 120 + progress.doneSets * 8
          });
        });
        haptic([25, 40, 25]);
        const cycleClosed = celebrateCycleIfReady();
        if (!cycleClosed) showToast("Тренировка сохранена", `+${120 + progress.doneSets * 8} XP · стрик и PR обновлены.`);
        queueRecoveryPrompt("gym", key, `Неделя ${currentWeek().week}, тренировка ${currentWorkout().type}`);
        setTimeout(() => {
          if (cycleClosed) return;
          ui.celebrating = false;
          render();
        }, 1200);
      }
    }

    function exportJson() {
      const payload = {
        exportedAt: new Date().toISOString(),
        app: "gymper",
        state,
        userProfile,
        exerciseData,
        workoutLog,
        streak: streakStore,
        bodyLog,
        recoveryLog,
        remindersShown
      };
      downloadFile(`gymper-progress-${TODAY_KEY}.json`, JSON.stringify(payload, null, 2), "application/json");
      showToast("JSON готов", "Полный бэкап прогресса скачан.");
    }

    function exportCsv() {
      const rows = [["date", "week", "day", "exercise", "muscle", "set", "weight", "reps", "done"]];
      allSetEntries().forEach(entry => {
        const log = state.logs[entry.setKey];
        if (!log) return;
        rows.push([
          log.doneAt || log.updatedAt || "",
          PLAN[entry.weekIdx].week,
          PLAN[entry.weekIdx].days[entry.dayIdx].type,
          entry.exerciseName,
          entry.muscles,
          entry.setIdx + 1,
          log.weight ?? "",
          log.reps ?? "",
          log.done ? "yes" : "no"
        ]);
      });
      workoutLog.filter(item => item.type === "home" || item.type === "yoga").forEach(item => {
        rows.push([
          item.completedAt || item.date || "",
          "",
          item.type,
          item.title || item.workoutId || item.type,
          "",
          "",
          "",
          "",
          "yes"
        ]);
      });
      const csv = rows.map(row => row.map(cell => `"${String(cell).replaceAll('"', '""')}"`).join(",")).join("\n");
      downloadFile(`gymper-progress-${TODAY_KEY}.csv`, csv, "text/csv");
      showToast("CSV готов", "Таблица подходов скачана.");
    }

    function currentWorkoutShareData() {
      const progress = workoutProgress();
      let volume = 0;
      currentWorkout().exercises.forEach((_, exIdx) => {
        const base = prescribedExercise(state.weekIdx, state.dayIdx, exIdx);
        for (let setIdx = 0; setIdx < base.sets; setIdx++) {
          const log = getSetLog(state.weekIdx, state.dayIdx, exIdx, setIdx);
          if (!log.done) continue;
          const weight = numberValue(log.weight) || 0;
          const reps = numberValue(log.reps) || 0;
          volume += weight * reps;
        }
      });
      return {
        title: `${currentWeek().phaseLabel || phaseMeta().label} · ${currentWorkout().schedule}`,
        doneSets: progress.doneSets,
        totalExercises: progress.totalExercises,
        volume: Math.round(volume),
        xp: XP_TABLE.gymWorkout + progress.doneSets * XP_TABLE.set
      };
    }

    function weeklyShareData() {
      const activity = activityStatsThisWeek();
      const sets = muscleMapForWeek();
      const doneSets = Object.values(sets).reduce((sum, item) => sum + item.sets, 0);
      const volume = Object.values(sets).reduce((sum, item) => sum + item.volume, 0);
      const progress = progressStats();
      return {
        title: "Неделя в Gymper",
        doneSets,
        totalExercises: activity.gym + activity.home + activity.yoga,
        volume: Math.round(volume),
        xp: progress.xp
      };
    }

    function generateShareCard(workoutData) {
      const canvas = document.createElement("canvas");
      canvas.width = 1080;
      canvas.height = 1080;
      const ctx = canvas.getContext("2d");
      if (!ctx) {
        showToast("Canvas недоступен", "Не получилось создать карточку.");
        return;
      }
      ctx.fillStyle = "#101114";
      ctx.fillRect(0, 0, 1080, 1080);
      const grad = ctx.createLinearGradient(0, 0, 0, 420);
      grad.addColorStop(0, "rgba(47,199,121,0.18)");
      grad.addColorStop(1, "rgba(47,199,121,0)");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 1080, 420);
      ctx.fillStyle = "#2fc779";
      ctx.font = "bold 64px system-ui, -apple-system, sans-serif";
      ctx.fillText("Gymper", 80, 120);
      ctx.fillStyle = "#a5a1a0";
      ctx.font = "36px system-ui, -apple-system, sans-serif";
      ctx.fillText(new Date().toLocaleDateString("ru-RU", { day: "numeric", month: "long" }), 80, 175);
      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 180px system-ui, -apple-system, sans-serif";
      ctx.fillText(String(workoutData.doneSets || 0), 80, 400);
      ctx.fillStyle = "#a5a1a0";
      ctx.font = "48px system-ui, -apple-system, sans-serif";
      ctx.fillText("подходов выполнено", 80, 460);
      const stats = [["Упражнений", workoutData.totalExercises || 0], ["Объем", `${workoutData.volume || 0} кг`], ["XP", `+${workoutData.xp || 0}`]];
      stats.forEach(([label, value], idx) => {
        const x = 80 + idx * 330;
        ctx.fillStyle = "#2fc779";
        ctx.font = "bold 60px system-ui, -apple-system, sans-serif";
        ctx.fillText(String(value), x, 620);
        ctx.fillStyle = "#6e6a6b";
        ctx.font = "30px system-ui, -apple-system, sans-serif";
        ctx.fillText(label, x, 665);
      });
      const phrases = ["Каждый подход — шаг вперед.", "Дисциплина важнее мотивации.", "Ты сделал это. Снова.", "Прогресс не бывает случайным."];
      ctx.fillStyle = "#ffffff";
      ctx.font = "italic 40px system-ui, -apple-system, sans-serif";
      ctx.fillText(phrases[Math.floor(Math.random() * phrases.length)], 80, 820);
      ctx.fillStyle = "#a5a1a0";
      ctx.font = "32px system-ui, -apple-system, sans-serif";
      ctx.fillText(workoutData.title || "Тренировка", 80, 900);
      canvas.toBlob(blob => {
        if (!blob) {
          showToast("Ошибка PNG", "Не получилось собрать карточку.");
          return;
        }
        const file = new File([blob], `gymper-${TODAY_KEY}.png`, { type: "image/png" });
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          navigator.share({ title: "Тренировка в Gymper", files: [file] }).catch(() => downloadBlob(file.name, blob, "image/png"));
        } else {
          downloadBlob(file.name, blob, "image/png");
        }
      }, "image/png");
    }

    function downloadFile(name, content, type) {
      const blob = new Blob([content], { type });
      downloadBlob(name, blob, type);
    }

    function downloadBlob(name, blob, type) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = name;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 500);
    }

    function showToast(title, message) {
      const toast = document.getElementById("toast");
      if (!toast) return;
      toast.innerHTML = "";
      toast.classList.remove("show");
      clearTimeout(ui.toastTimer);
    }

    window.addEventListener("pagehide", () => saveState(true));
    document.addEventListener("touchstart", event => {
      if (event.target.closest("input, textarea, button, a")) return;
      const touch = event.changedTouches[0];
      touchStart = { x: touch.clientX, y: touch.clientY };
      ui.pullStartY = window.scrollY <= 0 ? touch.clientY : null;
      ui.pullDistance = 0;
    }, { passive: true });
    document.addEventListener("touchmove", event => {
      if (ui.pullStartY === null || ui.pullStartY === undefined) return;
      const touch = event.changedTouches[0];
      ui.pullDistance = Math.max(0, touch.clientY - ui.pullStartY);
      const indicator = document.getElementById("pull-indicator");
      if (indicator) {
        indicator.classList.toggle("visible", ui.pullDistance > 58);
        indicator.textContent = ui.pullDistance > 118 ? "Отпусти, чтобы обновить" : "Потяни для обновления";
      }
    }, { passive: true });
    document.addEventListener("touchend", event => {
      if (!touchStart) return;
      const touch = event.changedTouches[0];
      const dx = touch.clientX - touchStart.x;
      const dy = touch.clientY - touchStart.y;
      touchStart = null;
      const shouldRefresh = ui.pullDistance > 118;
      ui.pullStartY = null;
      ui.pullDistance = 0;
      document.getElementById("pull-indicator")?.classList.remove("visible");
      if (shouldRefresh) {
        location.reload();
        return;
      }
      if (Math.abs(dx) > 64 && Math.abs(dx) > Math.abs(dy) * 1.4) moveTab(dx < 0 ? 1 : -1);
    }, { passive: true });
    document.addEventListener("contextmenu", event => event.preventDefault());
    document.addEventListener("selectstart", event => {
      if (!event.target.closest("input, textarea")) event.preventDefault();
    });

    clampIndexes();
    render();
    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
