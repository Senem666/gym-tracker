    function bindEvents() {
      document.querySelectorAll("[data-action]").forEach(el => {
        const action = el.dataset.action;
        if (action === "weight" || action === "reps") {
          el.addEventListener("change", handleInput);
          el.addEventListener("blur", handleInput);
        } else {
          el.addEventListener("click", handleAction);
        }
      });
    }

    function handleInput(event) {
      const target = event.currentTarget;
      const weekIdx = Number(target.dataset.week);
      const dayIdx = Number(target.dataset.day);
      const exIdx = Number(target.dataset.ex);
      const setIdx = Number(target.dataset.set);
      const field = target.dataset.action === "weight" ? "weight" : "reps";
      const current = getSetLog(weekIdx, dayIdx, exIdx, setIdx);
      if (String(current[field] ?? "") === String(target.value ?? "")) return;
      setLog(weekIdx, dayIdx, exIdx, setIdx, { [field]: target.value });
      saveState();
    }

    function handleAction(event) {
      const target = event.currentTarget;
      const action = target.dataset.action;
      if (action === "tab") {
        ui.activeTab = target.dataset.tab;
        render();
        return;
      }
      if (action === "mode") {
        ui.trainingMode = target.dataset.mode;
        ui.expanded = null;
        render();
        return;
      }
      if (action === "today-open") {
        const mode = target.dataset.mode;
        if (mode === "nutrition") {
          ui.activeTab = "nutrition";
        } else {
          ui.activeTab = "training";
          ui.trainingMode = mode === "rest" ? "yoga" : mode;
          if (mode === "gym" && todayPlan().dayIdx !== undefined) state.dayIdx = todayPlan().dayIdx;
        }
        saveState();
        render();
        return;
      }
      if (action === "profile-experience") {
        syncProfileDraftFromDom();
        profileDraft().experience = target.dataset.value;
        render();
        return;
      }
      if (action === "profile-day") {
        syncProfileDraftFromDom();
        const draft = profileDraft();
        const day = Number(target.dataset.day);
        draft.gymDays = draft.gymDays.includes(day) ? draft.gymDays.filter(item => item !== day) : [...draft.gymDays, day].sort();
        render();
        return;
      }
      if (action === "save-profile") {
        syncProfileDraftFromDom();
        userProfile = {
          ...profileDraft(),
          createdAt: new Date().toISOString(),
          gymDays: profileDraft().gymDays.length ? profileDraft().gymDays : [1, 3, 5]
        };
        saveState(true);
        haptic([20, 35, 20]);
        showToast("Профиль готов", "План сохранен локально на этом устройстве.");
        render();
        return;
      }
      if (action === "week") {
        const nextWeekIdx = Number(target.dataset.week);
        mutate(draft => {
          draft.weekIdx = nextWeekIdx;
          draft.dayIdx = 0;
          ui.expanded = null;
        });
        phaseToast(nextWeekIdx);
        return;
      }
      if (action === "day") {
        mutate(draft => {
          draft.dayIdx = Number(target.dataset.day);
          ui.expanded = null;
        });
        return;
      }
      if (action === "expand") {
        ui.expanded = ui.expanded === target.dataset.key ? null : target.dataset.key;
        render();
        return;
      }
      if (action === "toggle-warmup") {
        ui.showWarmup = !ui.showWarmup;
        render();
        return;
      }
      if (action === "toggle-stretch") {
        ui.showStretch = !ui.showStretch;
        render();
        return;
      }
      if (action === "recovery-answer") {
        const payload = {
          type: ui.pendingRecovery?.type || "workout",
          key: ui.pendingRecovery?.key || TODAY_KEY,
          title: ui.pendingRecovery?.title || "Тренировка",
          feeling: target.dataset.feeling,
          energy: Number(target.dataset.energy) || 3,
          loggedAt: new Date().toISOString()
        };
        recoveryLog.push(payload);
        state.workoutFeeling[payload.key] = { feeling: payload.feeling, energy: payload.energy, loggedAt: payload.loggedAt };
        ui.pendingRecovery = null;
        saveState(true);
        showToast("Самочувствие записано", `Восстановление сейчас ${recoveryScore().value}%.`);
        haptic([16, 28, 16]);
        render();
        setTimeout(() => showToast("Следующая тренировка", nextWorkoutPrompt()), 650);
        return;
      }
      if (action === "body-muscle") {
        const muscle = target.dataset.muscle || "Мышца";
        const data = muscleMapForWeek()[muscle] || { sets: 0, volume: 0 };
        showToast(muscle, `${data.sets} подходов за 7 дней · объем ${Math.round(data.volume || 0)} кг`);
        return;
      }
      if (action === "calendar-day") {
        ui.calendarDetail = ui.calendarDetail === target.dataset.date ? null : target.dataset.date;
        render();
        return;
      }
      if (action === "warmup-check" || action === "stretch-check") {
        const bucket = action === "warmup-check" ? "warmupDone" : "stretchDone";
        mutate(draft => {
          draft[bucket][target.dataset.key] = !draft[bucket][target.dataset.key];
        });
        haptic();
        return;
      }
      if (action === "home-check") {
        mutate(draft => {
          draft.homeDone[target.dataset.key] = !draft.homeDone[target.dataset.key];
        });
        haptic(12);
        return;
      }
      if (action === "home-timer") {
        startTimer(40, "Домашний подход");
        return;
      }
      if (action === "home-finish") {
        const workout = currentHomeWorkout();
        const progress = homeProgress(workout);
        if (!progress.complete) return;
        const already = workoutLog.some(item => item.type === "home" && item.dateKey === TODAY_KEY && item.workoutId === workout.id);
        if (!already) {
          workoutLog.push({ type: "home", workoutId: workout.id, dateKey: TODAY_KEY, completedAt: new Date().toISOString(), title: workout.name, xp: 90 });
        }
        saveState(true);
        showToast("Дом записан", "+90 XP за домашнюю тренировку.");
        haptic([18, 32, 18]);
        queueRecoveryPrompt("home", `${TODAY_KEY}-${workout.id}`, workout.name);
        render();
        return;
      }
      if (action === "yoga-start-pose") {
        startTimer(Number(target.dataset.seconds), target.dataset.label || "Йога");
        return;
      }
      if (action === "yoga-next") {
        mutate(draft => {
          const program = todayYogaProgram();
          const yState = yogaDayState(program);
          if (yState.done) {
            yState.poseIdx = 0;
            yState.done = false;
          } else {
            yState.poseIdx = Math.min(program.poses.length, yState.poseIdx + 1);
            yState.done = yState.poseIdx >= program.poses.length;
          }
        });
        return;
      }
      if (action === "yoga-jump") {
        mutate(draft => {
          const program = todayYogaProgram();
          const yState = yogaDayState(program);
          yState.poseIdx = Math.min(program.poses.length, Number(target.dataset.pose) + 1);
          yState.done = yState.poseIdx >= program.poses.length;
        });
        return;
      }
      if (action === "yoga-finish") {
        mutate(draft => {
          const program = todayYogaProgram();
          const yState = yogaDayState(program);
          yState.poseIdx = program.poses.length;
          yState.done = true;
          if (!workoutLog.some(item => item.type === "yoga" && item.dateKey === TODAY_KEY)) {
            workoutLog.push({ type: "yoga", dateKey: TODAY_KEY, completedAt: new Date().toISOString(), title: program.name, xp: 35 });
          }
        });
        showToast("Йога записана", "+35 XP и плюс к восстановлению.");
        queueRecoveryPrompt("yoga", `${TODAY_KEY}-yoga`, todayYogaProgram().name);
        return;
      }
      if (action === "feeling") {
        mutate(draft => {
          draft.workoutFeeling[target.dataset.key] = target.dataset.feeling;
        });
        haptic(12);
        return;
      }
      if (action === "choose-alt") {
        mutate(draft => {
          draft.replacements[target.dataset.key] = Number(target.dataset.alt);
        });
        showToast("Замена выбрана", "Упражнение обновлено, подходы сохранятся в этой тренировке.");
        return;
      }
      if (action === "reset-alt") {
        mutate(draft => {
          delete draft.replacements[target.dataset.key];
        });
        return;
      }
      if (action === "timer-start") {
        target.blur?.();
        startTimer(Number(target.dataset.seconds), target.dataset.label || "Отдых");
        return;
      }
      if (action === "timer-toggle") {
        target.blur?.();
        state.timer.running = !state.timer.running;
        if (state.timer.left <= 0) state.timer.left = state.timer.total || 90;
        saveState();
        ensureTicker();
        updateTimerDom();
        return;
      }
      if (action === "timer-add") {
        target.blur?.();
        const next = Math.max(0, state.timer.left + Number(target.dataset.delta));
        state.timer.left = next;
        state.timer.total = Math.max(state.timer.total, next);
        saveState();
        updateTimerDom();
        return;
      }
      if (action === "timer-reset") {
        target.blur?.();
        state.timer.left = state.timer.total || 90;
        state.timer.running = false;
        saveState();
        updateTimerDom();
        return;
      }
      if (action === "set-done") {
        const weekIdx = Number(target.dataset.week);
        const dayIdx = Number(target.dataset.day);
        const exIdx = Number(target.dataset.ex);
        const setIdx = Number(target.dataset.set);
        const rest = Number(target.dataset.rest);
        const label = target.dataset.label || "Отдых";
        const current = getSetLog(weekIdx, dayIdx, exIdx, setIdx);
        const planItem = PLAN[weekIdx].days[dayIdx].exercises[exIdx];
        const row = target.closest(".set-row");
        const weightInput = row?.querySelector('[data-action="weight"]');
        const repsInput = row?.querySelector('[data-action="reps"]');
        const rawWeight = weightInput ? weightInput.value : current.weight;
        const rawReps = repsInput ? repsInput.value : current.reps;
        if (!current.done && isWeightedExercise(planItem.id) && String(rawWeight).trim() === "") {
          const card = target.closest(".exercise");
          card?.classList.remove("shake");
          void card?.offsetWidth;
          card?.classList.add("shake");
          showToast("Сначала вес", "Можно поставить 0 кг, но поле не должно быть пустым.");
          haptic([80, 40, 80]);
          return;
        }
        mutate(draft => {
          setLog(weekIdx, dayIdx, exIdx, setIdx, {
            weight: rawWeight,
            reps: rawReps,
            done: !current.done,
            doneAt: current.done ? "" : new Date().toISOString()
          });
        });
        haptic(current.done ? 10 : [16, 35, 16]);
        if (!current.done) startTimer(rest, label);
        return;
      }
      if (action === "set-rpe") {
        const weekIdx = Number(target.dataset.week);
        const dayIdx = Number(target.dataset.day);
        const exIdx = Number(target.dataset.ex);
        const setIdx = Number(target.dataset.set);
        let result;
        mutate(draft => {
          result = saveSetRpe(weekIdx, dayIdx, exIdx, setIdx, target.dataset.rpe);
        });
        haptic([18, 28, 18]);
        if (result) showToast("RPE сохранен", `${result.option.tip} Ориентир: ${result.recommendation} кг.`);
        return;
      }
      if (action === "weight-step") {
        const weekIdx = Number(target.dataset.week);
        const dayIdx = Number(target.dataset.day);
        const exIdx = Number(target.dataset.ex);
        const setIdx = Number(target.dataset.set);
        const delta = Number(target.dataset.delta);
        const current = getSetLog(weekIdx, dayIdx, exIdx, setIdx);
        const next = Math.max(0, Math.round(((numberValue(current.weight) ?? 0) + delta) * 10) / 10);
        mutate(draft => {
          setLog(weekIdx, dayIdx, exIdx, setIdx, { weight: next });
        });
        return;
      }
      if (action === "rep-minus" || action === "rep-plus") {
        const weekIdx = Number(target.dataset.week);
        const dayIdx = Number(target.dataset.day);
        const exIdx = Number(target.dataset.ex);
        const setIdx = Number(target.dataset.set);
        const current = Number(getSetLog(weekIdx, dayIdx, exIdx, setIdx).reps) || 0;
        mutate(draft => {
          setLog(weekIdx, dayIdx, exIdx, setIdx, { reps: Math.max(0, current + (action === "rep-plus" ? 1 : -1)) });
        });
        return;
      }
      if (action === "water-plus" || action === "water-minus") {
        mutate(draft => {
          const daily = dailyState();
          daily.water = Math.max(0, Math.min(6, daily.water + (action === "water-plus" ? 1 : -1)));
        });
        haptic(10);
        return;
      }
      if (action === "nutrition") {
        mutate(draft => {
          const daily = dailyState();
          daily[target.dataset.key] = !daily[target.dataset.key];
        });
        return;
      }
      if (action === "reminder-toggle") {
        mutate(draft => {
          draft.reminder.enabled = !draft.reminder.enabled;
          draft.reminder.intervalMin = 20;
          draft.reminder.nextAt = draft.reminder.enabled ? Date.now() + draft.reminder.intervalMin * 60 * 1000 : 0;
        });
        if (state.reminder.enabled && "Notification" in window && Notification.permission === "default") {
          Notification.requestPermission().catch(() => {});
        }
        return;
      }
      if (action === "training-reminder") {
        mutate(draft => {
          draft.trainingReminder.enabled = !draft.trainingReminder.enabled;
          draft.trainingReminder.nextAt = draft.trainingReminder.enabled ? nextTrainingReminderTime() : 0;
        });
        if (state.trainingReminder.enabled && "Notification" in window && Notification.permission === "default") {
          Notification.requestPermission().catch(() => {});
        }
        showToast(state.trainingReminder.enabled ? "Напоминание включено" : "Напоминание выключено", state.trainingReminder.enabled ? "Я напомню за час до ближайшей плановой тренировки, если приложение сможет показать уведомление." : "Ок, больше не трогаю перед залом.");
        return;
      }
      if (action === "freeze-day") {
        event.stopPropagation();
        const key = target.dataset.date;
        if (freezeUsesThisMonth() >= 2) {
          showToast("Лимит freeze", "В этом месяце уже использованы 2 заморозки.");
          return;
        }
        mutate(draft => {
          draft.freezes[key] = { usedAt: new Date().toISOString() };
        });
        showToast("Стрик защищен", "Этот пропуск не будет считаться красным днем.");
        return;
      }
      if (action === "log-body-weight") {
        const input = document.getElementById("bodyWeightInput");
        const val = Number(String(input?.value || "").replace(",", "."));
        if (!Number.isFinite(val) || val < 20 || val > 300) {
          showToast("Неверный вес", "Введи вес в кг, например 70.5");
          return;
        }
        bodyLog.push({ date: TODAY_KEY, weight: Math.round(val * 10) / 10, loggedAt: new Date().toISOString() });
        workoutLog.push({ type: "bodyWeight", dateKey: TODAY_KEY, completedAt: new Date().toISOString(), title: "Вес тела", xp: XP_TABLE.bodyWeightLog });
        if (input) input.value = "";
        saveState(true);
        showToast("Вес записан", `${Math.round(val * 10) / 10} кг · +${XP_TABLE.bodyWeightLog} XP.`);
        render();
        return;
      }
      if (action === "export-json") {
        exportJson();
        return;
      }
      if (action === "export-csv") {
        exportCsv();
        return;
      }
      if (action === "share-workout") {
        generateShareCard(currentWorkoutShareData());
        return;
      }
      if (action === "share-week") {
        generateShareCard(weeklyShareData());
        return;
      }
      if (action === "finish") {
        const key = workoutKey();
        const progress = workoutProgress();
        if (progress.doneSets !== progress.totalSets) return;
        if (state.completedWorkouts[key]) {
          showToast("Уже сохранено", "Эта тренировка уже есть в истории.");
          return;
        }
        ui.celebrating = true;
        mutate(draft => {
          const week = currentWeek();
          const day = currentWorkout();
          draft.completedWorkouts[key] = {
            completedAt: new Date().toISOString(),
            title: `Неделя ${week.week}, тренировка ${day.type}`,
            focus: day.focus,
            feeling: draft.workoutFeeling[key] || "",
            xp: 120 + progress.doneSets * 8
          };
          workoutLog.push({
            type: "gym",
            dateKey: TODAY_KEY,
            completedAt: draft.completedWorkouts[key].completedAt,
            workoutKey: key,
            title: `Неделя ${week.week}, тренировка ${day.type}`,
            focus: day.focus,
            xp: 120 + progress.doneSets * 8
          });
        });
        haptic([25, 40, 25]);
        const cycleClosed = celebrateCycleIfReady();
        if (!cycleClosed) showToast("Тренировка сохранена", `+${120 + progress.doneSets * 8} XP · стрик и PR обновлены.`);
        queueRecoveryPrompt("gym", key, `Неделя ${currentWeek().week}, тренировка ${currentWorkout().type}`);
        setTimeout(() => {
          if (cycleClosed) return;
          ui.celebrating = false;
          render();
        }, 1200);
      }
    }

    function exportJson() {
      const payload = {
        exportedAt: new Date().toISOString(),
        app: "gymper",
        state,
        userProfile,
        exerciseData,
        workoutLog,
        streak: streakStore,
        bodyLog,
        recoveryLog,
        remindersShown
      };
      downloadFile(`gymper-progress-${TODAY_KEY}.json`, JSON.stringify(payload, null, 2), "application/json");
      showToast("JSON готов", "Полный бэкап прогресса скачан.");
    }

    function exportCsv() {
      const rows = [["date", "week", "day", "exercise", "muscle", "set", "weight", "reps", "done"]];
      allSetEntries().forEach(entry => {
        const log = state.logs[entry.setKey];
        if (!log) return;
        rows.push([
          log.doneAt || log.updatedAt || "",
          PLAN[entry.weekIdx].week,
          PLAN[entry.weekIdx].days[entry.dayIdx].type,
          entry.exerciseName,
          entry.muscles,
          entry.setIdx + 1,
          log.weight ?? "",
          log.reps ?? "",
          log.done ? "yes" : "no"
        ]);
      });
      workoutLog.filter(item => item.type === "home" || item.type === "yoga").forEach(item => {
        rows.push([
          item.completedAt || item.date || "",
          "",
          item.type,
          item.title || item.workoutId || item.type,
          "",
          "",
          "",
          "",
          "yes"
        ]);
      });
      const csv = rows.map(row => row.map(cell => `"${String(cell).replaceAll('"', '""')}"`).join(",")).join("\n");
      downloadFile(`gymper-progress-${TODAY_KEY}.csv`, csv, "text/csv");
      showToast("CSV готов", "Таблица подходов скачана.");
    }

    function currentWorkoutShareData() {
      const progress = workoutProgress();
      let volume = 0;
      currentWorkout().exercises.forEach((_, exIdx) => {
        const base = prescribedExercise(state.weekIdx, state.dayIdx, exIdx);
        for (let setIdx = 0; setIdx < base.sets; setIdx++) {
          const log = getSetLog(state.weekIdx, state.dayIdx, exIdx, setIdx);
          if (!log.done) continue;
          const weight = numberValue(log.weight) || 0;
          const reps = numberValue(log.reps) || 0;
          volume += weight * reps;
        }
      });
      return {
        title: `${currentWeek().phaseLabel || phaseMeta().label} · ${currentWorkout().schedule}`,
        doneSets: progress.doneSets,
        totalExercises: progress.totalExercises,
        volume: Math.round(volume),
        xp: XP_TABLE.gymWorkout + progress.doneSets * XP_TABLE.set
      };
    }

    function weeklyShareData() {
      const activity = activityStatsThisWeek();
      const sets = muscleMapForWeek();
      const doneSets = Object.values(sets).reduce((sum, item) => sum + item.sets, 0);
      const volume = Object.values(sets).reduce((sum, item) => sum + item.volume, 0);
      const progress = progressStats();
      return {
        title: "Неделя в Gymper",
        doneSets,
        totalExercises: activity.gym + activity.home + activity.yoga,
        volume: Math.round(volume),
        xp: progress.xp
      };
    }

    function generateShareCard(workoutData) {
      const canvas = document.createElement("canvas");
      canvas.width = 1080;
      canvas.height = 1080;
      const ctx = canvas.getContext("2d");
      if (!ctx) {
        showToast("Canvas недоступен", "Не получилось создать карточку.");
        return;
      }
      ctx.fillStyle = "#101114";
      ctx.fillRect(0, 0, 1080, 1080);
      const grad = ctx.createLinearGradient(0, 0, 0, 420);
      grad.addColorStop(0, "rgba(47,199,121,0.18)");
      grad.addColorStop(1, "rgba(47,199,121,0)");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 1080, 420);
      ctx.fillStyle = "#2fc779";
      ctx.font = "bold 64px system-ui, -apple-system, sans-serif";
      ctx.fillText("Gymper", 80, 120);
      ctx.fillStyle = "#a5a1a0";
      ctx.font = "36px system-ui, -apple-system, sans-serif";
      ctx.fillText(new Date().toLocaleDateString("ru-RU", { day: "numeric", month: "long" }), 80, 175);
      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 180px system-ui, -apple-system, sans-serif";
      ctx.fillText(String(workoutData.doneSets || 0), 80, 400);
      ctx.fillStyle = "#a5a1a0";
      ctx.font = "48px system-ui, -apple-system, sans-serif";
      ctx.fillText("подходов выполнено", 80, 460);
      const stats = [["Упражнений", workoutData.totalExercises || 0], ["Объем", `${workoutData.volume || 0} кг`], ["XP", `+${workoutData.xp || 0}`]];
      stats.forEach(([label, value], idx) => {
        const x = 80 + idx * 330;
        ctx.fillStyle = "#2fc779";
        ctx.font = "bold 60px system-ui, -apple-system, sans-serif";
        ctx.fillText(String(value), x, 620);
        ctx.fillStyle = "#6e6a6b";
        ctx.font = "30px system-ui, -apple-system, sans-serif";
        ctx.fillText(label, x, 665);
      });
      const phrases = ["Каждый подход — шаг вперед.", "Дисциплина важнее мотивации.", "Ты сделал это. Снова.", "Прогресс не бывает случайным."];
      ctx.fillStyle = "#ffffff";
      ctx.font = "italic 40px system-ui, -apple-system, sans-serif";
      ctx.fillText(phrases[Math.floor(Math.random() * phrases.length)], 80, 820);
      ctx.fillStyle = "#a5a1a0";
      ctx.font = "32px system-ui, -apple-system, sans-serif";
      ctx.fillText(workoutData.title || "Тренировка", 80, 900);
      canvas.toBlob(blob => {
        if (!blob) {
          showToast("Ошибка PNG", "Не получилось собрать карточку.");
          return;
        }
        const file = new File([blob], `gymper-${TODAY_KEY}.png`, { type: "image/png" });
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          navigator.share({ title: "Тренировка в Gymper", files: [file] }).catch(() => downloadBlob(file.name, blob, "image/png"));
        } else {
          downloadBlob(file.name, blob, "image/png");
        }
      }, "image/png");
    }

    function downloadFile(name, content, type) {
      const blob = new Blob([content], { type });
      downloadBlob(name, blob, type);
    }

    function downloadBlob(name, blob, type) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = name;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 500);
    }

    function showToast(title, message) {
      const toast = document.getElementById("toast");
      toast.innerHTML = `<strong>${escapeHtml(title)}</strong><span>${escapeHtml(message)}</span>`;
      toast.classList.add("show");
      clearTimeout(ui.toastTimer);
      ui.toastTimer = setTimeout(() => toast.classList.remove("show"), 4200);
    }

    window.addEventListener("pagehide", () => saveState(true));
    document.addEventListener("touchstart", event => {
      if (event.target.closest("input, textarea, button, a")) return;
      const touch = event.changedTouches[0];
      touchStart = { x: touch.clientX, y: touch.clientY };
      ui.pullStartY = window.scrollY <= 0 ? touch.clientY : null;
      ui.pullDistance = 0;
    }, { passive: true });
    document.addEventListener("touchmove", event => {
      if (ui.pullStartY === null || ui.pullStartY === undefined) return;
      const touch = event.changedTouches[0];
      ui.pullDistance = Math.max(0, touch.clientY - ui.pullStartY);
      const indicator = document.getElementById("pull-indicator");
      if (indicator) {
        indicator.classList.toggle("visible", ui.pullDistance > 58);
        indicator.textContent = ui.pullDistance > 118 ? "Отпусти, чтобы обновить" : "Потяни для обновления";
      }
    }, { passive: true });
    document.addEventListener("touchend", event => {
      if (!touchStart) return;
      const touch = event.changedTouches[0];
      const dx = touch.clientX - touchStart.x;
      const dy = touch.clientY - touchStart.y;
      touchStart = null;
      const shouldRefresh = ui.pullDistance > 118;
      ui.pullStartY = null;
      ui.pullDistance = 0;
      document.getElementById("pull-indicator")?.classList.remove("visible");
      if (shouldRefresh) {
        location.reload();
        return;
      }
      if (Math.abs(dx) > 64 && Math.abs(dx) > Math.abs(dy) * 1.4) moveTab(dx < 0 ? 1 : -1);
    }, { passive: true });
    document.addEventListener("contextmenu", event => event.preventDefault());
    document.addEventListener("selectstart", event => {
      if (!event.target.closest("input, textarea")) event.preventDefault();
    });

    clampIndexes();
    render();
    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
