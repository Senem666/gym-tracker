<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Gymper</title>
  <meta name="theme-color" content="#07080a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gymper" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="gym-icon.svg" type="image/svg+xml" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #07080a;
      --surface: #14171d;
      --surface-2: #1d2129;
      --surface-3: #262b35;
      --ivory: #f8f3e8;
      --ivory-2: #fffaf0;
      --ivory-3: #eee6d7;
      --ink: #171819;
      --ink-muted: #5f5a52;
      --ink-dim: #8a8378;
      --card-line: rgba(23, 24, 25, 0.1);
      --line: rgba(255, 255, 255, 0.09);
      --line-strong: rgba(255, 255, 255, 0.16);
      --text: #f2f0eb;
      --muted: #a5a1a0;
      --dim: #6e6a6b;
      --green: #2fc779;
      --red: #ef5350;
      --amber: #f3a928;
      --cyan: #32b6d8;
      --violet: #8a72e8;
      --pink: #e85c9f;
      --blue: #5f8fe8;
      --gold: #ffd166;
      --radius: 8px;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
      --soft-shadow: 0 18px 42px rgba(0, 0, 0, 0.16);
      --card-shadow: 0 10px 30px rgba(11, 12, 14, 0.1);
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
      --ease-spring: cubic-bezier(0.2, 0.9, 0.22, 1.08);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    html {
      min-width: 320px;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.045), transparent 250px),
        linear-gradient(135deg, rgba(47, 199, 121, 0.08), transparent 42%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      user-select: none;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button,
    a.button {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--text);
      cursor: pointer;
      line-height: 1.18;
      transition: transform 150ms var(--ease-out), border-color 180ms ease, background 180ms ease, color 180ms ease, box-shadow 180ms ease;
      text-decoration: none;
    }

    button:active,
    a.button:active {
      transform: scale(0.97);
    }

    @media (hover: hover) and (pointer: fine) {
      button:hover,
      a.button:hover {
        border-color: var(--line-strong);
        background: var(--surface-3);
      }
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.46;
    }

    input[type="number"],
    input[type="text"] {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #111217;
      color: var(--text);
      padding: 10px 9px;
      outline: none;
      user-select: text;
    }

    input[type="number"]:focus,
    input[type="text"]:focus {
      border-color: rgba(47, 199, 121, 0.56);
    }

    .app-shell {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: calc(22px + env(safe-area-inset-top)) 0 calc(120px + env(safe-area-inset-bottom));
      animation: appEnter 240ms var(--ease-out) both;
    }

    .app-shell.motion-settled {
      animation: none;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      padding: 18px 0 16px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(28px, 4vw, 50px);
      line-height: 0.98;
      font-weight: 850;
      letter-spacing: 0;
    }

    .top-copy {
      margin-top: 10px;
      color: var(--muted);
      max-width: 620px;
      line-height: 1.55;
      font-size: 15px;
    }

    .month-stat {
      display: grid;
      min-width: 178px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.035);
      box-shadow: var(--shadow);
    }

    .month-stat strong {
      color: var(--green);
      font-size: 34px;
      line-height: 1;
    }

    .month-stat span {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .nav-tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin: 18px 0 16px;
    }

    .nav-tabs button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 12px;
      color: var(--muted);
      font-weight: 750;
    }

    .nav-tabs button.active {
      color: var(--text);
      border-color: rgba(47, 199, 121, 0.56);
      background: rgba(47, 199, 121, 0.14);
    }

    .nav-tabs button.active::after,
    .mode-tabs button.active::after {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 5px;
      height: 2px;
      border-radius: 999px;
      background: var(--green);
      animation: tabLine 220ms ease both;
    }

    .nav-tabs button,
    .mode-tabs button {
      position: relative;
    }

    .icon {
      width: 18px;
      height: 18px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      overflow: hidden;
    }

    .icon svg {
      width: 100%;
      height: 100%;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 350px;
      gap: 16px;
      align-items: start;
      animation: tabIn 220ms ease both;
    }

    .onboarding {
      min-height: calc(100vh - 80px);
      display: grid;
      place-items: center;
      padding: 22px 0;
    }

    .onboarding > .panel {
      width: min(620px, 100%);
    }

    .onboarding-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .mode-shell {
      margin-bottom: 14px;
      animation: tabIn 220ms ease both;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .mode-tabs button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 46px;
      color: var(--muted);
      font-weight: 800;
    }

    .mode-tabs button.active {
      color: var(--text);
      border-color: rgba(50, 182, 216, 0.48);
      background: rgba(50, 182, 216, 0.12);
    }

    .today-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .today-card {
      --surface: var(--ivory);
      --surface-2: var(--ivory-2);
      --text: var(--ink);
      --muted: var(--ink-muted);
      --line: var(--card-line);
      width: 100%;
      min-height: 126px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 11px;
      align-items: start;
      padding: 12px;
      text-align: left;
      border-color: color-mix(in srgb, var(--accent), transparent 62%);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent), transparent 86%), transparent 62%),
        var(--surface);
      color: var(--text);
      box-shadow: var(--card-shadow);
    }

    .today-card .muscle-dot {
      --muscle: var(--accent);
    }

    .today-card strong,
    .today-card span,
    .today-card em {
      display: block;
      min-width: 0;
    }

    .today-card strong {
      font-size: 16px;
      line-height: 1.25;
    }

    .today-card span span {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .today-card em {
      margin-top: 8px;
      color: color-mix(in srgb, var(--accent), black 16%);
      font-size: 12px;
      font-style: normal;
      font-weight: 800;
    }

    .today-command-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .today-command-chip {
      min-width: 0;
      padding: 9px;
      border: 1px solid rgba(23, 24, 25, 0.08);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.36);
    }

    .today-command-chip strong {
      display: block;
      color: var(--ink);
      font-size: 17px;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .today-command-chip span {
      display: block;
      margin-top: 5px;
      color: var(--ink-muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .recovery-bar {
      --text: var(--ink);
      --muted: var(--ink-muted);
      --line: var(--card-line);
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 9px;
      align-items: center;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--ivory);
      color: var(--muted);
      font-size: 12px;
      box-shadow: var(--card-shadow);
    }

    .recovery-bar.warning {
      border-color: rgba(239, 83, 80, 0.36);
      background: rgba(239, 83, 80, 0.08);
    }

    .recovery-track {
      height: 8px;
      border-radius: 999px;
      background: rgba(23, 24, 25, 0.09);
      overflow: hidden;
    }

    .recovery-fill {
      height: 100%;
      border-radius: inherit;
      transition: width 420ms ease;
    }

    .recovery-value,
    .recovery-label {
      font-weight: 800;
      white-space: nowrap;
    }

    .recovery-bar small {
      grid-column: 1 / -1;
      color: var(--red);
      line-height: 1.35;
    }

    .recovery-overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 16px;
      background: rgba(0, 0, 0, 0.42);
      z-index: 25;
      animation: toastIn 220ms ease both;
    }

    .recovery-card {
      width: min(420px, 100%);
      box-shadow: var(--shadow);
    }

    .recovery-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .recovery-options button {
      display: grid;
      gap: 4px;
      justify-items: center;
      min-height: 78px;
      padding: 10px;
    }

    .recovery-options strong {
      font-size: 24px;
      line-height: 1;
    }

    .recovery-options span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    .home-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    .home-row:last-child {
      border-bottom: 0;
    }

    .yoga-focus {
      display: grid;
      gap: 12px;
      justify-items: start;
      overflow: hidden;
    }

    .yoga-focus h2 {
      font-size: 26px;
      line-height: 1.1;
    }

    .yoga-icon {
      width: 70px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 18px;
      border: 1px solid rgba(47, 199, 121, 0.28);
      background: rgba(47, 199, 121, 0.1);
      color: var(--green);
      animation: breathe 2200ms ease-in-out infinite;
      will-change: transform, opacity;
    }

    .yoga-icon svg {
      width: 34px;
      height: 34px;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .panel,
    .exercise,
    .set-row,
    .history-row {
      --surface: var(--ivory);
      --surface-2: var(--ivory-2);
      --surface-3: var(--ivory-3);
      --line: var(--card-line);
      --line-strong: rgba(23, 24, 25, 0.18);
      --text: var(--ink);
      --muted: var(--ink-muted);
      --dim: var(--ink-dim);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--card-shadow);
    }

    .panel {
      padding: 14px;
      animation: riseIn 240ms var(--ease-out) both;
    }

    .panel button:not(.finish-button),
    .panel a.button,
    .exercise button:not(.exercise-main):not(.set-check),
    .set-row button:not(.set-check) {
      background: rgba(23, 24, 25, 0.045);
      color: var(--ink);
      border-color: rgba(23, 24, 25, 0.1);
    }

    .panel button:not(.finish-button):active,
    .panel a.button:active,
    .exercise button:not(.exercise-main):not(.set-check):active,
    .set-row button:not(.set-check):active {
      background: rgba(23, 24, 25, 0.075);
    }

    .panel input[type="number"],
    .panel input[type="text"],
    .exercise input[type="number"],
    .exercise input[type="text"],
    .set-row input[type="number"],
    .set-row input[type="text"] {
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      border-color: rgba(23, 24, 25, 0.12);
    }

    .app-shell.motion-settled .panel,
    .app-shell.motion-settled .exercise,
    .app-shell.motion-settled .workout-head,
    .app-shell.motion-settled .progress-hero {
      animation: none;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title h2,
    .section-title h3 {
      font-size: 15px;
      line-height: 1.25;
      font-weight: 830;
    }

    .section-title small,
    .subtle {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .phase-grid {
      display: grid;
      gap: 10px;
    }

    .phase-group {
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(23, 24, 25, 0.03);
    }

    .phase-group.active {
      border-color: rgba(47, 199, 121, 0.34);
      background: rgba(47, 199, 121, 0.1);
    }

    .phase-group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .phase-group-head strong,
    .phase-group-head span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .phase-group-head span {
      color: var(--dim);
      font-weight: 700;
    }

    .week-card {
      min-height: 82px;
      padding: 9px;
      text-align: left;
      background: var(--surface);
      overflow: hidden;
    }

    .week-card.active {
      border-color: rgba(47, 199, 121, 0.58);
      background: rgba(47, 199, 121, 0.11);
      box-shadow: 0 0 0 1px rgba(47, 199, 121, 0.08), 0 14px 34px rgba(47, 199, 121, 0.08);
    }

    .week-card .num {
      display: block;
      font-size: 24px;
      font-weight: 850;
      line-height: 1;
    }

    .week-card .label {
      display: -webkit-box;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      overflow: hidden;
      line-height: 1.18;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .tiny-bar {
      height: 4px;
      margin-top: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(23, 24, 25, 0.08);
    }

    .tiny-bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--green);
      transition: width 420ms ease;
    }

    .day-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .day-card {
      min-height: 84px;
      padding: 10px;
      text-align: left;
      background: var(--surface);
    }

    .day-card.active {
      background: color-mix(in srgb, var(--accent), transparent 88%);
      border-color: color-mix(in srgb, var(--accent), transparent 42%);
      box-shadow: 0 10px 30px color-mix(in srgb, var(--accent), transparent 88%);
    }

    .day-card strong {
      display: block;
      font-size: 18px;
    }

    .day-card span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .workout-head {
      --text: var(--ink);
      --muted: var(--ink-muted);
      --dim: var(--ink-dim);
      --line: var(--card-line);
      --surface: var(--ivory);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 16px;
      border: 1px solid color-mix(in srgb, var(--accent), transparent 68%);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent), transparent 84%), transparent 64%),
        var(--ivory);
      color: var(--ink);
      box-shadow: var(--soft-shadow);
      animation: riseIn 240ms var(--ease-out) both;
    }

    .workout-head h2 {
      font-size: 22px;
      line-height: 1.12;
    }

    .workout-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      max-width: 100%;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(23, 24, 25, 0.045);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .progress-ring {
      width: 82px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: conic-gradient(var(--accent) var(--pct), rgba(23, 24, 25, 0.08) 0);
      position: relative;
      color: var(--text);
      font-size: 20px;
      font-weight: 850;
      transition: background 420ms ease;
    }

    .progress-ring::before {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: inherit;
      background: var(--surface);
    }

    .progress-ring span {
      position: relative;
    }

    .collapsible {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      text-align: left;
      background: var(--surface);
    }

    .check-list {
      display: grid;
      gap: 8px;
    }

    .check-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      line-height: 1.45;
      font-size: 13px;
    }

    .check-item:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .check-box {
      width: 32px;
      min-width: 32px;
      height: 32px;
      min-height: 32px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.18)),
        rgba(23, 24, 25, 0.055);
      color: transparent;
      cursor: pointer;
      margin-top: 0;
      padding: 0;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24);
      transition: transform 150ms var(--ease-out), background 180ms ease, border-color 180ms ease, color 180ms ease, box-shadow 180ms ease;
    }

    .check-box svg {
      width: 17px;
      height: 17px;
    }

    .check-box:active {
      transform: scale(0.94);
    }

    .check-box.done {
      border-color: var(--green);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0)),
        var(--green);
      color: #07140d;
      box-shadow: 0 8px 18px rgba(47, 199, 121, 0.2);
      animation: checkPop 260ms var(--ease-spring);
    }

    .exercise {
      overflow: hidden;
      background: var(--surface);
      animation: riseIn 220ms var(--ease-out) both;
      transition: border-color 180ms ease, background 180ms ease, transform 180ms var(--ease-out), box-shadow 180ms ease;
    }

    @media (hover: hover) and (pointer: fine) {
      .exercise:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 36px rgba(11, 12, 14, 0.14);
      }
    }

    .exercise-main {
      width: 100%;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 86px;
      padding: 13px;
      border: 0;
      border-radius: 0;
      background: transparent;
      text-align: left;
    }

    .exercise.done .exercise-main {
      background: rgba(47, 199, 121, 0.08);
    }

    .muscle-dot {
      width: 42px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: color-mix(in srgb, var(--muscle), transparent 82%);
      border: 1px solid color-mix(in srgb, var(--muscle), transparent 52%);
      transition: transform 220ms var(--ease-spring);
    }

    .muscle-dot svg {
      width: 23px;
      height: 23px;
      color: var(--muscle);
    }

    .exercise-name {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
      color: var(--text);
      font-weight: 820;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .replacement-badge {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(243, 169, 40, 0.16);
      color: var(--amber);
      font-size: 11px;
      font-weight: 800;
    }

    .exercise-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 8px;
    }

    .chevron {
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
    }

    .exercise-detail {
      display: grid;
      gap: 12px;
      padding: 0 13px 13px;
      animation: detailIn 300ms ease both;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      min-width: 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(23, 24, 25, 0.035);
    }

    .metric small {
      display: block;
      color: var(--dim);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .metric strong {
      display: block;
      margin-top: 5px;
      color: var(--text);
      font-size: 13px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .cue-list {
      display: grid;
      gap: 7px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(23, 24, 25, 0.035);
    }

    .cue-list div {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.48;
    }

    .set-list {
      display: grid;
      gap: 8px;
    }

    .set-wrap {
      display: grid;
      gap: 7px;
    }

    .set-row {
      display: grid;
      grid-template-columns: 42px minmax(126px, 1fr) minmax(112px, 1fr) 44px;
      gap: 8px;
      align-items: center;
      padding: 8px;
      background: rgba(23, 24, 25, 0.025);
    }

    .set-row label {
      min-width: 0;
    }

    .set-row label > .subtle {
      display: block;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .set-row.done {
      border-color: rgba(47, 199, 121, 0.34);
      background: rgba(47, 199, 121, 0.07);
      animation: checkGlow 420ms ease;
    }

    .set-num {
      width: 34px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--muted);
      font-weight: 850;
      font-size: 13px;
    }

    .rep-control {
      display: grid;
      grid-template-columns: 34px minmax(38px, 1fr) 34px;
      gap: 5px;
      align-items: center;
      min-width: 0;
    }

    .weight-control {
      display: grid;
      grid-template-columns: 44px minmax(54px, 1fr) 44px;
      gap: 5px;
      align-items: center;
      min-width: 0;
    }

    .rep-control button,
    .weight-control button,
    .set-check,
    .timer-actions button,
    .water-stepper button,
    .icon-button {
      display: grid;
      place-items: center;
      width: 44px;
      min-width: 44px;
      padding: 0;
      aspect-ratio: 1;
    }

    .rep-control input,
    .weight-control input {
      text-align: center;
      padding-left: 4px;
      padding-right: 4px;
    }

    .set-rpe {
      padding: 10px;
      border: 1px solid rgba(50, 182, 216, 0.2);
      border-radius: var(--radius);
      background: rgba(50, 182, 216, 0.055);
      animation: detailIn 220ms ease both;
    }

    .set-rpe-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .set-rpe-title strong,
    .set-rpe-title span {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .exercise.shake {
      animation: shakeCard 280ms ease both;
    }

    .set-check.done {
      background: var(--green);
      color: #07140d;
      border-color: var(--green);
      animation: checkPop 260ms var(--ease-spring);
    }

    .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .detail-actions .button,
    .detail-actions button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      padding: 8px 11px;
      color: var(--text);
      font-weight: 760;
      font-size: 13px;
    }

    .alt-grid {
      display: grid;
      gap: 8px;
    }

    .alt-button {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      width: 100%;
      min-height: 58px;
      padding: 10px;
      text-align: left;
      background: rgba(23, 24, 25, 0.04);
    }

    .alt-button strong {
      display: block;
      font-size: 13px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .alt-button span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .timer-panel {
      position: sticky;
      top: 12px;
      z-index: 3;
    }

    .timer-face {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }

    .timer-circle {
      width: 98px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: conic-gradient(var(--cyan) var(--timer-pct), rgba(255, 255, 255, 0.08) 0);
      position: relative;
      transition: background 360ms linear;
    }

    .timer-circle::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: inherit;
      background: var(--surface);
    }

    .timer-circle strong {
      position: relative;
      font-size: 24px;
      letter-spacing: 0;
    }

    .timer-label {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .timer-actions,
    .water-stepper,
    .compact-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .compact-actions button {
      min-width: 0;
      min-height: 36px;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 760;
      overflow-wrap: anywhere;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .stat-tile {
      min-width: 0;
      padding: 11px 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(23, 24, 25, 0.035);
    }

    .stat-tile strong {
      display: block;
      color: var(--text);
      font-size: 22px;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .stat-tile span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .water-meter {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 6px;
      margin-top: 9px;
    }

    .water-cup {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(50, 182, 216, 0.12);
      position: relative;
      overflow: hidden;
    }

    .water-cup.filled::before {
      content: "";
      position: absolute;
      inset: 28% 0 0;
      background: var(--cyan);
      animation: waterRise 260ms ease both;
    }

    .nutrition-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    .nutrition-row:last-child {
      border-bottom: 0;
    }

    .finish-button {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      min-height: 48px;
      margin-top: 12px;
      border-color: rgba(47, 199, 121, 0.42);
      background: rgba(47, 199, 121, 0.14);
      font-weight: 850;
    }

    .finish-button.complete {
      color: #07140d;
      border-color: var(--green);
      background: var(--green);
      animation: checkPop 300ms var(--ease-spring);
    }

    .history-list {
      display: grid;
      gap: 8px;
    }

    .history-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      background: rgba(23, 24, 25, 0.03);
    }

    .history-row strong {
      display: block;
      font-size: 13px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .history-row span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .sparkline {
      width: 100%;
      height: 34px;
      margin-top: 9px;
      overflow: visible;
    }

    .sparkline polyline {
      fill: none;
      stroke: var(--green);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 4px 10px rgba(47, 199, 121, 0.25));
    }

    .empty-state {
      padding: 22px 12px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
      line-height: 1.45;
      font-size: 13px;
    }

    .library-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .library-item {
      display: grid;
      gap: 9px;
      min-height: 164px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .library-item h3 {
      font-size: 15px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .library-item p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .library-item a {
      align-self: end;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 36px;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 760;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: min(340px, calc(100% - 36px));
      padding: 13px 14px;
      border: 1px solid rgba(50, 182, 216, 0.44);
      border-radius: var(--radius);
      background: #151b21;
      color: var(--text);
      box-shadow: var(--shadow);
      z-index: 20;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity 190ms var(--ease-out), transform 190ms var(--ease-out), visibility 0s linear 190ms;
    }

    .toast.show {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0);
      transition: opacity 220ms var(--ease-out), transform 220ms var(--ease-out), visibility 0s;
    }

    .progress-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 16px;
      border: 1px solid rgba(255, 209, 102, 0.34);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(255, 209, 102, 0.18), transparent 52%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.07), transparent),
        #111318;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .streak-flame {
      width: 88px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 24px;
      border: 1px solid rgba(255, 209, 102, 0.28);
      background:
        radial-gradient(circle at 34% 28%, rgba(255, 255, 255, 0.9), transparent 18%),
        linear-gradient(145deg, #fff0a8, #f3a928 46%, #b96515);
      color: var(--gold);
      box-shadow: inset -8px -10px 18px rgba(83, 43, 0, 0.18), 0 18px 38px rgba(243, 169, 40, 0.2);
      animation: flamePulse 1800ms ease-in-out infinite;
    }

    .streak-flame svg {
      width: 44px;
      height: 44px;
    }

    .level-bar {
      height: 8px;
      margin-top: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
      overflow: hidden;
    }

    .level-bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--gold));
      transition: width 520ms ease;
    }

    .reward-grid,
    .calendar-grid,
    .record-grid,
    .muscle-grid,
    .iphone-grid {
      display: grid;
      gap: 8px;
    }

    .reward-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .reward-card {
      min-height: 118px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.36), transparent 42%),
        rgba(23, 24, 25, 0.03);
      opacity: 0.48;
      transition: transform 180ms var(--ease-out), opacity 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .reward-card.unlocked {
      opacity: 1;
      border-color: rgba(255, 209, 102, 0.38);
      background:
        linear-gradient(145deg, rgba(255, 209, 102, 0.24), transparent 55%),
        var(--ivory-2);
      box-shadow: 0 18px 36px rgba(96, 70, 10, 0.12);
    }

    @media (hover: hover) and (pointer: fine) {
      .reward-card:hover {
        transform: translateY(-2px);
      }
    }

    .reward-card .badge-icon {
      width: 44px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 13px;
      background:
        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.95), transparent 19%),
        linear-gradient(145deg, #fff2b6, #f3a928 48%, #8c5a12);
      color: #3f2808;
      margin-bottom: 9px;
      box-shadow: inset -7px -8px 14px rgba(70, 35, 0, 0.2), 0 10px 18px rgba(126, 83, 12, 0.18);
      font-size: 22px;
    }

    .reward-card strong {
      display: block;
      font-size: 13px;
      line-height: 1.25;
    }

    .reward-card span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .calendar-grid {
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .calendar-label,
    .calendar-day {
      min-width: 0;
      text-align: center;
      border-radius: 7px;
      font-size: 12px;
    }

    .calendar-label {
      color: var(--dim);
      font-weight: 800;
      padding: 4px 0;
    }

    .calendar-day {
      min-height: 48px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: rgba(23, 24, 25, 0.025);
      color: var(--muted);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .calendar-day em {
      position: absolute;
      right: 4px;
      top: 3px;
      font-style: normal;
      font-size: 11px;
    }

    .calendar-day.done {
      color: #07140d;
      border-color: var(--green);
      background: var(--green);
    }

    .calendar-day.missed {
      color: var(--red);
      border-color: rgba(239, 83, 80, 0.36);
      background: rgba(239, 83, 80, 0.09);
    }

    .calendar-day.planned {
      color: var(--amber);
      border-color: rgba(243, 169, 40, 0.34);
      background: rgba(243, 169, 40, 0.08);
    }

    .calendar-day.rest {
      background: rgba(23, 24, 25, 0.018);
    }

    .calendar-day.freeze {
      color: var(--cyan);
      border-color: rgba(50, 182, 216, 0.36);
      background: rgba(50, 182, 216, 0.1);
    }

    .calendar-day.today {
      box-shadow: inset 0 0 0 2px rgba(23, 24, 25, 0.14);
    }

    .calendar-day button {
      position: absolute;
      inset: auto 4px 4px 4px;
      display: grid;
      place-items: center;
      min-height: 20px;
      padding: 0;
      font-size: 10px;
      font-weight: 800;
      background: rgba(50, 182, 216, 0.12);
    }

    .calendar-day button svg {
      width: 13px;
      height: 13px;
    }

    .calendar-legend,
    .calendar-detail {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .calendar-legend span,
    .calendar-detail span,
    .calendar-detail strong {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 28px;
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(23, 24, 25, 0.035);
      overflow-wrap: anywhere;
    }

    .rpe-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
    }

    .rpe-button {
      min-height: 42px;
      padding: 7px;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .rpe-button.active {
      color: var(--text);
      border-color: color-mix(in srgb, var(--rpe), transparent 40%);
      background: color-mix(in srgb, var(--rpe), transparent 84%);
    }

    .suggestion-card {
      padding: 11px;
      border: 1px solid rgba(47, 199, 121, 0.26);
      border-radius: var(--radius);
      background: rgba(47, 199, 121, 0.1);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .record-grid,
    .muscle-grid,
    .iphone-grid,
    .rings-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .rings-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .body-map-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 12px 0;
    }

    .body-map-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .body-svg {
      width: 100%;
      max-width: 140px;
      height: auto;
      filter: drop-shadow(0 12px 22px rgba(17, 18, 19, 0.08));
    }

    .body-svg [data-action="body-muscle"] {
      cursor: pointer;
      transition: opacity 300ms ease, filter 300ms ease, transform 220ms var(--ease-spring);
      transform-origin: center;
    }

    .body-svg [data-action="body-muscle"]:active {
      transform: scale(0.96);
    }

    .body-map-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 30px;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(23, 24, 25, 0.035);
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .body-weight-input {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .body-weight-input button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 11px;
      font-weight: 800;
    }

    .weight-chart-svg {
      width: 100%;
      min-height: 86px;
      margin: 12px 0;
      overflow: visible;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(23, 24, 25, 0.025);
    }

    .volume-chart {
      width: 100%;
      min-height: 154px;
      overflow: visible;
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(138, 114, 232, 0.08), transparent),
        rgba(23, 24, 25, 0.02);
    }

    .volume-chart text {
      fill: var(--ink-muted);
      font-size: 10px;
      font-weight: 800;
    }

    .volume-chart .grid {
      stroke: rgba(23, 24, 25, 0.08);
      stroke-width: 1;
    }

    .volume-chart .volume-bar {
      fill: var(--violet);
      rx: 5;

      color: var(--muted);

      font-size: 13px;

    .muscle-row,

      background: rgba(23, 24, 25, 0.035);

      font-size: 14px;
      line-height: 1.3;
      overflow-wrap: anywhere;

    .record-card span,

      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;

      display: grid;
      gap: 7px;
    }

    .muscle-row header {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;

      padding: 14px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.14);

      box-shadow: var(--shadow);

      display: block;
      font-size: 18px;
      line-height: 1.2;
    }

    .phone-widget span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .confetti-layer {
      pointer-events: none;
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 30;
    }

    .confetti-piece {
      position: absolute;
      top: -12px;
      width: 8px;
      height: 14px;
      border-radius: 2px;
      animation: confettiFall 1100ms ease-in forwards;
    }

    @keyframes appEnter {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes tabIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes detailIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes checkPop {
      0% { transform: scale(0.94); }
      55% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    @keyframes checkGlow {
      0% { box-shadow: 0 0 0 0 rgba(47, 199, 121, 0.28); }
      100% { box-shadow: 0 0 0 12px rgba(47, 199, 121, 0); }
    }

    @keyframes waterRise {
      from { transform: translateY(18px); }
      to { transform: translateY(0); }
    }

    @keyframes tabLine {
      from { transform: scaleX(0.35); opacity: 0; }
      to { transform: scaleX(1); opacity: 1; }
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes flamePulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(255, 209, 102, 0)); }
      50% { transform: scale(1.04); filter: drop-shadow(0 0 18px rgba(255, 209, 102, 0.22)); }
    }

    @keyframes shakeCard {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.92; }
      50% { transform: scale(1.06); opacity: 1; }
    }

    @keyframes confettiFall {
      to { transform: translateY(105vh) rotate(540deg); opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
        scroll-behavior: auto !important;
      }

      .streak-flame,
      .yoga-icon,
      .confetti-piece {
        animation: none !important;
      }
    }

    .mini-timer {
      position: fixed;
      left: 50%;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 15;
      width: min(560px, calc(100% - 24px));
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid rgba(50, 182, 216, 0.4);
      border-radius: 18px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
        rgba(12, 14, 18, 0.96);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      transition: opacity 180ms ease, transform 220ms var(--ease-out), border-color 180ms ease;
    }

    .pull-indicator {
      position: fixed;
      left: 50%;
      top: calc(10px + env(safe-area-inset-top));
      z-index: 18;
      transform: translateX(-50%) translateY(-18px);
      opacity: 0;
      pointer-events: none;
      min-height: 34px;
      display: grid;
      place-items: center;
      padding: 7px 12px;
      border: 1px solid rgba(50, 182, 216, 0.36);
      border-radius: 999px;
      background: rgba(17, 20, 25, 0.96);
      color: var(--cyan);
      font-size: 12px;
      font-weight: 800;
      box-shadow: var(--shadow);
      transition: opacity 160ms ease, transform 180ms ease;
    }

    .pull-indicator.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .mini-timer.is-hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(14px) scale(0.98);
    }

    .mini-timer strong {
      display: block;
      font-size: 20px;
      line-height: 1;
      color: var(--cyan);
    }

    .mini-timer span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mini-timer .timer-actions {
      margin: 0;
    }

    .toast strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .toast span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .timer-panel {
        position: static;
      }
    }

    @media (max-width: 720px) {

      .month-stat {

      }

      .day-grid {
        grid-template-columns: 1fr;
      }

        right: 10px;

        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 4px;
        margin: 0;
        padding: 6px;
        border: 1px solid rgba(255, 255, 255, 0.13);
        border-radius: 18px;

        backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
      }

      .nav-tabs button {
        min-height: 54px;
        flex-direction: column;
        gap: 3px;
        padding: 6px 2px 8px;
        font-size: 9px;
        border-radius: 13px;
      }

      .nav-tabs button.active {
        color: #07140d;
        border-color: rgba(47, 199, 121, 0.62);
        background: var(--green);
        box-shadow: 0 10px 22px rgba(47, 199, 121, 0.22);
      }

      .nav-tabs button.active::after {
        display: none;
      }

      .nav-tabs button span:not(.icon) {
        display: block;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mini-timer {
        bottom: calc(86px + env(safe-area-inset-bottom));
      }

      .week-grid,
      .library-grid,
      .reward-grid,
      .record-grid,
      .muscle-grid,
      .iphone-grid,
      .rings-grid,
      .today-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .workout-head {
        grid-template-columns: 1fr;
      }

      .progress-ring {
        width: 74px;
      }

      .detail-grid,
      .stat-grid {
        grid-template-columns: 1fr;
      }

      .set-row {
        grid-template-columns: 34px minmax(0, 1fr) minmax(0, 1fr) 44px;
        gap: 6px;
      }

      .exercise-main {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .chevron {
        display: none;
      }

      .onboarding-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 440px) {
      .reward-grid,
      .record-grid,
      .muscle-grid,
      .iphone-grid,
      .rings-grid,
      .today-grid,
      .mode-tabs {
        grid-template-columns: 1fr;
      }

      .progress-hero {
        grid-template-columns: 1fr;
      }

      .set-row {
        grid-template-columns: 34px minmax(0, 1fr) 44px;
        align-items: end;
      }

      .set-row .set-num {
        grid-column: 1;
        grid-row: 1;
      }

      .set-row label:first-of-type {
        grid-column: 2;
        grid-row: 1;
      }

      .set-row label:nth-of-type(2) {
        grid-column: 1 / 4;
        grid-row: 2;
      }

      .set-row .set-check {
        grid-column: 3;
        grid-row: 1;
      }

      .set-row .rep-control {
        grid-template-columns: 40px minmax(0, 1fr) 40px;
      }

      .set-row .weight-control {
        grid-template-columns: 40px minmax(0, 1fr) 40px;
      }

      .body-weight-input,
      .recovery-bar {
        grid-template-columns: 1fr;
      }

      .today-command-grid {
        grid-template-columns: 1fr;
      }

      .recovery-value,
      .recovery-label {
        white-space: normal;
      }
    }
  </style>
</head>

    function defaultState() {
      return {
        weekIdx: 0,
        dayIdx: 0,
        logs: {},

      };
