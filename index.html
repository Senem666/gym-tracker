    function loadState() {
      try {
        return { ...defaultState(), ...(JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}) };
      } catch (error) {
        return defaultState();
      }
    }

    function loadJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (error) {
        return fallback;
      }
    }

    function writeAllStores() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      localStorage.setItem(EXERCISE_DATA_KEY, JSON.stringify(exerciseData));
      localStorage.setItem(WORKOUT_LOG_KEY, JSON.stringify(workoutLog));
      localStorage.setItem(STREAK_KEY, JSON.stringify(streakStore));
      localStorage.setItem(BODY_LOG_KEY, JSON.stringify(bodyLog));
      localStorage.setItem(RECOVERY_KEY, JSON.stringify(recoveryLog));
      localStorage.setItem(REMINDERS_SHOWN_KEY, JSON.stringify(remindersShown));
      if (userProfile) localStorage.setItem(PROFILE_KEY, JSON.stringify(userProfile));
    }

    function saveState(immediate = false) {
      clearTimeout(saveHandle);
      if (immediate) {
        writeAllStores();
        return;
      }
      saveHandle = setTimeout(writeAllStores, 500);
    }

    function mutate(updater) {
      updater(state);
      clampIndexes();
      saveState();
      render();
    }

    function clampIndexes() {
      state.weekIdx = Math.max(0, Math.min(PLAN.length - 1, state.weekIdx || 0));
      const days = PLAN[state.weekIdx].days;
      state.dayIdx = Math.max(0, Math.min(days.length - 1, state.dayIdx || 0));
    }

    function currentWeek() {
      return PLAN[state.weekIdx];
    }

    function currentWorkout() {
      return currentWeek().days[state.dayIdx];
    }

    function workoutKey(weekIdx = state.weekIdx, dayIdx = state.dayIdx) {
      return `${PLAN[weekIdx].id}-${PLAN[weekIdx].days[dayIdx].id}`;
    }

    function exerciseKey(weekIdx, dayIdx, exIdx) {
      return `${PLAN[weekIdx].id}-${PLAN[weekIdx].days[dayIdx].id}-e${exIdx}`;
    }

    function setKey(weekIdx, dayIdx, exIdx, setIdx) {
      return `${exerciseKey(weekIdx, dayIdx, exIdx)}-s${setIdx}`;
    }

    function prescribedExercise(weekIdx, dayIdx, exIdx) {
      const item = PLAN[weekIdx].days[dayIdx].exercises[exIdx];
      return { ...EXERCISES[item.id], planId: item.id, sets: item.sets, reps: item.reps, restSec: item.restSec };
    }

    function displayExercise(weekIdx, dayIdx, exIdx) {
      const base = prescribedExercise(weekIdx, dayIdx, exIdx);
      const eKey = exerciseKey(weekIdx, dayIdx, exIdx);
      const altIdx = state.replacements[eKey];
      if (altIdx === undefined) return base;
      const alt = base.alternatives[altIdx];
      if (!alt) return base;
      return {
        ...base,
        ...alt,
        muscles: base.muscles,
        startWeight: alt.startWeight || base.startWeight,
        alternatives: base.alternatives,
        originalName: base.name,
        isReplacement: true
      };
    }

    function getSetLog(weekIdx, dayIdx, exIdx, setIdx) {
      const key = setKey(weekIdx, dayIdx, exIdx, setIdx);
      const exData = prescribedExercise(weekIdx, dayIdx, exIdx);
      const adaptive = getExerciseStore(exData.planId);
      const saved = state.logs[key] || {};
      return {
        weight: saved.weight ?? adaptive.baseWeight ?? "",
        reps: saved.reps ?? exData.reps,
        done: !!saved.done,
        doneAt: saved.doneAt || "",
        updatedAt: saved.updatedAt || "",
        rpe: saved.rpe || ""
      };
    }

    function setLog(weekIdx, dayIdx, exIdx, setIdx, patch) {
      const key = setKey(weekIdx, dayIdx, exIdx, setIdx);
      state.logs[key] = { ...getSetLog(weekIdx, dayIdx, exIdx, setIdx), ...patch, updatedAt: new Date().toISOString() };
    }

    function getExerciseStore(exerciseId) {
      if (!exerciseData[exerciseId]) {
        exerciseData[exerciseId] = {
          baseWeight: "",
          lastRPE: null,
          history: [],
          personalBest: { weight: 0, reps: 0, volume: 0 }
        };
      }
      return exerciseData[exerciseId];
    }

    function isWeightedExercise(exerciseId) {
      return !["plank"].includes(exerciseId);
    }

    function numberValue(value) {
      const parsed = Number(String(value ?? "").replace(",", "."));
      return Number.isFinite(parsed) ? parsed : null;
    }

    function weightStepFor(exerciseId) {
      const data = EXERCISES[exerciseId] || {};
      return data.muscles === "Ноги" ? 5 : 2.5;
    }

    function rpeOption(id) {
      return RPE_OPTIONS.find(option => option.id === id) || RPE_OPTIONS[1];
    }

    function adaptiveWeightText(exerciseId) {
      const store = getExerciseStore(exerciseId);
      if (store.baseWeight === "" || store.baseWeight === undefined || store.baseWeight === null) {
        return "Найди свой вес: 5 повторов с минимального веса, потом оцени RPE.";
      }
      const suffix = store.lastRPE ? ` · прошлый RPE ${store.lastRPE}` : "";
      return `${store.baseWeight} кг базовый${suffix}`;
    }

    function saveSetRpe(weekIdx, dayIdx, exIdx, setIdx, rpeId) {
      const planItem = PLAN[weekIdx].days[dayIdx].exercises[exIdx];
      const option = rpeOption(rpeId);
      const log = getSetLog(weekIdx, dayIdx, exIdx, setIdx);
      const weight = numberValue(log.weight) ?? 0;
      const reps = numberValue(log.reps) ?? 0;
      const store = getExerciseStore(planItem.id);
      const step = weightStepFor(planItem.id);
      let recommendation = weight;
      const previousBestWeight = Number(store.personalBest?.weight || 0);

      if (option.value <= 4) recommendation = weight + Math.max(5, step);
      if (option.value >= 8 && option.value < 10) recommendation = Math.max(0, weight - Math.max(5, step));
      if (option.value >= 10) recommendation = Math.max(0, weight - 10);
      if (option.value >= 5 && option.value <= 7) store.baseWeight = weight;
      if (option.value <= 6 && store.baseWeight !== "" && weight >= Number(store.baseWeight)) {
        recommendation = weight + step;
      }

      store.lastRPE = option.value;
      store.history = [
        ...(store.history || []),
        {
          date: new Date().toISOString(),
          setKey: setKey(weekIdx, dayIdx, exIdx, setIdx),
          weight,
          reps,
          rpe: option.value,
          feeling: option.id,
          recommendation
        }
      ].slice(-40);
      const volume = weight * reps;
      const best = store.personalBest || { weight: 0, reps: 0, volume: 0 };
      store.personalBest = {
        weight: Math.max(best.weight || 0, weight),
        reps: Math.max(best.reps || 0, reps),
        volume: Math.max(best.volume || 0, volume)
      };
      const prBeat = weight > previousBestWeight;
      setLog(weekIdx, dayIdx, exIdx, setIdx, { rpe: option.id });
      workoutLog.push({
        type: "set",
        date: new Date().toISOString(),
        exerciseId: planItem.id,
        exerciseName: EXERCISES[planItem.id]?.name || planItem.id,
        weight,
        reps,
        rpe: option.value,
        recommendation,
        prBeat,
        xp: XP_TABLE.set + (prBeat ? XP_TABLE.prBeat : 0)
      });
      return { option, recommendation };
    }

    function exerciseProgress(weekIdx, dayIdx, exIdx) {
      const planItem = PLAN[weekIdx].days[dayIdx].exercises[exIdx];
      let done = 0;
      for (let i = 0; i < planItem.sets; i++) {
        if (getSetLog(weekIdx, dayIdx, exIdx, i).done) done++;
      }
      return { done, total: planItem.sets, complete: done === planItem.sets };
    }

    function workoutProgress(weekIdx = state.weekIdx, dayIdx = state.dayIdx) {
      const day = PLAN[weekIdx].days[dayIdx];
      let doneSets = 0;
      let totalSets = 0;
      let doneExercises = 0;
      day.exercises.forEach((item, exIdx) => {
        const p = exerciseProgress(weekIdx, dayIdx, exIdx);
        doneSets += p.done;
        totalSets += p.total;
        if (p.complete) doneExercises++;
      });
      const pct = totalSets ? Math.round((doneSets / totalSets) * 100) : 0;
      return { doneSets, totalSets, doneExercises, totalExercises: day.exercises.length, pct };
    }

    function weekProgress(weekIdx) {
      let done = 0;
      let total = 0;
      PLAN[weekIdx].days.forEach((day, dayIdx) => {
        const p = workoutProgress(weekIdx, dayIdx);
        done += p.doneSets;
        total += p.totalSets;
      });
      return total ? Math.round((done / total) * 100) : 0;
    }

    function phaseMeta(week = currentWeek()) {
      if (week.phase === 2) return { id: 2, label: "Фаза 2", title: "Гипертрофия", desc: "Больше объема, новые упражнения.", color: "var(--amber)" };
      if (week.phase === 3) return { id: 3, label: "Фаза 3", title: "Сила", desc: "Меньше повторов, больше вес.", color: "var(--red)" };
      if (week.phase === 4) return { id: 4, label: "Deload", title: "Восстановление", desc: "Легкая неделя: объем -40%, вес -20%.", color: "var(--cyan)" };
      return { id: 1, label: "Фаза 1", title: "Адаптация", desc: "Техника, легкий вес, спокойный темп.", color: "var(--green)" };
    }

    function phaseGroups() {
      return [
        { label: "Фаза 1", range: "1-4", indexes: [0, 1, 2, 3] },
        { label: "Фаза 2", range: "5-8", indexes: [4, 5, 6, 7] },
        { label: "Фаза 3", range: "9-12", indexes: [8, 9, 10, 11] },
        { label: "Deload", range: "13", indexes: [12] }
      ];
    }

    function cycleInfo() {
      const cycleLength = 13;
      const completedWeeks = Object.keys(state.completedWorkouts || {}).filter(key => {
        const week = PLAN.find(item => key.startsWith(`${item.id}-`));
        if (!week) return false;
        const weekIndex = PLAN.indexOf(week);
        return weekIndex >= 0 && weekIndex < cycleLength;
      });
      const unique = new Set(completedWeeks.map(key => key.split("-")[0]));
      return { cycleLength, completedWeeks: unique.size, complete: unique.size >= cycleLength };
    }

    function phaseToast(weekIdx) {
      const week = PLAN[weekIdx];
      if (!week) return;
      if (week.week === 5) showToast("Фаза 2 — Гипертрофия", "Больше объема, новые упражнения.");
      if (week.week === 9) showToast("Фаза 3 — Сила", "Меньше повторов, больше вес.");
      if (week.week === 13) showToast("Deload", "Дай телу восстановиться. Легкая неделя.");
    }

    function monthId(date = new Date()) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    function dateKey(date = new Date()) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function parseDateKey(key) {
      const [year, month, day] = key.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function addDays(date, amount) {
      const next = new Date(date);
      next.setDate(next.getDate() + amount);
      return next;
    }

    function startOfWeek(date = new Date()) {
      const next = new Date(date);
      const day = next.getDay() || 7;
      next.setHours(0, 0, 0, 0);
      next.setDate(next.getDate() - day + 1);
      return next;
    }

    function endOfWeek(date = new Date()) {
      const start = startOfWeek(date);
      return addDays(start, 6);
    }

    function weekKey(date = new Date()) {
      return dateKey(startOfWeek(date));
    }

    function isScheduledDate(date) {
      return Boolean(SCHEDULE_DAYS[date.getDay()]);
    }

    function completedWorkoutEntries() {
      return Object.entries(state.completedWorkouts)
        .filter(([, item]) => item && item.completedAt)
        .map(([key, item]) => ({ key, ...item }));
    }

    function completionsByDate() {
      const map = {};
      completedWorkoutEntries().forEach(item => {
        const key = item.completedAt.slice(0, 10);
        map[key] = (map[key] || 0) + 1;
      });
      return map;
    }

    function completionsByWeek() {
      const map = {};
      completedWorkoutEntries().forEach(item => {
        const key = weekKey(new Date(item.completedAt));
        map[key] = (map[key] || 0) + 1;
      });
      return map;
    }

    function currentWeekWorkoutCount() {
      return completionsByWeek()[weekKey()] || 0;
    }

    function perfectWeeksThisMonth() {
      const month = monthId();
      const map = completionsByWeek();
      return Object.entries(map).filter(([key, count]) => key.startsWith(month) && count >= 3).length;
    }

    function planStreak() {
      const map = completionsByWeek();
      let cursor = startOfWeek();
      const currentKey = weekKey(cursor);
      const currentComplete = (map[currentKey] || 0) >= 3;
      if (!currentComplete) cursor = addDays(cursor, -7);
      let streak = 0;
      while ((map[weekKey(cursor)] || 0) >= 3) {
        streak++;
        cursor = addDays(cursor, -7);
      }
      return streak;
    }

    function monthCalendar() {
      const now = new Date();
      const first = new Date(now.getFullYear(), now.getMonth(), 1);
      const last = new Date(now.getFullYear(), now.getMonth() + 1, 0);
      const gridStart = startOfWeek(first);
      const completed = completionsByDate();
      const days = [];
      for (let cursor = new Date(gridStart); cursor <= endOfWeek(last); cursor = addDays(cursor, 1)) {
        const key = dateKey(cursor);
        const inMonth = cursor.getMonth() === now.getMonth();
        const scheduled = isScheduledDate(cursor);
        const done = Boolean(completed[key]);
        const frozen = Boolean(state.freezes[key]);
        const isPast = cursor < new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const status = !inMonth ? "out" : done ? "done" : frozen ? "freeze" : scheduled && isPast ? "missed" : scheduled ? "planned" : "rest";
        days.push({ key, date: new Date(cursor), inMonth, scheduled, done, frozen, status, isToday: key === TODAY_KEY });
      }
      return days;
    }

    function freezeUsesThisMonth() {
      const month = monthId();
      return Object.keys(state.freezes).filter(key => key.startsWith(month)).length;
    }

    function missedScheduledDaysThisMonth() {
      return monthCalendar().filter(day => day.inMonth && day.status === "missed").length;
    }

    function allSetEntries() {
      const entries = [];
      PLAN.forEach((week, weekIdx) => {
        week.days.forEach((day, dayIdx) => {
          day.exercises.forEach((item, exIdx) => {
            const exData = prescribedExercise(weekIdx, dayIdx, exIdx);
            for (let setIdx = 0; setIdx < item.sets; setIdx++) {
              entries.push({
                weekIdx,
                dayIdx,
                exIdx,
                setIdx,
                setKey: setKey(weekIdx, dayIdx, exIdx, setIdx),
                exerciseKey: exerciseKey(weekIdx, dayIdx, exIdx),
                exerciseId: item.id,
                exerciseName: exData.name,
                muscles: exData.muscles,
                prescribedReps: item.reps
              });
            }
          });
        });
      });
      return entries;
    }

    function personalRecords() {
      const byExercise = {};
      let bestVolume = { value: 0, label: "пока нет записей" };
      allSetEntries().forEach(entry => {
        const log = state.logs[entry.setKey];
        if (!log || !log.done) return;
        const weight = Number(String(log.weight).replace(",", "."));
        const reps = Number(log.reps);
        if (!Number.isFinite(weight) || !Number.isFinite(reps)) return;
        const volume = weight * reps;
        byExercise[entry.exerciseId] ||= { name: entry.exerciseName, weight: 0, reps: 0, volume: 0 };
        byExercise[entry.exerciseId].weight = Math.max(byExercise[entry.exerciseId].weight, weight);
        byExercise[entry.exerciseId].reps = Math.max(byExercise[entry.exerciseId].reps, reps);
        byExercise[entry.exerciseId].volume += volume;
        if (volume > bestVolume.value) bestVolume = { value: Math.round(volume), label: entry.exerciseName };
      });
      const bestWeight = Object.values(byExercise).sort((a, b) => b.weight - a.weight)[0];
      const bestReps = Object.values(byExercise).sort((a, b) => b.reps - a.reps)[0];
      return { byExercise, bestWeight, bestReps, bestVolume };
    }

    function muscleMapForWeek() {
      const end = new Date();
      const start = addDays(end, -7);
      const result = {};
      allSetEntries().forEach(entry => {
        const log = state.logs[entry.setKey];
        if (!log || !log.done || !log.doneAt) return;
        const doneAt = new Date(log.doneAt);
        if (doneAt < start || doneAt >= end) return;
        result[entry.muscles] ||= { sets: 0, volume: 0 };
        result[entry.muscles].sets++;
        const weight = Number(String(log.weight).replace(",", "."));
        const reps = Number(log.reps);
        if (Number.isFinite(weight) && Number.isFinite(reps)) result[entry.muscles].volume += weight * reps;
      });
      return result;
    }

    function volumeTrend(daysCount = 7) {
      const days = Array.from({ length: daysCount }, (_, idx) => {
        const date = addDays(new Date(), idx - daysCount + 1);
        return { key: dateKey(date), label: date.toLocaleDateString("ru-RU", { weekday: "short" }).replace(".", ""), volume: 0, sets: 0 };
      });
      const byKey = Object.fromEntries(days.map(day => [day.key, day]));
      allSetEntries().forEach(entry => {
        const log = state.logs[entry.setKey];
        if (!log || !log.done || !log.doneAt) return;
        const key = String(log.doneAt).slice(0, 10);
        if (!byKey[key]) return;
        const weight = numberValue(log.weight) || 0;
        const reps = numberValue(log.reps) || 0;
        byKey[key].volume += weight * reps;
        byKey[key].sets += 1;
      });
      const totalVolume = Math.round(days.reduce((sum, day) => sum + day.volume, 0));
      const totalSets = days.reduce((sum, day) => sum + day.sets, 0);
      const best = [...days].sort((a, b) => b.volume - a.volume)[0] || days[0];
      return { days, totalVolume, totalSets, best };
    }

    function progressionSuggestion(weekIdx, dayIdx, exIdx) {
      const base = prescribedExercise(weekIdx, dayIdx, exIdx);
      const store = getExerciseStore(base.planId);
      const progress = exerciseProgress(weekIdx, dayIdx, exIdx);
      if (!progress.complete) return null;
      if (!store.lastRPE || store.lastRPE >= 8) return null;
      let totalWeight = 0;
      let count = 0;
      let allRepsMet = true;
      for (let setIdx = 0; setIdx < base.sets; setIdx++) {
        const log = getSetLog(weekIdx, dayIdx, exIdx, setIdx);
        const weight = Number(String(log.weight).replace(",", "."));
        const reps = Number(log.reps);
        if (Number.isFinite(weight)) {
          totalWeight += weight;
          count++;
        }
        if (Number.isFinite(reps) && reps < Number(base.reps)) allRepsMet = false;
      }
      if (!allRepsMet || count === 0) return null;
      const step = store.lastRPE <= 6 ? weightStepFor(base.planId) : 0;
      if (!step) return null;
      const avg = totalWeight / count;
      return { step, next: Math.round((avg + step) * 10) / 10, rating: store.lastRPE };
    }

    function currentProgressionSuggestions() {
      return currentWorkout().exercises
        .map((_, exIdx) => ({ exIdx, ex: displayExercise(state.weekIdx, state.dayIdx, exIdx), suggestion: progressionSuggestion(state.weekIdx, state.dayIdx, exIdx) }))
        .filter(item => item.suggestion);
    }

    function progressStats() {
      const month = monthStats();
      const streak = planStreak();
      const perfectWeeks = perfectWeeksThisMonth();
      const daily = dailyState();
      const badges = unlockedAchievements(month, daily);
      const activity = activityStatsThisWeek();
      const homeCount = workoutLog.filter(item => item.type === "home").length;
      const yogaCount = workoutLog.filter(item => item.type === "yoga").length;
      const bodyWeightCount = bodyLog.length;
      const prCount = workoutLog.filter(item => item.prBeat).length;
      const completedPhases = [1, 2, 3].filter(phase => phaseCompletion(phase).complete).length;
      const deloadDone = phaseCompletion(4).complete ? 1 : 0;
      const fullCycleDone = completedPhases === 3 && deloadDone ? 1 : 0;
      const xp =
        month.workouts * XP_TABLE.gymWorkout +
        month.sets * XP_TABLE.set +
        homeCount * XP_TABLE.homeWorkout +
        yogaCount * XP_TABLE.yoga +
        bodyWeightCount * XP_TABLE.bodyWeightLog +
        prCount * XP_TABLE.prBeat +
        (daily.water >= 6 ? XP_TABLE.waterGoal : 0) +
        completedPhases * XP_TABLE.phaseComplete +
        deloadDone * XP_TABLE.deloadComplete +
        fullCycleDone * XP_TABLE.fullCycleComplete +
        perfectWeeks * 90;
      const level = Math.floor(xp / 500) + 1;
      const levelXp = xp % 500;
      const levelName = LEVEL_NAMES[Math.min(LEVEL_NAMES.length - 1, level - 1)];
      return { month, streak, perfectWeeks, currentWeekCount: currentWeekWorkoutCount(), badges, xp, level, levelName, levelXp, nextLevel: 500 - levelXp, activity, completedPhases, fullCycleDone };
    }

    function phaseCompletion(phase) {
      const weeks = PLAN.filter(week => week.phase === phase);
      const completedWeeks = weeks.filter(week => week.days.every(day => state.completedWorkouts[`${week.id}-${day.id}`]));
      return { done: completedWeeks.length, total: weeks.length, complete: weeks.length > 0 && completedWeeks.length === weeks.length };
    }

    function activityStatsThisWeek() {
      const start = startOfWeek();
      const end = addDays(start, 7);
      const inWeek = iso => {
        const date = new Date(iso);
        return date >= start && date < end;
      };
      const gym = completedWorkoutEntries().filter(item => inWeek(item.completedAt)).length;
      const home = workoutLog.filter(item => item.type === "home" && item.completedAt && inWeek(item.completedAt)).length;
      const yoga = workoutLog.filter(item => item.type === "yoga" && item.completedAt && inWeek(item.completedAt)).length;
      return { gym, home, yoga };
    }

    function recoveryScore() {
      const weights = { tired: -2, normal: 0, good: 1, great: 2 };
      const recent = [...recoveryLog].sort((a, b) => (b.loggedAt || "").localeCompare(a.loggedAt || "")).slice(0, 3);
      let score = 70;
      recent.forEach(item => {
        score += (weights[item.feeling] ?? 0) * 10;
      });
      if (recent.length >= 2) {
        const last = new Date(recent[0].loggedAt).getTime();
        const prev = new Date(recent[1].loggedAt).getTime();
        if (Number.isFinite(last) && Number.isFinite(prev) && Math.abs(last - prev) < 7 * 60 * 60 * 1000) score -= 15;
      }
      const value = Math.max(0, Math.min(100, Math.round(score)));
      const label = value < 30 ? "Нужен отдых" : value < 60 ? "Средне" : "Готов";
      const color = value < 30 ? "var(--red)" : value < 60 ? "var(--amber)" : "var(--green)";
      return { value, label, color };
    }

    function renderRecoveryBar() {
      const recovery = recoveryScore();
      return `
        <div class="recovery-bar ${recovery.value < 30 ? "warning" : ""}">
          <span class="recovery-label">🔋 Восстановление</span>
          <div class="recovery-track"><div class="recovery-fill" style="width:${recovery.value}%;background:${recovery.color}"></div></div>
          <span class="recovery-value">${recovery.value}% · ${escapeHtml(recovery.label)}</span>
          ${recovery.value < 30 ? `<small>Похоже, ты устал. Может, легкая йога вместо зала?</small>` : ""}
        </div>
      `;
    }

    function unlockedAchievements(month = monthStats(), daily = dailyState()) {
      const unlocked = [];
      const homeCount = workoutLog.filter(item => item.type === "home").length;
      const yogaCount = workoutLog.filter(item => item.type === "yoga").length;
      if (month.workouts >= 1) unlocked.push("first");
      if (currentWeekWorkoutCount() >= 3) unlocked.push("week1");
      if (perfectWeeksThisMonth() >= 1) unlocked.push("perfectWeek");
      if (phaseCompletion(1).complete) unlocked.push("phase1");
      if (phaseCompletion(2).complete) unlocked.push("phase2");
      if (phaseCompletion(3).complete) unlocked.push("phase3");
      if (phaseCompletion(4).complete) unlocked.push("fullCycle");
      if (month.workouts >= 8) unlocked.push("month8");
      if (month.volume >= 10000) unlocked.push("volume10k");
      if ((daily.water || 0) >= 6) unlocked.push("hydrated");
      if (month.workouts > 0 && missedScheduledDaysThisMonth() === 0) unlocked.push("noMiss");
      if (workoutLog.some(item => item.prBeat)) unlocked.push("prBeat");
      if (yogaCount >= 7) unlocked.push("yoga7");
      if (homeCount >= 10) unlocked.push("home10");
      return unlocked;
    }

    function nextWorkoutLabel() {
      const now = new Date();
      for (let offset = 0; offset < 10; offset++) {
        const date = addDays(now, offset);
        if (!isScheduledDate(date)) continue;
        const key = dateKey(date);
        if (completionsByDate()[key]) continue;
        return `${SCHEDULE_DAYS[date.getDay()]} · ${date.toLocaleDateString("ru-RU", { day: "2-digit", month: "short" })}`;
      }
      return "план закрыт";
    }

    function nextWorkoutPrompt() {
      const label = nextWorkoutLabel();
      if (label === "план закрыт") return "Полный цикл закрыт. Можно повторить программу с новыми рабочими весами.";
      return `Следующая по плану: ${label}. Я напомню про еду, воду и сумку.`;
    }

    function celebrateCycleIfReady() {
      const deloadDone = phaseCompletion(4).complete;
      if (!deloadDone || state.cycleCelebrated.fullCycle) return false;
      mutate(draft => {
        draft.cycleCelebrated.fullCycle = new Date().toISOString();
      });
      ui.celebrating = true;
      haptic([35, 35, 35, 70]);
      showToast("Полный цикл закрыт", `13 недель готовы · +${XP_TABLE.fullCycleComplete} XP в статистике.`);
      setTimeout(() => {
        ui.celebrating = false;
        render();
      }, 1800);
      return true;
    }

    function dailyState() {
      if (!state.daily[TODAY_KEY]) {
        state.daily[TODAY_KEY] = { water: 0, preMeal: false, postProtein: false, creatine: false };
      }
      return state.daily[TODAY_KEY];
    }

    function monthStats() {
      const month = monthId();
      const workouts = Object.values(state.completedWorkouts).filter(item => (item.completedAt || "").startsWith(month));
      let sets = 0;
      let volume = 0;
      Object.values(state.logs).forEach(log => {
        if (!log.done || !(log.doneAt || "").startsWith(month)) return;
        sets++;
        const weight = Number(String(log.weight).replace(",", "."));
        const reps = Number(log.reps);
        if (Number.isFinite(weight) && Number.isFinite(reps)) volume += weight * reps;
      });
      return {
        workouts: workouts.length,
        sets,
        volume: Math.round(volume),
        history: workouts.sort((a, b) => (b.completedAt || "").localeCompare(a.completedAt || "")).slice(0, 6)
      };
    }

    function formatTimer(seconds) {
      const safe = Math.max(0, Number(seconds) || 0);
      const m = Math.floor(safe / 60);
      const s = safe % 60;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function formatDateTime(iso) {
      if (!iso) return "";
      const date = new Date(iso);
      return date.toLocaleDateString("ru-RU", { day: "2-digit", month: "short" }) + " " + date.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
    }

    function startTimer(seconds, label) {
      state.timer = { total: seconds, left: seconds, running: true, label };
      saveState();
      ensureTicker();
      updateTimerDom();
    }

    function ensureTicker() {
      if (tickHandle) return;
      tickHandle = setInterval(() => {
        let timerChanged = false;
        let needsRender = false;
        if (state.timer.running && state.timer.left > 0) {
          state.timer.left -= 1;
          timerChanged = true;
          if (state.timer.left === 0) {
            state.timer.running = false;
            showToast("Отдых закончен", "Можно начинать следующий подход.");
          }
        }
        if (state.reminder.enabled && state.reminder.nextAt && Date.now() >= state.reminder.nextAt) {
          const stamp = String(state.reminder.nextAt);
          if (lastReminderToast !== stamp) {
            lastReminderToast = stamp;
            notifyUser("Вода", "Сделай несколько глотков и отметь стакан.");
          }
          state.reminder.nextAt = Date.now() + state.reminder.intervalMin * 60 * 1000;
          needsRender = true;
        }
        if (state.trainingReminder.enabled && state.trainingReminder.nextAt && Date.now() >= state.trainingReminder.nextAt) {
          notifyUser("Через час зал", "Поешь, выпей воды и проверь тренировочную сумку.");
          state.trainingReminder.nextAt = nextTrainingReminderTime(Date.now() + 60 * 1000);
          needsRender = true;
        }
        if (timerChanged || needsRender) {
          saveState();
          updateTimerDom();
          if (needsRender) render();
        }
      }, 1000);
    }

    function updateTimerDom() {
      const timer = state.timer;
      const pct = timer.total ? Math.round((timer.left / timer.total) * 100) : 0;
      const hidden = !timer.running && (timer.left === timer.total || timer.left === 0);
      document.querySelectorAll("[data-timer-time]").forEach(el => {
        el.textContent = formatTimer(timer.left);
      });
      document.querySelectorAll("[data-timer-label]").forEach(el => {
        el.textContent = timer.label || "Отдых между подходами";
      });
      document.querySelectorAll("[data-timer-status]").forEach(el => {
        el.textContent = timer.running ? "идет" : "пауза";
      });
      document.querySelectorAll("[data-timer-circle]").forEach(el => {
        el.style.setProperty("--timer-pct", `${pct}%`);
      });
      document.querySelectorAll("[data-timer-toggle]").forEach(button => {
        button.innerHTML = timer.running ? ICONS.pause : ICONS.play;
        button.title = timer.running ? "Пауза" : "Старт";
      });
      const mini = document.querySelector(".mini-timer");
      if (mini) {
        mini.classList.toggle("is-hidden", hidden);
        mini.setAttribute("aria-hidden", hidden ? "true" : "false");
      }
    }

    function nextTrainingReminderTime(after = Date.now()) {
      const base = new Date(after);
      for (let offset = 0; offset < 21; offset++) {
        const day = addDays(base, offset);
        if (!isScheduledDate(day)) continue;
        const trigger = new Date(day);
        trigger.setHours(Math.max(0, state.trainingReminder.hour - 1), 0, 0, 0);
        if (trigger.getTime() > after) return trigger.getTime();
      }
      return Date.now() + 24 * 60 * 60 * 1000;
    }

    function notifyUser(title, message) {
      showToast(title, message);
      if ("Notification" in window && Notification.permission === "granted") {
        new Notification(title, { body: message });
      }
    }

    function checkSmartReminders() {
      if (!userProfile || ui.pendingRecovery) return;
      const now = Date.now();
      const twoHours = 2 * 60 * 60 * 1000;
      for (const reminder of SMART_REMINDERS) {
        const last = Number(remindersShown[reminder.id] || 0);
        if (now - last < twoHours) continue;
        let ok = false;
        try {
          ok = Boolean(reminder.check());
        } catch (error) {
          ok = false;
        }
        if (!ok) continue;
        const message = typeof reminder.message === "function" ? reminder.message() : reminder.message;
        if (!message) continue;
        remindersShown[reminder.id] = now;
        state.remindersShown[reminder.id] = now;
        saveState(true);
        showToast(reminder.title, message);
        break;
      }
    }

    function haptic(pattern = 18) {
      if ("vibrate" in navigator) navigator.vibrate(pattern);
    }

    function queueRecoveryPrompt(type, key, title) {
      setTimeout(() => {
        ui.pendingRecovery = { type, key, title };
        render();
      }, 1200);
    }

    function moveTab(direction) {
      if (!userProfile) return;
      const tabs = ["today", "training", "progress", "nutrition"];
      const current = tabs.indexOf(ui.activeTab);
      const next = Math.max(0, Math.min(tabs.length - 1, current + direction));
      if (next !== current) {
        ui.activeTab = tabs[next];
        render();
      }
    }

    function icon(name) {
      return `<span class="icon" aria-hidden="true">${ICONS[name] || ""}</span>`;
    }

    function escapeAttr(value) {
      return String(value ?? "").replaceAll("&", "&amp;").replaceAll('"', "&quot;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    function escapeHtml(value) {
      return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

      const progress = progressStats();

          <div class="month-stat">

          ${tabButton("today", "target", "Сегодня")}

          ${tabButton("nutrition", "water", "Питание")}

        ${ui.activeTab === "training" ? renderTrainingTab() : ""}
        ${ui.activeTab === "progress" ? renderProgressTab() : ""}
        ${ui.activeTab === "nutrition" ? renderNutritionTab() : ""}
      `;

      bindEvents();

      if (!ui.hasMounted) {

    function tabButton(id, iconName, label) {

    }

      return `

          <div class="panel">

            <p class="top-copy">Вес в упражнениях начинается с нуля/минимума. Приложение будет подбирать рабочий вес по RPE 6-7, а не бросать тебя под 40 кг.</p>
            <div class="onboarding-grid">
              <label>
                <span class="subtle">Имя</span>

              ${["Новичок", "После перерыва", "Уверенный", "Продвинутый"].map(item => `
                <button type="button" class="rpe-button ${draft.experience === item ? "active" : ""}" style="--rpe:var(--green)" data-action="profile-experience" data-value="${escapeAttr(item)}">${escapeHtml(item)}</button>

    function profileDraft() {
      if (!ui.profileDraft) {
        ui.profileDraft = {
          name: "",
          bodyWeight: "70",
          experience: "После перерыва",
          gymDays: [1, 3, 5]
        };
      }
      return ui.profileDraft;
    }

    function syncProfileDraftFromDom() {
      document.querySelectorAll("[data-profile-field]").forEach(input => {
        profileDraft()[input.dataset.profileField] = input.value;
      });
    }

    function weekdayName(date = new Date()) {
      return date.toLocaleDateString("ru-RU", { weekday: "long" });
    }

    function todayPlan(date = new Date()) {
      return PLAN_BY_WEEKDAY[date.getDay()] || PLAN_BY_WEEKDAY[0];
    }

    function todayYogaProgram(date = new Date()) {
      return YOGA_PROGRAMS.find(item => item.day === date.getDay()) || YOGA_PROGRAMS[0];
    }

    function currentHomeWorkout(date = new Date()) {
      const plan = todayPlan(date);
      const slot = plan.slot || (date.getDay() === 4 ? "thu" : "tue");
      const yearStart = startOfWeek(new Date(date.getFullYear(), 0, 1));
      const weekNo = Math.floor((startOfWeek(date) - yearStart) / (7 * 24 * 60 * 60 * 1000));
      const candidates = HOME_WORKOUTS.filter(item => item.slot === slot);
      return candidates[Math.abs(weekNo) % candidates.length] || HOME_WORKOUTS[0];
    }

    function homeSetKey(workoutId, roundIdx, exIdx, date = TODAY_KEY) {
      return `${date}-${workoutId}-r${roundIdx}-e${exIdx}`;
    }

    function homeProgress(workout = currentHomeWorkout()) {
      let done = 0;
      const total = 3 * workout.exercises.length;
      for (let roundIdx = 0; roundIdx < 3; roundIdx++) {
        workout.exercises.forEach((_, exIdx) => {
          if (state.homeDone[homeSetKey(workout.id, roundIdx, exIdx)]) done++;
        });
      }
      return { done, total, pct: total ? Math.round((done / total) * 100) : 0, complete: done === total };
    }

    function yogaDayState(program = todayYogaProgram()) {
      if (!state.yogaProgress[TODAY_KEY]) {
        state.yogaProgress[TODAY_KEY] = { programId: program.name, poseIdx: 0, done: false };
      }
      return state.yogaProgress[TODAY_KEY];
    }

    function renderTodayTab() {
      const plan = todayPlan();
      const yoga = todayYogaProgram();
      const gymDayIdx = plan.type === "gym" ? plan.dayIdx : state.dayIdx;
      const gymProgress = workoutProgress(state.weekIdx, gymDayIdx);
      const home = currentHomeWorkout();
      const homeStats = homeProgress(home);
      const yogaState = yogaDayState(yoga);
      const recovery = recoveryScore();
      const workoutPct = plan.type === "gym" ? gymProgress.pct : plan.type === "home" ? homeStats.pct : yogaState.done ? 100 : 0;
      return `
        <div class="layout">
          <section class="stack">
            <div class="workout-head today-hero" style="--accent:${plan.type === "gym" ? currentWeek().days[gymDayIdx].color : plan.type === "home" ? "var(--cyan)" : "var(--green)"}; --pct:${plan.type === "gym" ? gymProgress.pct : plan.type === "home" ? homeStats.pct : yogaState.done ? 100 : 0}%">
              <div>
                <p class="eyebrow">${escapeHtml(new Date().toLocaleDateString("ru-RU", { day: "2-digit", month: "long" }))}</p>
                <h2>Центр тренировки</h2>
                <div class="workout-meta">
                  <span class="pill">${icon("activity")}Готовность ${recovery.value}%</span>
                  <span class="pill">${icon("stretch")}Йога каждое утро</span>
                  <span class="pill">${plan.type === "gym" ? `${gymProgress.doneSets}/${gymProgress.totalSets} подходов` : plan.type === "home" ? `${homeStats.done}/${homeStats.total} кругов/упр.` : "мягкое восстановление"}</span>
                </div>
                <div class="today-command-grid">
                  <div class="today-command-chip"><strong>${escapeHtml(plan.label)}</strong><span>сегодня по плану</span></div>
                  <div class="today-command-chip"><strong>${workoutPct}%</strong><span>готово сейчас</span></div>
                  <div class="today-command-chip"><strong>${escapeHtml(nextWorkoutLabel())}</strong><span>следующая</span></div>
                </div>
              </div>
              <div class="progress-ring" style="--accent:var(--green); --pct:${workoutPct}%"><span>${workoutPct}%</span></div>
            </div>
            ${renderRecoveryBar()}

            <div class="today-grid">
              ${todayCard("yoga", "stretch", "Йога", yoga.name, yogaState.done ? "готово" : `${yoga.poses.length} поз`, "var(--green)")}
              ${todayCard(plan.type, plan.type === "gym" ? "dumbbell" : plan.type === "home" ? "activity" : "shield", plan.label, plan.type === "gym" ? currentWeek().days[gymDayIdx].focus : plan.type === "home" ? home.name : "Растяжка и прогулка", plan.type === "gym" ? `${gymProgress.doneSets}/${gymProgress.totalSets}` : plan.type === "home" ? `${homeStats.done}/${homeStats.total}` : "легко", plan.type === "gym" ? currentWeek().days[gymDayIdx].color : "var(--cyan)")}
              ${todayCard("nutrition", "water", "Питание", "вода, еда до тренировки, белок после", `${dailyState().water}/6 воды`, "var(--cyan)")}
            </div>
          </section>
          <aside class="stack side-column">
            ${renderTimerPanel()}
            ${renderNutritionPanel()}
            ${renderIphonePanel(progressStats())}
          </aside>
        </div>
      `;
    }

    function todayCard(mode, iconName, title, text, meta, color) {
      return `
        <button type="button" class="today-card" style="--accent:${color}" data-action="today-open" data-mode="${mode}">
          <span class="muscle-dot">${icon(iconName)}</span>
          <span>
            <strong>${escapeHtml(title)}</strong>
            <span>${escapeHtml(text)}</span>
            <em>${escapeHtml(meta)}</em>
          </span>
        </button>
      `;
    }

    function renderTrainingTab() {
      return `
        <section class="mode-shell">
          <div class="mode-tabs">
            ${modeButton("gym", "dumbbell", "Зал")}
            ${modeButton("home", "activity", "Дом")}
            ${modeButton("yoga", "stretch", "Йога")}
          </div>
        </section>
        ${ui.trainingMode === "gym" ? renderWorkoutTab() : ""}
        ${ui.trainingMode === "home" ? renderHomeTrainingTab() : ""}
        ${ui.trainingMode === "yoga" ? renderYogaTrainingTab() : ""}
      `;
    }

    function modeButton(id, iconName, label) {
      return `<button type="button" class="${ui.trainingMode === id ? "active" : ""}" data-action="mode" data-mode="${id}">${icon(iconName)}${escapeHtml(label)}</button>`;
    }

    function renderHomeTrainingTab() {
      const workout = currentHomeWorkout();
      const progress = homeProgress(workout);
      return `
        <div class="layout">
          <section class="stack">
            <div class="workout-head" style="--accent:var(--cyan); --pct:${progress.pct}%">
              <div>
                <p class="eyebrow">Дом · 3 круга · 40/20</p>
                <h2>${escapeHtml(workout.name)}</h2>
                <div class="workout-meta">
                  <span class="pill">${escapeHtml(workout.focus)}</span>
                  <span class="pill">${progress.done}/${progress.total} отмечено</span>
                  <span class="pill">20-30 мин</span>
                </div>
              </div>
              <div class="progress-ring" style="--accent:var(--cyan); --pct:${progress.pct}%"><span>${progress.pct}%</span></div>
            </div>
            ${Array.from({ length: 3 }, (_, roundIdx) => `
              <section class="panel">
                <div class="section-title">
                  <h2>Круг ${roundIdx + 1}</h2>
                  <small>40 сек работа · 20 сек отдых</small>
                </div>
                <div class="check-list">
                  ${workout.exercises.map((name, exIdx) => {
                    const key = homeSetKey(workout.id, roundIdx, exIdx);
                    const done = !!state.homeDone[key];
                    return `
                      <div class="home-row">
                        <button type="button" class="check-box ${done ? "done" : ""}" data-action="home-check" data-key="${key}" title="Отметить">${done ? ICONS.check : ""}</button>
                        <span>${escapeHtml(name)}</span>
                        <button type="button" class="icon-button" data-action="home-timer" title="40 секунд">${ICONS.timer}</button>
                      </div>
                    `;
                  }).join("")}
                </div>
              </section>
            `).join("")}
            <section class="panel">
              <button type="button" class="finish-button ${progress.complete ? "complete" : ""}" data-action="home-finish" ${progress.complete ? "" : "disabled"}>${icon("check")}Домашняя тренировка готова</button>
            </section>
          </section>
          <aside class="stack side-column">
            ${renderTimerPanel()}
            ${renderNutritionPanel()}
          </aside>
        </div>
      `;
    }

    function renderYogaTrainingTab() {
      const program = todayYogaProgram();
      const yState = yogaDayState(program);
      const activePose = program.poses[Math.min(yState.poseIdx, program.poses.length - 1)];
      const pct = yState.done ? 100 : Math.round((yState.poseIdx / program.poses.length) * 100);
      return `
        <div class="layout">
          <section class="stack">
            <div class="workout-head" style="--accent:var(--green); --pct:${pct}%">
              <div>
                <p class="eyebrow">Йога · 10-15 минут</p>
                <h2>${escapeHtml(program.name)}</h2>
                <div class="workout-meta">
                  <span class="pill">${yState.done ? "готово" : `поза ${Math.min(yState.poseIdx + 1, program.poses.length)}/${program.poses.length}`}</span>
                  <span class="pill">${activePose ? `${activePose[1]} сек` : "готово"}</span>
                </div>
              </div>
              <div class="progress-ring" style="--accent:var(--green); --pct:${pct}%"><span>${pct}%</span></div>
            </div>
            <section class="panel yoga-focus">
              <div class="yoga-icon">${icon(program.icon)}</div>
              <h2>${escapeHtml(activePose ? activePose[0] : "Практика готова")}</h2>
              <div class="compact-actions">
                ${activePose ? `<button type="button" data-action="yoga-start-pose" data-seconds="${activePose[1]}" data-label="${escapeAttr(activePose[0])}">${icon("timer")}Таймер позы</button>` : ""}
                <button type="button" data-action="yoga-next">${yState.done ? "Сбросить" : "Следующая поза"}</button>
                <a class="button" href="${escapeAttr(program.youtube)}" target="_blank" rel="noreferrer">${icon("video")}YouTube</a>
              </div>
            </section>
            <section class="panel">
              <div class="check-list">
                ${program.poses.map(([name, seconds], idx) => `
                  <div class="check-item">
                    <button type="button" class="check-box ${yState.done || idx < yState.poseIdx ? "done" : ""}" data-action="yoga-jump" data-pose="${idx}" title="Перейти">${yState.done || idx < yState.poseIdx ? ICONS.check : ""}</button>
                    <span>${escapeHtml(name)} · ${seconds} сек</span>
                  </div>
                `).join("")}
              </div>
              <button type="button" class="finish-button ${yState.done ? "complete" : ""}" data-action="yoga-finish">${icon("check")}${yState.done ? "Йога записана" : "Завершить йогу"}</button>
            </section>
          </section>
          <aside class="stack side-column">
            ${renderTimerPanel()}
            ${renderQuickStats()}
          </aside>
        </div>
      `;
    }

    function renderNutritionTab() {
      return `
        <div class="layout">
          <section class="stack">
            ${renderNutritionPanel()}
            <section class="panel">
              <div class="section-title">
                <h2>${icon("food")}Мини-план дня</h2>
                <small>простые напоминалки</small>
              </div>
              <div class="check-list">
                ${["За 1-2 часа до тренировки: нормальная еда, не пустой желудок.", "Во время тренировки: вода маленькими глотками.", "После: белок и обычная еда, без паники и наказаний.", "Если болит сустав или резкая боль: снизь вес и запиши RPE 10."].map(item => `
                  <div class="check-item"><span class="check-box done">${ICONS.check}</span><span>${escapeHtml(item)}</span></div>
                `).join("")}
              </div>
            </section>
          </section>
          <aside class="stack side-column">
            ${renderIphonePanel(progressStats())}
            ${renderExportPanel()}
          </aside>
        </div>
      `;
    }

    function renderWorkoutTab() {
      const week = currentWeek();
      const workout = currentWorkout();
      const progress = workoutProgress();
      return `
        <div class="layout">
          <section class="stack">
            <div class="panel">
              <div class="section-title">
                <h2>${escapeHtml(phaseMeta(week).label)} · ${escapeHtml(phaseMeta(week).title)}</h2>
                <small>${escapeHtml(week.tag)}</small>
              </div>
              ${renderPhaseWeekSelector()}
            </div>

            <div class="panel">
              <div class="section-title">
                <h2>День</h2>
                <small>${escapeHtml(workout.schedule)}</small>
              </div>
              <div class="day-grid">
                ${week.days.map((day, idx) => {
                  const p = workoutProgress(state.weekIdx, idx);
                  return `
                    <button type="button" class="day-card ${idx === state.dayIdx ? "active" : ""}" style="--accent:${day.color}" data-action="day" data-day="${idx}">
                      <strong>${day.type}</strong>
                      <span>${escapeHtml(day.typeLabel)}</span>
                      <span>${p.doneExercises}/${p.totalExercises} упр.</span>
                    </button>
                  `;
                }).join("")}
              </div>
            </div>

            <div class="workout-head" style="--accent:${workout.color}; --pct:${progress.pct}%">
              <div>
                <p class="eyebrow">${escapeHtml(workout.schedule)} · тренировка ${escapeHtml(workout.type)}</p>
                <h2>${escapeHtml(workout.focus)}</h2>
                <div class="workout-meta">
                  <span class="pill">${progress.doneExercises}/${progress.totalExercises} упражнений</span>
                  <span class="pill">${progress.doneSets}/${progress.totalSets} подходов</span>
                  <span class="pill">~45 мин</span>
                </div>
              </div>
              <div class="progress-ring" style="--accent:${workout.color}; --pct:${progress.pct}%"><span>${progress.pct}%</span></div>
            </div>

            ${renderWarmup()}

            <section class="stack">
              <div class="section-title">
                <h2>Упражнения</h2>
                <small>веса и повторы сохраняются</small>
              </div>
              ${workout.exercises.map((item, exIdx) => renderExercise(state.weekIdx, state.dayIdx, exIdx)).join("")}

            ${renderStretch()}
            ${renderFinish()}
          </section>

          <aside class="stack side-column">
            ${renderTimerPanel()}
            ${renderQuickStats()}
            ${renderNutritionPanel()}
          </aside>
        </div>
      `;

    function renderPhaseWeekSelector() {
      return `
        <div class="phase-grid">
          ${phaseGroups().map(group => `
            <div class="phase-group ${group.indexes.includes(state.weekIdx) ? "active" : ""}">
              <div class="phase-group-head">
                <strong>${escapeHtml(group.label)}</strong>
                <span>${escapeHtml(group.range)}</span>
              </div>
              <div class="week-grid">
                ${group.indexes.map(idx => {
                  const item = PLAN[idx];
                  if (!item) return "";
                  return `
                    <button type="button" class="week-card ${idx === state.weekIdx ? "active" : ""}" data-action="week" data-week="${idx}">
                      <span class="num">${item.week}</span>
                      <span class="label">${escapeHtml(item.label)}</span>
                      <div class="tiny-bar"><span style="width:${weekProgress(idx)}%"></span></div>
                    </button>

                }).join("")}
              </div>
            </div>

        </div>
      `;

    function renderWarmup() {
      return `
        <section class="panel">
          <button type="button" class="collapsible" data-action="toggle-warmup">
            <span>${icon("dumbbell")}Разминка · 5-7 мин</span>

          ${ui.showWarmup ? `
            <div class="check-list" style="margin-top:12px">
              ${WARMUP.map((item, idx) => {
                const key = `${workoutKey()}-warmup-${idx}`;
                const done = !!state.warmupDone[key];
                return `
                  <div class="check-item">
                    <button type="button" class="check-box ${done ? "done" : ""}" data-action="warmup-check" data-key="${key}" title="Отметить">${done ? ICONS.check : ""}</button>
                    <span>${escapeHtml(item)}</span>
                  </div>
                `;
              }).join("")}
            </div>
          ` : ""}
        </section>
      `;
    }

    function renderExercise(weekIdx, dayIdx, exIdx) {
      const exData = displayExercise(weekIdx, dayIdx, exIdx);
      const base = prescribedExercise(weekIdx, dayIdx, exIdx);
      const eKey = exerciseKey(weekIdx, dayIdx, exIdx);
      const progress = exerciseProgress(weekIdx, dayIdx, exIdx);
      const expanded = ui.expanded === eKey;
      const muscleColor = MUSCLE_COLOR[exData.muscles] || "#a5a1a0";
      const repsLabel = exData.reps >= 25 && exData.planId === "plank" ? `${exData.reps} сек` : exData.reps;
      return `
        <article class="exercise ${progress.complete ? "done" : ""}" style="--muscle:${muscleColor}">
          <button type="button" class="exercise-main" data-action="expand" data-key="${eKey}">
            <span class="muscle-dot">${ICONS.dumbbell}</span>
            <span>
              <span class="exercise-name">
                ${escapeHtml(exData.name)}
                ${exData.isReplacement ? `<span class="replacement-badge">замена</span>` : ""}
              </span>
              <span class="exercise-summary">
                <span class="pill" style="color:${muscleColor}">${escapeHtml(exData.muscles)}</span>
                <span class="pill">${base.sets} × ${escapeHtml(repsLabel)}</span>
                <span class="pill">отдых ${formatTimer(base.restSec)}</span>
                <span class="pill">${progress.done}/${progress.total} подходов</span>
              </span>
            </span>
            <span class="chevron">${expanded ? "⌃" : "⌄"}</span>
          </button>
          ${expanded ? renderExerciseDetail(weekIdx, dayIdx, exIdx, exData, base) : ""}
        </article>
      `;
    }

    function renderExerciseDetail(weekIdx, dayIdx, exIdx, exData, base) {
      const eKey = exerciseKey(weekIdx, dayIdx, exIdx);
      return `
        <div class="exercise-detail">
          <div class="detail-grid">
            <div class="metric"><small>Тренажер</small><strong>${escapeHtml(exData.machine)}</strong></div>
            <div class="metric"><small>Рабочий вес</small><strong>${escapeHtml(adaptiveWeightText(base.planId))}</strong></div>

          </div>

          <div class="cue-list">
            <div><strong style="color:var(--text)">Техника:</strong> ${escapeHtml(exData.tip)}</div>
            ${(exData.cues || []).map(cue => `<div>• ${escapeHtml(cue)}</div>`).join("")}
          </div>

          <div class="detail-actions">
            <a class="button" href="${escapeAttr(exData.video)}" target="_blank" rel="noreferrer">${icon("video")}Видео / GIF</a>
            <button type="button" data-action="timer-start" data-seconds="${base.restSec}" data-label="${escapeAttr(exData.name)}">${icon("timer")}Таймер отдыха</button>
            ${exData.isReplacement ? `<button type="button" data-action="reset-alt" data-key="${eKey}">${icon("swap")}Вернуть базовое</button>` : ""}
          </div>

          <div>
            <div class="section-title">
              <h3>Подходы</h3>
              <small>вес · повторы · готово</small>
            </div>
            <div class="set-list">
              ${Array.from({ length: base.sets }, (_, setIdx) => renderSetRow(weekIdx, dayIdx, exIdx, setIdx, base, exData)).join("")}
            </div>
          </div>

          ${renderExerciseHistoryBlock(weekIdx, dayIdx, exIdx)}
          ${renderProgressionBlock(weekIdx, dayIdx, exIdx, exData)}

          <div>
            <div class="section-title">
              <h3>Если занято</h3>
              <small>${exData.alternatives.length} альтернативы</small>
            </div>
            <div class="alt-grid">
              ${exData.alternatives.map((alt, altIdx) => `
                <button type="button" class="alt-button" data-action="choose-alt" data-key="${eKey}" data-alt="${altIdx}">
                  <span>
                    <strong>${escapeHtml(alt.name)}</strong>
                    <span>${escapeHtml(alt.machine)} · ${escapeHtml(alt.tip)}</span>

          </div>
        </div>

    function renderExerciseHistoryBlock(weekIdx, dayIdx, exIdx) {
      const exerciseId = PLAN[weekIdx].days[dayIdx].exercises[exIdx].id;
      const store = getExerciseStore(exerciseId);
      const history = (store.history || []).slice(-5).reverse();
      const points = history.slice().reverse().map(item => Math.min(100, Math.round(((item.weight || 0) / Math.max(1, store.personalBest?.weight || item.weight || 1)) * 100)));
      return `
        <div>
          <div class="section-title">
            <h3>Дневник упражнения</h3>
            <small>${history.length ? "последние 5 подходов" : "появится после RPE"}</small>
          </div>
          ${history.length ? `
            <div class="history-list">
              ${history.map(item => `
                <div class="history-row">
                  <span>
                    <strong>${item.weight} кг × ${item.reps}</strong>
                    <span>RPE ${item.rpe} · ориентир ${item.recommendation} кг</span>
                  </span>
                  <span class="pill">${formatDateTime(item.date)}</span>
                </div>
              `).join("")}
            </div>
            <svg class="sparkline" viewBox="0 0 100 28" aria-hidden="true">
              <polyline points="${points.map((point, idx) => `${idx * (100 / Math.max(1, points.length - 1))},${26 - point * 0.22}`).join(" ")}" />
            </svg>
          ` : `<div class="empty-state">После первого подхода выбери RPE, и я начну запоминать рабочий вес.</div>`}
        </div>
      `;
    }

    function renderProgressionBlock(weekIdx, dayIdx, exIdx, exData) {
      const suggestion = progressionSuggestion(weekIdx, dayIdx, exIdx);
      if (!suggestion) {
        return `
          <div class="suggestion-card">
            ${icon("target")} Закрой все подходы и отметь сложность. Если было легко или нормально, я предложу следующий вес.
          </div>
        `;
      }
      return `
        <div class="suggestion-card">
          ${icon("sparkles")} Следующий раз попробуй <strong style="color:var(--text)">+${suggestion.step} кг</strong>: ориентир ${suggestion.next} кг на "${escapeHtml(exData.name)}".
        </div>
      `;
    }

    function renderSetRow(weekIdx, dayIdx, exIdx, setIdx, base, exData) {
      const log = getSetLog(weekIdx, dayIdx, exIdx, setIdx);
      return `
        <div class="set-wrap">
          <div class="set-row ${log.done ? "done" : ""}">
            <div class="set-num">${setIdx + 1}</div>
            <label>
              <span class="subtle">кг</span>
              <span class="weight-control">
                <button type="button" data-action="weight-step" data-delta="-${weightStepFor(base.planId)}" data-week="${weekIdx}" data-day="${dayIdx}" data-ex="${exIdx}" data-set="${setIdx}" title="Минус вес">${ICONS.minus}</button>
                <input type="number" min="0" max="500" step="0.5" inputmode="decimal" autocomplete="off" placeholder="кг" value="${escapeAttr(log.weight)}" data-action="weight" data-week="${weekIdx}" data-day="${dayIdx}" data-ex="${exIdx}" data-set="${setIdx}" aria-label="Вес, кг">
                <button type="button" data-action="weight-step" data-delta="${weightStepFor(base.planId)}" data-week="${weekIdx}" data-day="${dayIdx}" data-ex="${exIdx}" data-set="${setIdx}" title="Плюс вес">${ICONS.plus}</button>
              </span>
            </label>
            <label>
              <span class="subtle">${exData.planId === "plank" ? "сек" : "повторы"}</span>
              <span class="rep-control">
                <button type="button" data-action="rep-minus" data-week="${weekIdx}" data-day="${dayIdx}" data-ex="${exIdx}" data-set="${setIdx}" title="Минус">${ICONS.minus}</button>
                <input type="number" min="0" max="500" step="1" inputmode="numeric" autocomplete="off" value="${escapeAttr(log.reps)}" data-action="reps" data-week="${weekIdx}" data-day="${dayIdx}" data-ex="${exIdx}" data-set="${setIdx}" aria-label="Повторы">
                <button type="button" data-action="rep-plus" data-week="${weekIdx}" data-day="${dayIdx}" data-ex="${exIdx}" data-set="${setIdx}" title="Плюс">${ICONS.plus}</button>

    function renderSetRpe(weekIdx, dayIdx, exIdx, setIdx, log) {
      const selected = log.rpe || "";
      const store = getExerciseStore(PLAN[weekIdx].days[dayIdx].exercises[exIdx].id);
      const last = store.history?.slice(-1)[0];
      return `
        <div class="set-rpe">

            ${RPE_OPTIONS.map(option => `

        </section>

    function renderVolumeChart(days) {
      const W = 320;
      const H = 150;
      const padX = 22;
      const padY = 20;
      const max = Math.max(1, ...days.map(day => day.volume));
      const barW = 18;
      const gap = (W - padX * 2 - days.length * barW) / Math.max(1, days.length - 1);
      const points = days.map((day, idx) => {
        const x = padX + idx * (barW + gap) + barW / 2;
        const y = H - padY - (day.volume / max) * (H - padY * 2);
        return `${Math.round(x)},${Math.round(y)}`;
      });
      return `
        <svg class="volume-chart" viewBox="0 0 ${W} ${H}" aria-label="График объема нагрузки за 7 дней">
          ${[0, 1, 2].map(idx => {
            const y = padY + idx * ((H - padY * 2) / 2);
            return `<line class="grid" x1="${padX}" y1="${y}" x2="${W - padX}" y2="${y}"/>`;
          }).join("")}
          ${days.map((day, idx) => {
            const x = padX + idx * (barW + gap);
            const h = Math.max(5, (day.volume / max) * (H - padY * 2));
            const y = H - padY - h;
            return `<rect class="volume-bar" x="${Math.round(x)}" y="${Math.round(y)}" width="${barW}" height="${Math.round(h)}"></rect>`;
          }).join("")}
          <polyline class="volume-line" points="${points.join(" ")}"></polyline>
          ${days.map((day, idx) => {
            const x = padX + idx * (barW + gap) + barW / 2;
            return `<text x="${Math.round(x)}" y="${H - 5}" text-anchor="middle">${escapeHtml(day.label)}</text>`;
          }).join("")}
        </svg>
      `;
    }

    function renderWeightChart(entries) {
      if (entries.length < 2) return `<p class="subtle" style="margin:12px 0">Нужно минимум 2 записи для графика.</p>`;
      const W = 300;
      const H = 80;
      const PAD = 16;
      const weights = entries.map(entry => Number(entry.weight)).filter(Number.isFinite);
      const min = Math.min(...weights) - 1;
      const max = Math.max(...weights) + 1;
      const points = entries.map((entry, idx) => {
        const x = PAD + (idx / Math.max(1, entries.length - 1)) * (W - PAD * 2);
        const y = H - PAD - ((entry.weight - min) / Math.max(1, max - min)) * (H - PAD * 2);
        return `${Math.round(x * 10) / 10},${Math.round(y * 10) / 10}`;
      });
      const dots = points.map(point => {
        const [x, y] = point.split(",");
        return `<circle cx="${x}" cy="${y}" r="3" fill="var(--green)"/>`;
      }).join("");
      const [lastX, lastY] = points[points.length - 1].split(",");
      return `
        <svg viewBox="0 0 ${W} ${H}" class="weight-chart-svg" aria-label="График веса тела">
          <polyline points="${points.join(" ")}" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          ${dots}
          <circle cx="${lastX}" cy="${lastY}" r="5" fill="var(--green)" stroke="var(--surface)" stroke-width="2"/>
        </svg>
      `;
    }
