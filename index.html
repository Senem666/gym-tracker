<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Gymper</title>
  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gymper" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="app_icon_strength_crest_180.png" />
  <link rel="icon" href="gym-icon.svg" type="image/svg+xml" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #07080d;
      --surface: #0e0f18;
      --surface-2: #13152a;
      --surface-3: #1a1d35;
      --surface-4: #22264a;
      --card-line: rgba(139, 135, 184, 0.16);
      --line: rgba(240, 238, 255, 0.09);
      --line-strong: rgba(240, 238, 255, 0.18);
      --text: #f0eeff;
      --muted: #8b87b8;
      --dim: #4a4870;
      --accent: #7c3aed;
      --accent-2: #6366f1;
      --accent-glow: rgba(124, 58, 237, 0.25);
      --accent-soft: rgba(124, 58, 237, 0.12);
      --green: #2fd883;
      --green-soft: rgba(47, 216, 131, 0.14);
      --red: #ff5d6c;
      --red-soft: rgba(255, 93, 108, 0.14);
      --amber: #ffad32;
      --amber-soft: rgba(255, 173, 50, 0.16);
      --cyan: #38c7e8;
      --cyan-soft: rgba(56, 199, 232, 0.14);
      --violet: var(--accent);
      --pink: #e85c9f;
      --blue: #6366f1;
      --gold: #ffd166;
      --radius: 8px;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.38);
      --soft-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
      --card-shadow: 0 14px 36px rgba(0, 0, 0, 0.24);
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
      --ease-spring: cubic-bezier(0.2, 0.9, 0.22, 1.08);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    html {
      min-width: 320px;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(124, 58, 237, 0.16), transparent 250px),
        linear-gradient(135deg, rgba(99, 102, 241, 0.12), transparent 42%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      user-select: none;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button,
    a.button {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--text);
      cursor: pointer;
      line-height: 1.18;
      transition: transform 150ms var(--ease-out), border-color 180ms ease, background 180ms ease, color 180ms ease, box-shadow 180ms ease;
      text-decoration: none;
    }

    button:active,
    a.button:active {
      transform: scale(0.97);
    }

    @media (hover: hover) and (pointer: fine) {
      button:hover,
      a.button:hover {
        border-color: var(--line-strong);
        background: var(--surface-3);
      }
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.46;
    }

    input[type="number"],
    input[type="text"] {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      color: var(--text);
      padding: 10px 9px;
      outline: none;
      user-select: text;
    }

    input[type="number"]:focus,
    input[type="text"]:focus {
      border-color: rgba(124, 58, 237, 0.64);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .app-shell {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: calc(22px + env(safe-area-inset-top)) 0 calc(120px + env(safe-area-inset-bottom));
      animation: appEnter 240ms var(--ease-out) both;
    }

    .app-shell.motion-settled {
      animation: none;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      padding: 18px 0 16px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(28px, 4vw, 50px);
      line-height: 0.98;
      font-weight: 850;
      letter-spacing: 0;
    }

    .top-copy {
      margin-top: 10px;
      color: var(--muted);
      max-width: 620px;
      line-height: 1.55;
      font-size: 15px;
    }

    .month-stat {
      display: grid;
      min-width: 178px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.035);
      box-shadow: var(--shadow);
    }

    .month-stat strong {
      color: var(--green);
      font-size: 34px;
      line-height: 1;
    }

    .month-stat span {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .nav-tabs {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin: 18px 0 16px;
    }

    .nav-tabs button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 12px;
      color: var(--muted);
      font-weight: 750;
    }

    .nav-tabs button.active {
      color: var(--text);
      border-color: rgba(124, 58, 237, 0.64);
      background: var(--accent-soft);
      box-shadow: 0 12px 30px rgba(124, 58, 237, 0.16);
    }

    .nav-tabs button.active::after,
    .mode-tabs button.active::after {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 5px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      animation: tabLine 220ms ease both;
    }

    .nav-tabs button,
    .mode-tabs button {
      position: relative;
    }

    .icon {
      width: 18px;
      height: 18px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      overflow: hidden;
    }

    .icon svg {
      width: 100%;
      height: 100%;
    }

    .app-brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      letter-spacing: 0;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 350px;
      gap: 16px;
      align-items: start;
      animation: tabIn 220ms ease both;
    }

    .onboarding {
      min-height: calc(100vh - 80px);
      display: grid;
      place-items: center;
      padding: 22px 0;
    }

    .onboarding > .panel {
      width: min(620px, 100%);
    }

    .onboarding-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .mode-shell {
      margin-bottom: 14px;
      animation: tabIn 220ms ease both;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .mode-tabs button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 46px;
      color: var(--muted);
      font-weight: 800;
    }

    .mode-tabs button.active {
      color: var(--text);
      border-color: rgba(124, 58, 237, 0.58);
      background: var(--accent-soft);
    }

    .today-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .today-card {
      width: 100%;
      min-height: 126px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 11px;
      align-items: start;
      padding: 12px;
      text-align: left;
      border-color: color-mix(in srgb, var(--accent), transparent 62%);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent), transparent 86%), transparent 62%),
        var(--surface);
      color: var(--text);
      box-shadow: var(--card-shadow);
    }

    .today-card .muscle-dot {
      --muscle: var(--accent);
    }

    .today-card strong,
    .today-card span,
    .today-card em {
      display: block;
      min-width: 0;
    }

    .today-card strong {
      font-size: 16px;
      line-height: 1.25;
    }

    .today-card span span {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .today-card em {
      margin-top: 8px;
      color: color-mix(in srgb, var(--accent), white 24%);
      font-size: 12px;
      font-style: normal;
      font-weight: 800;
    }

    .today-command-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .today-command-chip {
      min-width: 0;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(240, 238, 255, 0.055);
    }

    .today-command-chip strong {
      display: block;
      color: var(--text);
      font-size: 17px;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .today-command-chip span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .recovery-bar {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 9px;
      align-items: center;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--muted);
      font-size: 12px;
      box-shadow: var(--card-shadow);
    }

    .recovery-bar.warning {
      border-color: rgba(239, 83, 80, 0.36);
      background: rgba(239, 83, 80, 0.08);
    }

    .recovery-track {
      height: 8px;
      border-radius: 999px;
      background: rgba(240, 238, 255, 0.08);
      overflow: hidden;
    }

    .recovery-fill {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      transform: scaleX(var(--bar-scale, 0));
      transform-origin: left center;
      transition: transform 220ms var(--ease-out), background 180ms ease;
    }

    .recovery-value,
    .recovery-label {
      font-weight: 800;
      white-space: nowrap;
    }

    .recovery-bar small {
      grid-column: 1 / -1;
      color: var(--red);
      line-height: 1.35;
    }

    .recovery-overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 16px;
      background: rgba(0, 0, 0, 0.42);
      z-index: 25;
      animation: toastIn 220ms ease both;
    }

    .recovery-card {
      width: min(420px, 100%);
      box-shadow: var(--shadow);
    }

    .recovery-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .recovery-options button {
      display: grid;
      gap: 4px;
      justify-items: center;
      min-height: 78px;
      padding: 10px;
    }

    .recovery-options strong {
      font-size: 24px;
      line-height: 1;
    }

    .recovery-options span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    .home-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    .home-row:last-child {
      border-bottom: 0;
    }

    .yoga-focus {
      display: grid;
      gap: 12px;
      justify-items: start;
      overflow: hidden;
    }

    .yoga-focus h2 {
      font-size: 26px;
      line-height: 1.1;
    }

    .yoga-icon {
      width: 70px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 18px;
      border: 1px solid rgba(47, 199, 121, 0.28);
      background: rgba(47, 199, 121, 0.1);
      color: var(--green);
      animation: breathe 2200ms ease-in-out infinite;
      will-change: transform, opacity;
    }

    .yoga-icon svg {
      width: 34px;
      height: 34px;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .panel,
    .exercise,
    .set-row,
    .history-row {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(240, 238, 255, 0.035), rgba(240, 238, 255, 0.012)), var(--surface-2);
      color: var(--text);
      box-shadow: var(--card-shadow);
    }

    .panel {
      padding: 14px;
      animation: riseIn 240ms var(--ease-out) both;
    }

    .panel button:not(.finish-button),
    .panel a.button,
    .exercise button:not(.exercise-main):not(.set-check),
    .set-row button:not(.set-check) {
      background: rgba(240, 238, 255, 0.055);
      color: var(--text);
      border-color: var(--line);
    }

    .panel button:not(.finish-button):active,
    .panel a.button:active,
    .exercise button:not(.exercise-main):not(.set-check):active,
    .set-row button:not(.set-check):active {
      background: rgba(124, 58, 237, 0.18);
    }

    .panel input[type="number"],
    .panel input[type="text"],
    .exercise input[type="number"],
    .exercise input[type="text"],
    .set-row input[type="number"],
    .set-row input[type="text"] {
      background: rgba(7, 8, 13, 0.72);
      color: var(--text);
      border-color: var(--line);
    }

    .app-shell.motion-settled .panel,
    .app-shell.motion-settled .exercise,
    .app-shell.motion-settled .workout-head,
    .app-shell.motion-settled .progress-hero {
      animation: none;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title h2,
    .section-title h3 {
      font-size: 15px;
      line-height: 1.25;
      font-weight: 830;
    }

    .section-title small,
    .subtle {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .phase-grid {
      display: grid;
      gap: 10px;
    }

    .phase-group {
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(23, 24, 25, 0.03);
    }

    .phase-group.active {
      border-color: rgba(47, 199, 121, 0.34);
      background: rgba(47, 199, 121, 0.1);
    }

    .phase-group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .phase-group-head strong,
    .phase-group-head span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .phase-group-head span {
      color: var(--dim);
      font-weight: 700;
    }

    .week-card {
      min-height: 82px;
      padding: 9px;
      text-align: left;
      background: var(--surface);
      overflow: hidden;
    }

    .week-card.active {
      border-color: rgba(47, 199, 121, 0.58);
      background: rgba(47, 199, 121, 0.11);
      box-shadow: 0 0 0 1px rgba(47, 199, 121, 0.08), 0 14px 34px rgba(47, 199, 121, 0.08);
    }

    .week-card .num {
      display: block;
      font-size: 24px;
      font-weight: 850;
      line-height: 1;
    }

    .week-card .label {
      display: -webkit-box;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      overflow: hidden;
      line-height: 1.18;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .tiny-bar {
      height: 4px;
      margin-top: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(23, 24, 25, 0.08);
    }

    .tiny-bar span {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transform: scaleX(var(--bar-scale, 0));
      transform-origin: left center;
      transition: transform 220ms var(--ease-out), background 180ms ease;
    }

    .day-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .day-card {
      min-width: 0;
      min-height: 58px;
      padding: 8px 4px;
      text-align: center;
      background: rgba(124, 58, 237, 0.08);
    }

    .day-card.active {
      background: color-mix(in srgb, var(--accent), transparent 88%);
      border-color: color-mix(in srgb, var(--accent), transparent 42%);
      box-shadow: 0 10px 30px color-mix(in srgb, var(--accent), transparent 88%);
    }

    .day-card strong {
      display: block;
      font-size: 16px;
    }

    .day-card span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .workout-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 16px;
      border: 1px solid color-mix(in srgb, var(--accent), transparent 68%);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent), transparent 84%), transparent 64%),
        var(--surface-2);
      color: var(--text);
      box-shadow: var(--soft-shadow);
      animation: riseIn 240ms var(--ease-out) both;
    }

    .workout-head h2 {
      font-size: 22px;
      line-height: 1.12;
    }

    .workout-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      max-width: 100%;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(240, 238, 255, 0.055);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .progress-ring {
      width: 82px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: conic-gradient(var(--accent) var(--pct), rgba(240, 238, 255, 0.08) 0);
      position: relative;
      color: var(--text);
      font-size: 20px;
      font-weight: 850;
      transition: background 420ms ease;
    }

    .progress-ring::before {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: inherit;
      background: var(--surface);
    }

    .progress-ring span {
      position: relative;
    }

    .collapsible {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      text-align: left;
      background: var(--surface);
    }

    .check-list {
      display: grid;
      gap: 8px;
    }

    .check-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      line-height: 1.45;
      font-size: 13px;
    }

    .check-item:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .check-box {
      width: 32px;
      min-width: 32px;
      height: 32px;
      min-height: 32px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: rgba(240, 238, 255, 0.06);
      color: transparent;
      cursor: pointer;
      margin-top: 0;
      padding: 0;
      box-shadow: inset 0 1px 0 rgba(240, 238, 255, 0.09);
      transition: transform 150ms var(--ease-out), background 180ms ease, border-color 180ms ease, color 180ms ease, box-shadow 180ms ease;
    }

    .check-box svg {
      width: 17px;
      height: 17px;
    }

    .check-box:active {
      transform: scale(0.94);
    }

    .check-box.done {
      border-color: var(--green);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0)),
        var(--green);
      color: #06130c;
      box-shadow: 0 8px 18px rgba(47, 199, 121, 0.2);
      animation: checkPop 260ms var(--ease-spring);
    }

    .exercise {
      overflow: hidden;
      background: var(--surface);
      animation: riseIn 220ms var(--ease-out) both;
      transition: border-color 180ms ease, background 180ms ease, transform 180ms var(--ease-out), box-shadow 180ms ease;
    }

    @media (hover: hover) and (pointer: fine) {
      .exercise:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 36px rgba(11, 12, 14, 0.14);
      }
    }

    .exercise-main {
      width: 100%;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 86px;
      padding: 13px;
      border: 0;
      border-radius: 0;
      background: transparent;
      text-align: left;
    }

    .exercise.done .exercise-main {
      background: rgba(47, 199, 121, 0.08);
    }

    .muscle-dot {
      width: 42px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: color-mix(in srgb, var(--muscle), transparent 82%);
      border: 1px solid color-mix(in srgb, var(--muscle), transparent 52%);
      transition: transform 220ms var(--ease-spring);
    }

    .muscle-dot svg {
      width: 23px;
      height: 23px;
      color: var(--muscle);
    }

    .exercise-name {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
      color: var(--text);
      font-weight: 820;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .replacement-badge {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(243, 169, 40, 0.16);
      color: var(--amber);
      font-size: 11px;
      font-weight: 800;
    }

    .exercise-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 8px;
    }

    .chevron {
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
    }

    .exercise-detail {
      display: grid;
      gap: 12px;
      padding: 0 13px 13px;
      animation: detailIn 300ms ease both;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      min-width: 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(23, 24, 25, 0.035);
    }

    .metric small {
      display: block;
      color: var(--dim);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .metric strong {
      display: block;
      margin-top: 5px;
      color: var(--text);
      font-size: 13px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .cue-list {
      display: grid;
      gap: 7px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(23, 24, 25, 0.035);
    }

    .cue-list div {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.48;
    }

    .set-list {
      display: grid;
      gap: 8px;
    }

    .set-wrap {
      display: grid;
      gap: 7px;
    }

    .set-row {
      display: grid;
      grid-template-columns: 42px minmax(126px, 1fr) minmax(112px, 1fr) 44px;
      gap: 8px;
      align-items: center;
      padding: 8px;
      background: rgba(23, 24, 25, 0.025);
    }

    .set-row label {
      min-width: 0;
    }

    .set-row label > .subtle {
      display: block;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .set-row.done {
      border-color: rgba(47, 199, 121, 0.34);
      background: rgba(47, 199, 121, 0.07);
      animation: checkGlow 420ms ease;
    }

    .set-num {
      width: 34px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--muted);
      font-weight: 850;
      font-size: 13px;
    }

    .rep-control {
      display: grid;
      grid-template-columns: 34px minmax(38px, 1fr) 34px;
      gap: 5px;
      align-items: center;
      min-width: 0;
    }

    .weight-control {
      display: grid;
      grid-template-columns: 44px minmax(54px, 1fr) 44px;
      gap: 5px;
      align-items: center;
      min-width: 0;
    }

    .rep-control button,
    .weight-control button,
    .set-check,
    .timer-actions button,
    .water-stepper button,
    .icon-button {
      display: grid;
      place-items: center;
      width: 44px;
      min-width: 44px;
      padding: 0;
      aspect-ratio: 1;
    }

    .rep-control input,
    .weight-control input {
      text-align: center;
      padding-left: 4px;
      padding-right: 4px;
    }

    .set-rpe {
      padding: 10px;
      border: 1px solid rgba(50, 182, 216, 0.2);
      border-radius: var(--radius);
      background: rgba(50, 182, 216, 0.055);
      animation: detailIn 220ms ease both;
    }

    .set-rpe-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .set-rpe-title strong,
    .set-rpe-title span {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .exercise.shake {
      animation: shakeCard 280ms ease both;
    }

    .set-check.done {
      background: var(--green);
      color: #06130c;
      border-color: var(--green);
      animation: checkPop 260ms var(--ease-spring);
    }

    .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .detail-actions .button,
    .detail-actions button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      padding: 8px 11px;
      color: var(--text);
      font-weight: 760;
      font-size: 13px;
    }

    .alt-grid {
      display: grid;
      gap: 8px;
    }

    .alt-button {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      width: 100%;
      min-height: 58px;
      padding: 10px;
      text-align: left;
      background: rgba(23, 24, 25, 0.04);
    }

    .alt-button strong {
      display: block;
      font-size: 13px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .alt-button span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .timer-panel {
      position: sticky;
      top: 12px;
      z-index: 3;
    }

    .timer-face {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }

    .timer-circle {
      width: 98px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: conic-gradient(var(--cyan) var(--timer-pct), rgba(255, 255, 255, 0.08) 0);
      position: relative;
      transition: background 360ms linear;
    }

    .timer-circle::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: inherit;
      background: var(--surface);
    }

    .timer-circle strong {
      position: relative;
      font-size: 24px;
      letter-spacing: 0;
    }

    .timer-label {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .timer-actions,
    .water-stepper,
    .compact-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .compact-actions button {
      min-width: 0;
      min-height: 36px;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 760;
      overflow-wrap: anywhere;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .stat-tile {
      min-width: 0;
      padding: 11px 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(23, 24, 25, 0.035);
    }

    .stat-tile strong {
      display: block;
      color: var(--text);
      font-size: 22px;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .stat-tile span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .water-meter {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 6px;
      margin-top: 9px;
    }

    .water-cup {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(50, 182, 216, 0.12);
      position: relative;
      overflow: hidden;
    }

    .water-cup.filled::before {
      content: "";
      position: absolute;
      inset: 28% 0 0;
      background: var(--cyan);
      animation: waterRise 260ms ease both;
    }

    .nutrition-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    .nutrition-row:last-child {
      border-bottom: 0;
    }

    .finish-button {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      min-height: 48px;
      margin-top: 12px;
      border-color: rgba(47, 199, 121, 0.42);
      background: rgba(47, 199, 121, 0.14);
      font-weight: 850;
    }

    .finish-button.complete {
      color: #07140d;
      border-color: var(--green);
      background: var(--green);
      animation: checkPop 300ms var(--ease-spring);
    }

    .history-list {
      display: grid;
      gap: 8px;
    }

    .history-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      background: rgba(23, 24, 25, 0.03);
    }

    .history-row strong {
      display: block;
      font-size: 13px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .history-row span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .sparkline {
      width: 100%;
      height: 34px;
      margin-top: 9px;
      overflow: visible;
    }

    .sparkline polyline {
      fill: none;
      stroke: var(--green);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 4px 10px rgba(47, 199, 121, 0.25));
    }

    .empty-state {
      padding: 22px 12px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
      line-height: 1.45;
      font-size: 13px;
    }

    .library-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .library-item {
      display: grid;
      gap: 9px;
      min-height: 164px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .library-item h3 {
      font-size: 15px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .library-item p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .library-item a {
      align-self: end;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 36px;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 760;
    }

    .toast {
      display: none !important;
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: min(340px, calc(100% - 36px));
      padding: 13px 14px;
      border: 1px solid rgba(50, 182, 216, 0.44);
      border-radius: var(--radius);
      background: #151b21;
      color: var(--text);
      box-shadow: var(--shadow);
      z-index: 20;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity 190ms var(--ease-out), transform 190ms var(--ease-out), visibility 0s linear 190ms;
    }

    .toast.show {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0);
      transition: opacity 220ms var(--ease-out), transform 220ms var(--ease-out), visibility 0s;
    }

    .progress-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 16px;
      border: 1px solid rgba(255, 209, 102, 0.34);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(255, 209, 102, 0.18), transparent 52%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.07), transparent),
        #111318;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .streak-flame {
      width: 88px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 24px;
      border: 1px solid rgba(255, 209, 102, 0.28);
      background:
        radial-gradient(circle at 34% 28%, rgba(255, 255, 255, 0.9), transparent 18%),
        linear-gradient(145deg, #fff0a8, #f3a928 46%, #b96515);
      color: var(--gold);
      box-shadow: inset -8px -10px 18px rgba(83, 43, 0, 0.18), 0 18px 38px rgba(243, 169, 40, 0.2);
      animation: flamePulse 1800ms ease-in-out infinite;
    }

    .streak-flame svg {
      width: 44px;
      height: 44px;
    }

    .level-bar {
      height: 8px;
      margin-top: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
      overflow: hidden;
    }

    .level-bar span {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transform: scaleX(var(--bar-scale, 0));
      transform-origin: left center;
      transition: transform 240ms var(--ease-out), background 180ms ease;
    }

    .reward-grid,
    .calendar-grid,
    .record-grid,
    .muscle-grid,
    .iphone-grid {
      display: grid;
      gap: 8px;
    }

    .reward-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .reward-card {
      min-height: 118px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.36), transparent 42%),
        rgba(23, 24, 25, 0.03);
      opacity: 0.48;
      transition: transform 180ms var(--ease-out), opacity 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .reward-card.unlocked {
      opacity: 1;
      border-color: rgba(255, 209, 102, 0.38);
      background:
        linear-gradient(145deg, rgba(255, 209, 102, 0.24), transparent 55%),
        var(--surface-3);
      box-shadow: 0 18px 36px rgba(124, 58, 237, 0.18);
    }

    @media (hover: hover) and (pointer: fine) {
      .reward-card:hover {
        transform: translateY(-2px);
      }
    }

    .reward-card .badge-icon {
      width: 44px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 13px;
      background:
        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.95), transparent 19%),
        linear-gradient(145deg, #fff2b6, #f3a928 48%, #8c5a12);
      color: #3f2808;
      margin-bottom: 9px;
      box-shadow: inset -7px -8px 14px rgba(70, 35, 0, 0.2), 0 10px 18px rgba(126, 83, 12, 0.18);
      font-size: 22px;
    }

    .reward-card strong {
      display: block;
      font-size: 13px;
      line-height: 1.25;
    }

    .reward-card span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .calendar-grid {
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .calendar-label,
    .calendar-day {
      min-width: 0;
      text-align: center;
      border-radius: 7px;
      font-size: 12px;
    }

    .calendar-label {
      color: var(--dim);
      font-weight: 800;
      padding: 4px 0;
    }

    .calendar-day {
      min-height: 48px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: rgba(23, 24, 25, 0.025);
      color: var(--muted);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .calendar-day em {
      position: absolute;
      right: 4px;
      top: 3px;
      font-style: normal;
      font-size: 11px;
    }

    .calendar-day.done {
      color: #06130c;
      border-color: var(--green);
      background: var(--green);
    }

    .calendar-day.missed {
      color: var(--red);
      border-color: rgba(239, 83, 80, 0.36);
      background: rgba(239, 83, 80, 0.09);
    }

    .calendar-day.planned {
      color: var(--amber);
      border-color: rgba(243, 169, 40, 0.34);
      background: rgba(243, 169, 40, 0.08);
    }

    .calendar-day.rest {
      background: rgba(240, 238, 255, 0.025);
    }

    .calendar-day.freeze {
      color: var(--cyan);
      border-color: rgba(50, 182, 216, 0.36);
      background: rgba(50, 182, 216, 0.1);
    }

    .calendar-day.today {
      box-shadow: inset 0 0 0 2px rgba(124, 58, 237, 0.42);
    }

    .calendar-day button {
      position: absolute;
      inset: auto 4px 4px 4px;
      display: grid;
      place-items: center;
      min-height: 20px;
      padding: 0;
      font-size: 10px;
      font-weight: 800;
      background: rgba(50, 182, 216, 0.12);
    }

    .calendar-day button svg {
      width: 13px;
      height: 13px;
    }

    .calendar-legend,
    .calendar-detail {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .calendar-legend span,
    .calendar-detail span,
    .calendar-detail strong {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 28px;
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(23, 24, 25, 0.035);
      overflow-wrap: anywhere;
    }

    .rpe-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
    }

    .rpe-button {
      min-height: 42px;
      padding: 7px;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .rpe-button.active {
      color: var(--text);
      border-color: rgba(124, 58, 237, 0.7);
      background: var(--accent-soft);
      box-shadow: 0 10px 24px rgba(124, 58, 237, 0.14);
    }

    .suggestion-card {
      padding: 11px;
      border: 1px solid rgba(47, 199, 121, 0.26);
      border-radius: var(--radius);
      background: rgba(47, 199, 121, 0.1);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .record-grid,
    .muscle-grid,
    .iphone-grid,
    .rings-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .rings-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .body-map-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 12px 0;
    }

    .body-map-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .body-svg {
      width: 100%;
      max-width: 140px;
      height: auto;
      filter: drop-shadow(0 12px 22px rgba(17, 18, 19, 0.08));
    }

    .body-svg [data-action="body-muscle"] {
      cursor: pointer;
      transition: opacity 300ms ease, filter 300ms ease, transform 220ms var(--ease-spring);
      transform-origin: center;
    }

    .body-svg [data-action="body-muscle"]:active {
      transform: scale(0.96);
    }

    .body-map-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 30px;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(23, 24, 25, 0.035);
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .body-weight-input {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .body-weight-input button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 11px;
      font-weight: 800;
    }

    .weight-chart-svg {
      width: 100%;
      min-height: 86px;
      margin: 12px 0;
      overflow: visible;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(23, 24, 25, 0.025);
    }

    .volume-chart {
      width: 100%;
      min-height: 154px;
      overflow: visible;
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(138, 114, 232, 0.08), transparent),
        rgba(23, 24, 25, 0.02);
    }

    .volume-chart text {
      fill: var(--muted);
      font-size: 10px;
      font-weight: 800;
    }

    .volume-chart .grid {
      stroke: rgba(23, 24, 25, 0.08);
      stroke-width: 1;
    }

    .volume-chart .volume-bar {
      fill: var(--violet);
      rx: 5;
      filter: drop-shadow(0 8px 12px rgba(138, 114, 232, 0.2));
    }

    .volume-chart .volume-line {
      fill: none;
      stroke: var(--green);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .body-log-list {
      display: grid;
      gap: 8px;
    }

    .ring-card {
      display: grid;
      justify-items: center;
      gap: 9px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(23, 24, 25, 0.035);
    }

    .ring-card strong {
      font-size: 13px;
      color: var(--muted);
    }

    .small-ring {
      width: 70px;
      font-size: 13px;
    }

    .record-card,
    .muscle-row,
    .iphone-card {
      min-width: 0;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(23, 24, 25, 0.035);
    }

    .record-card strong,
    .iphone-card strong {
      display: block;
      font-size: 14px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .record-card span,
    .iphone-card span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .muscle-row {
      display: grid;
      gap: 7px;
    }

    .muscle-row header {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .phone-widget {
      padding: 14px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.035)),
        #101217;
      box-shadow: var(--shadow);
    }

    .phone-widget strong {
      display: block;
      font-size: 18px;
      line-height: 1.2;
    }

    .phone-widget span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .confetti-layer {
      pointer-events: none;
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 30;
    }

    .confetti-piece {
      position: absolute;
      top: -12px;
      width: 8px;
      height: 14px;
      border-radius: 2px;
      animation: confettiFall 1100ms ease-in forwards;
    }

    @keyframes appEnter {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes tabIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes detailIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes checkPop {
      0% { transform: scale(0.94); }
      55% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    @keyframes checkGlow {
      0% { box-shadow: 0 0 0 0 rgba(47, 199, 121, 0.28); }
      100% { box-shadow: 0 0 0 12px rgba(47, 199, 121, 0); }
    }

    @keyframes waterRise {
      from { transform: translateY(18px); }
      to { transform: translateY(0); }
    }

    @keyframes tabLine {
      from { transform: scaleX(0.35); opacity: 0; }
      to { transform: scaleX(1); opacity: 1; }
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes flamePulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(255, 209, 102, 0)); }
      50% { transform: scale(1.04); filter: drop-shadow(0 0 18px rgba(255, 209, 102, 0.22)); }
    }

    @keyframes shakeCard {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.92; }
      50% { transform: scale(1.06); opacity: 1; }
    }

    @keyframes confettiFall {
      to { transform: translateY(105vh) rotate(540deg); opacity: 0; }
    }

    /* UX Pilot v2 fidelity pass: dark-purple mobile product UI */
    :root {
      --gp-bg: #050505;
      --gp-surface: #0e0f18;
      --gp-surface-2: #13152a;
      --gp-surface-3: #181a33;
      --gp-card: #0e0f18;
      --gp-card-2: #13152a;
      --gp-violet: #8B5CF6;
      --gp-violet-soft: #9d7bff;
      --gp-indigo: #6366f1;
      --gp-green: #22c55e;
      --gp-cyan: #06b6d4;
      --gp-orange: #f97316;
      --gp-red: #ef4444;
      --gp-text: #e8e8f0;
      --gp-muted: #6b6b8a;
      --gp-faint: rgba(232, 232, 240, 0.28);
      --gp-border: #3a3a4c;
      --gp-border-strong: rgba(139, 92, 246, 0.42);
    }

    .app-shell.gp-root,
    .gp-shell {
      background: #050505;
    }

    .gp-page {
      gap: 16px;
      padding: 0 20px 18px;
    }

    .gp-header {
      padding: calc(15px + env(safe-area-inset-top)) 20px 12px;
      background: linear-gradient(180deg, rgba(5, 5, 5, 0.98), rgba(5, 5, 5, 0.86) 78%, transparent);
      backdrop-filter: blur(18px);
    }

    .gp-header-copy p,
    .gp-kicker {
      color: var(--gp-muted);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
    }

    .gp-header-copy h1 {
      color: var(--gp-text);
      font-size: 22px;
      font-weight: 850;
      letter-spacing: 0;
      line-height: 1.12;
    }

    .gp-card,
    .gp-mini-metrics div,
    .gp-stat-tile,
    .gp-record-card,
    .gp-action-card,
    .gp-ring-tile,
    .gp-reward-row article {
      border-color: var(--gp-border);
      border-radius: 12px;
      background: var(--gp-surface);
      box-shadow: none;
    }

    .gp-readiness-card {
      gap: 15px;
      padding: 20px;
      background:
        radial-gradient(circle at 50% 48%, rgba(139, 92, 246, 0.12), transparent 54%),
        var(--gp-surface);
    }

    .gp-ring {
      filter: drop-shadow(0 0 18px rgba(139, 92, 246, 0.32));
    }

    .gp-ring strong {
      font-size: 43px;
      font-weight: 850;
    }

    .gp-mini-metrics div,
    .gp-stat-tile {
      min-height: 76px;
      background: var(--gp-surface-2);
    }

    .gp-stat-tile .icon {
      margin-bottom: 1px;
    }

    .gp-next-card {
      padding: 0;
      background: var(--gp-surface);
    }

    .gp-next-card .gp-next-head {
      padding: 16px 16px 8px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.13), rgba(99, 102, 241, 0.055));
    }

    .gp-next-card > .gp-progress-line,
    .gp-next-card > .gp-next-meta,
    .gp-next-card > .gp-muscle-chips,
    .gp-next-card > .gp-mini-schedule,
    .gp-next-card > .gp-primary-btn {
      margin-left: 16px;
      margin-right: 16px;
    }

    .gp-next-card > .gp-primary-btn {
      width: calc(100% - 32px);
      margin-bottom: 16px;
    }

    .gp-icon-orb,
    .gp-profile-mark,
    .gp-exercise-icon {
      border-color: rgba(139, 92, 246, 0.3);
      background: rgba(139, 92, 246, 0.16);
      color: var(--gp-violet);
      box-shadow: none;
    }

    .gp-primary-btn {
      min-height: 52px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, #8B5CF6, #6366f1);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.22);
    }

    .gp-ghost-btn,
    .gp-small-btn,
    .gp-inline-actions a,
    .gp-inline-actions button,
    .gp-next-meta span,
    .gp-muscle-chips span {
      border-color: rgba(139, 92, 246, 0.18);
      border-radius: 8px;
      background: rgba(139, 92, 246, 0.1);
      color: var(--gp-violet-soft);
    }

    .gp-workout-hero {
      background:
        radial-gradient(circle at 90% 16%, color-mix(in srgb, var(--workout), transparent 70%), transparent 34%),
        var(--gp-surface);
    }

    .gp-segment,
    .gp-progress-tabs {
      gap: 4px;
      border: 0;
      border-radius: 12px;
      background: var(--gp-surface);
    }

    .gp-segment button.active,
    .gp-progress-tabs button.active {
      border-color: var(--gp-violet);
      background: var(--gp-violet);
      color: white;
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.4);
    }

    .gp-exercise-card {
      border-color: var(--gp-border);
      background: var(--gp-surface);
    }

    .gp-exercise-head {
      grid-template-columns: 40px minmax(0, 1fr) 36px;
      min-height: 72px;
      padding: 13px 14px;
    }

    .gp-exercise-progress {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: rgba(139, 92, 246, 0.14);
    }

    .gp-set-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 54px;
      padding: 9px;
      border: 1px solid rgba(139, 92, 246, 0.13);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
    }

    .gp-set-row.done {
      border-color: rgba(34, 197, 94, 0.22);
      background: rgba(34, 197, 94, 0.08);
    }

    .gp-set-num {
      width: 20px;
      flex: 0 0 20px;
    }

    .gp-weight-stepper {
      display: grid;
      grid-template-columns: 28px minmax(54px, 1fr) 28px;
      align-items: center;
      gap: 4px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .gp-weight-stepper button {
      display: grid;
      place-items: center;
      width: 28px;
      height: 34px;
      padding: 0;
      border: 1px solid var(--gp-border);
      border-radius: 9px;
      background: var(--gp-surface-2);
      color: var(--gp-muted);
    }

    .gp-weight-stepper label,
    .gp-reps-pill {
      display: grid;
      place-items: center;
      min-width: 0;
      height: 34px;
      border: 1px solid var(--gp-border);
      border-radius: 9px;
      background: var(--gp-surface-2);
    }

    .gp-weight-stepper input,
    .gp-reps-pill input {
      width: 100%;
      min-width: 0;
      height: 20px;
      padding: 0 2px;
      border: 0;
      background: transparent;
      color: var(--gp-text);
      font-size: 13px;
      font-weight: 850;
      line-height: 1;
      text-align: center;
      outline: none;
      font-variant-numeric: tabular-nums;
    }

    .gp-weight-stepper span,
    .gp-reps-pill span {
      color: rgba(232, 232, 240, 0.36);
      font-size: 8px;
      font-weight: 800;
      line-height: 1;
    }

    .gp-reps-pill {
      width: 48px;
      flex: 0 0 48px;
    }

    .gp-set-check,
    .gp-check {
      width: 28px;
      min-width: 28px;
      height: 28px;
      min-height: 28px;
      border: 1.5px solid rgba(232, 232, 240, 0.22);
      border-radius: 6px;
    }

    .gp-rpe-row {
      gap: 5px;
      margin-top: 7px;
    }

    .gp-rpe-row button {
      min-height: 30px;
      border-radius: 8px;
      font-size: 9px;
      text-transform: none;
    }

    .gp-timer-card {
      padding: 16px;
    }

    .gp-timer-body {
      grid-template-columns: 76px minmax(0, 1fr);
      gap: 15px;
    }

    .gp-timer-ring {
      width: 76px;
      height: 76px;
      background:
        radial-gradient(circle at center, var(--gp-surface) 58%, transparent 60%),
        conic-gradient(var(--gp-violet) var(--timer-pct), var(--gp-border) 0);
      box-shadow: 0 0 14px rgba(139, 92, 246, 0.22);
    }

    .gp-timer-ring strong {
      font-size: 15px;
    }

    .gp-timer-actions button {
      width: 44px;
      min-width: 44px;
      height: 44px;
      border-radius: 12px;
    }

    .gp-timer-actions button:first-child {
      border-color: transparent;
      background: linear-gradient(135deg, #8B5CF6, #6366f1);
      color: white;
    }

    .gp-body-stage {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(118px, 0.9fr);
      align-items: stretch;
      gap: 12px;
    }

    .gp-body-stage > div,
    .gp-body-photo-card,
    .gp-body-status {
      min-width: 0;
      border: 1px solid var(--gp-border);
      border-radius: 12px;
      background: var(--gp-surface-2);
    }

    .gp-body-photo-card {
      padding: 10px 6px;
      text-align: center;
    }

    .body-photo-wrap {
      position: relative;
      width: min(100%, 176px);
      aspect-ratio: 661 / 920;
      margin: 0 auto;
      overflow: visible;
    }

    .gp-body-mini .body-photo-wrap {
      width: min(100%, 104px);
    }

    .body-photo-wrap .body-asset {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 16px rgba(139, 92, 246, 0.2));
    }

    .body-photo-wrap .body-hotspot {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--w);
      height: var(--h);
      border: 1px solid color-mix(in srgb, var(--muscle-color), transparent 44%);
      border-radius: 999px;
      background: color-mix(in srgb, var(--muscle-color), transparent 78%);
      opacity: var(--heat-opacity);
      transform: translateZ(0);
      mix-blend-mode: screen;
    }

    .body-photo-wrap .body-hotspot.selected {
      opacity: 0.95;
      border-color: var(--gp-violet-soft);
      background: rgba(139, 92, 246, 0.34);
      box-shadow: 0 0 18px rgba(139, 92, 246, 0.42);
    }

    .body-photo-wrap .body-hotspot span {
      display: none;
    }

    .gp-body-status {
      display: grid;
      align-content: center;
      gap: 8px;
      padding: 12px;
    }

    .gp-body-status button {
      display: grid;
      grid-template-columns: 8px minmax(0, 1fr);
      align-items: center;
      gap: 7px;
      min-height: 30px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--gp-text);
      text-align: left;
    }

    .gp-body-status button.active,
    .gp-muscle-legend button.active {
      color: var(--gp-violet-soft);
    }

    .gp-body-status i {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      box-shadow: 0 0 6px currentColor;
    }

    .gp-body-status span,
    .gp-body-status em {
      min-width: 0;
      line-height: 1.1;
    }

    .gp-body-status span {
      overflow: hidden;
      font-size: 10px;
      font-weight: 850;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .gp-body-status em {
      grid-column: 2;
      margin: -4px 0 0;
      color: var(--gp-muted);
      font-size: 9px;
      font-style: normal;
      font-weight: 700;
    }

    .gp-muscle-detail {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-top: 12px;
      padding: 11px;
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 13px;
      background: rgba(139, 92, 246, 0.1);
    }

    .gp-muscle-detail strong,
    .gp-muscle-detail b {
      color: var(--gp-text);
      font-size: 13px;
      font-weight: 950;
      line-height: 1.15;
    }

    .gp-muscle-detail span,
    .gp-muscle-detail em {
      color: var(--gp-muted);
      font-size: 11px;
      font-style: normal;
      font-weight: 760;
      line-height: 1.25;
    }

    .gp-recovery-layout {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      align-items: center;
      gap: 12px;
    }

    .gp-recovery-bars {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .gp-menu-group {
      padding: 0;
      gap: 0;
      overflow: hidden;
    }

    .gp-menu-group button {
      min-height: 62px;
      border-width: 0 0 1px;
      border-radius: 0;
      background: transparent;
    }

    .gp-menu-group button:last-child {
      border-bottom: 0;
    }

    .gp-bottom-nav {
      min-height: calc(58px + env(safe-area-inset-bottom));
      padding: 4px 8px calc(7px + env(safe-area-inset-bottom));
      border-top-color: var(--gp-border);
      background: rgba(14, 15, 24, 0.98);
    }

    .gp-nav-item {
      color: var(--gp-muted);
      font-size: 10px;
      font-weight: 750;
    }

    .gp-nav-item.active {
      color: var(--gp-violet);
    }

    .gp-nav-item.active::after {
      bottom: -4px;
      width: 32px;
      background: var(--gp-violet);
    }

    @media (max-width: 360px) {
      .gp-page {
        gap: 14px;
        padding-left: 14px;
        padding-right: 14px;
      }

      .gp-header {
        padding-left: 14px;
        padding-right: 14px;
      }

      .gp-stat-strip {
        gap: 7px;
      }

      .gp-set-row {
        gap: 6px;
        padding: 8px 7px;
      }

      .gp-weight-stepper {
        grid-template-columns: 25px minmax(46px, 1fr) 25px;
      }

      .gp-reps-pill {
        width: 44px;
        flex-basis: 44px;
      }

      .gp-body-stage,
      .gp-recovery-layout {
        grid-template-columns: 1fr;
      }

      .gp-body-mini .body-photo-wrap {
        width: 112px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
        scroll-behavior: auto !important;
      }

      .streak-flame,
      .yoga-icon,
      .confetti-piece {
        animation: none !important;
      }
    }

    .mini-timer {
      position: fixed;
      left: 50%;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 15;
      width: min(560px, calc(100% - 24px));
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid rgba(50, 182, 216, 0.4);
      border-radius: 18px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
        rgba(12, 14, 18, 0.96);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      transition: opacity 180ms ease, transform 220ms var(--ease-out), border-color 180ms ease;
    }

    .pull-indicator {
      position: fixed;
      left: 50%;
      top: calc(10px + env(safe-area-inset-top));
      z-index: 18;
      transform: translateX(-50%) translateY(-18px);
      opacity: 0;
      pointer-events: none;
      min-height: 34px;
      display: grid;
      place-items: center;
      padding: 7px 12px;
      border: 1px solid rgba(50, 182, 216, 0.36);
      border-radius: 999px;
      background: rgba(17, 20, 25, 0.96);
      color: var(--cyan);
      font-size: 12px;
      font-weight: 800;
      box-shadow: var(--shadow);
      transition: opacity 160ms ease, transform 180ms ease;
    }

    .pull-indicator.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .mini-timer.is-hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(14px) scale(0.98);
    }

    .mini-timer strong {
      display: block;
      font-size: 20px;
      line-height: 1;
      color: var(--cyan);
    }

    .mini-timer span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mini-timer .timer-actions {
      margin: 0;
    }

    .toast strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .toast span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .timer-panel {
        position: static;
      }
    }

    @media (max-width: 720px) {
      .app-shell {
        width: min(100% - 20px, 1180px);
        padding-top: calc(12px + env(safe-area-inset-top));
        padding-bottom: calc(152px + env(safe-area-inset-bottom));
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .month-stat {
        width: 100%;
      }

      .day-grid {
        grid-template-columns: 1fr;
      }

      .nav-tabs {
        position: fixed;
        left: 10px;
        right: 10px;
        bottom: calc(8px + env(safe-area-inset-bottom));
        z-index: 14;
        grid-template-columns: repeat(5, minmax(0, 1fr));

    .body-hotspot {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--w);
      height: var(--h);
      min-height: 0;
      padding: 0;
      border-radius: 999px;

      box-shadow: 0 0 18px color-mix(in srgb, var(--muscle-color), transparent 60%);
      opacity: var(--heat-opacity);
      color: transparent;
      transform: translateZ(0);
      transition: transform 160ms var(--ease-out), opacity 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .body-hotspot.active {
      opacity: var(--heat-opacity);

      font: inherit;
      letter-spacing: 0;
    }

    .gp-root button,

    }

    .gp-page {

      padding: 0 16px 18px;

      justify-content: space-between;

      background: linear-gradient(180deg, rgba(5, 5, 5, 0.98), rgba(5, 5, 5, 0.78) 70%, transparent);
      backdrop-filter: blur(14px);
    }

    .gp-header-copy {
      min-width: 0;
    }

    .gp-header-copy p,
    .gp-kicker {
      margin: 0;
      color: var(--gp-violet-soft);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .gp-header-copy h1 {
      max-width: 250px;
      margin: 4px 0 0;
      color: var(--gp-text);

      font-weight: 900;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .gp-header-actions {

      align-items: center;
      gap: 8px;
      flex: 0 0 auto;

    .gp-icon-btn,

      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--gp-border);
      border-radius: 12px;
      background: rgba(28, 21, 48, 0.88);
      color: var(--gp-text);
    }

    .gp-icon-btn {
      width: 40px;
      height: 40px;
      padding: 0;
    }

    .gp-streak-pill {
      height: 34px;
      gap: 4px;
      padding: 0 9px;
      color: var(--gp-orange);
    }

    .gp-streak-pill strong {
      color: var(--gp-text);
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }

    .gp-streak-pill span {
      color: var(--gp-muted);
      font-size: 10px;
      font-weight: 700;
    }

    .gp-card {
      min-width: 0;
      border: 1px solid var(--gp-border);
      border-radius: 14px;
      background:
        radial-gradient(circle at 28% 0%, rgba(139, 92, 246, 0.18), transparent 38%),
        linear-gradient(145deg, rgba(35, 29, 58, 0.96), rgba(19, 21, 42, 0.96));
      box-shadow: 0 14px 42px rgba(0, 0, 0, 0.32);
      overflow: hidden;
    }

    .gp-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .gp-section-head h2,
    .gp-section-head h3 {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      margin: 0;
      color: var(--gp-text);
      font-size: 16px;
      font-weight: 900;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .gp-section-head h3 {
      font-size: 13px;
    }

    .gp-section-head span {
      color: var(--gp-violet-soft);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
      text-align: right;
      white-space: nowrap;
    }

    .gp-muted {
      color: var(--gp-muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .gp-readiness-card {
      display: grid;
      justify-items: center;
      gap: 12px;
      padding: 18px;
      background:
        radial-gradient(circle at 50% 44%, rgba(139, 92, 246, 0.34), transparent 42%),
        linear-gradient(145deg, rgba(43, 31, 74, 0.98), rgba(22, 17, 38, 0.98));
    }

    .gp-readiness-top,
    .gp-next-head,
    .gp-workout-hero-top,
    .gp-nutrition-top,
    .gp-profile-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      min-width: 0;
    }

    .gp-readiness-top h2,
    .gp-next-head h2,
    .gp-workout-hero h2,
    .gp-profile-card h2,

      margin: 3px 0 0;
      color: var(--gp-text);
      font-size: 17px;
      font-weight: 900;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .gp-readiness-top > span {
      flex: 0 0 auto;
      padding: 6px 10px;
      border: 1px solid rgba(139, 92, 246, 0.28);
      border-radius: 999px;
      background: rgba(139, 92, 246, 0.13);
      color: var(--gp-violet-soft);
      font-size: 11px;
      font-weight: 900;
    }

    .gp-ring {
      position: relative;
      display: grid;
      place-items: center;
      width: var(--ring-size);
      height: var(--ring-size);
      filter: drop-shadow(0 0 24px rgba(139, 92, 246, 0.42));
    }

    .gp-ring svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .gp-ring circle:nth-of-type(2) {
      transition: stroke-dashoffset 800ms var(--gp-ease);
    }

    .gp-ring div {
      display: grid;
      justify-items: center;
      gap: 2px;
    }

    .gp-ring strong {
      color: white;
      font-size: 44px;
      font-weight: 950;
      line-height: 0.95;
      font-variant-numeric: tabular-nums;
    }

    .gp-ring span {
      color: var(--gp-violet-soft);
      font-size: 12px;
      font-weight: 800;
    }

    .gp-mini-metrics,
    .gp-stat-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
    }

    .gp-mini-metrics div,
    .gp-stat-tile,
    .gp-record-card {
      display: grid;
      justify-items: center;
      gap: 4px;
      min-width: 0;
      min-height: 72px;
      padding: 10px 6px;
      border: 1px solid rgba(139, 92, 246, 0.15);
      border-radius: 12px;
      background: rgba(14, 15, 24, 0.62);
      text-align: center;
    }

    .gp-mini-metrics strong,
    .gp-stat-tile strong,
    .gp-record-card strong {
      color: var(--metric, var(--tile, var(--gp-text)));
      font-size: 16px;
      font-weight: 950;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .gp-mini-metrics span,
    .gp-stat-tile span,
    .gp-stat-tile em,
    .gp-record-card span {
      max-width: 100%;
      color: var(--gp-muted);
      font-size: 9.5px;
      font-weight: 700;
      font-style: normal;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .gp-stat-strip {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .gp-stat-tile {
      min-height: 82px;
      color: var(--tile);
    }

    .gp-next-card {
      padding: 16px;
      background:
        radial-gradient(circle at 86% 0%, rgba(139, 92, 246, 0.38), transparent 32%),
        linear-gradient(145deg, rgba(43, 31, 74, 0.96), rgba(23, 17, 39, 0.98));
    }

    .gp-icon-orb,
    .gp-profile-mark,
    .gp-reward-orb,
    .gp-exercise-icon {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border: 1px solid rgba(139, 92, 246, 0.32);
      border-radius: 12px;
      background: rgba(139, 92, 246, 0.16);
      color: var(--gp-violet-soft);
      box-shadow: 0 0 22px rgba(139, 92, 246, 0.18);
    }

    .gp-icon-orb,
    .gp-profile-mark {
      width: 42px;
      height: 42px;

    .gp-next-head > div:nth-child(2),

    .gp-profile-card > div {
      min-width: 0;
      flex: 1;
    }

    .gp-chevron-btn {
      width: 36px;
      height: 36px;
      padding: 0;
      color: var(--gp-violet-soft);
      font-size: 24px;
    }

    .gp-progress-line {
      width: 100%;
      height: 7px;
      margin: 13px 0 0;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(244, 240, 255, 0.08);
    }

    .gp-progress-line span,
    .gp-recovery-row i {
      display: block;
      width: calc(var(--bar-scale) * 100%);
      height: 100%;
      border-radius: inherit;
      background: var(--line, linear-gradient(90deg, var(--gp-violet), var(--gp-indigo)));
      transition: width 240ms var(--gp-ease);
    }

    .gp-next-meta,
    .gp-muscle-chips,
    .gp-inline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;

    .gp-next-meta span,
    .gp-muscle-chips span,
    .gp-inline-actions a,
    .gp-inline-actions button,
    .gp-ghost-btn,
    .gp-small-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 30px;
      padding: 0 10px;
      border: 1px solid rgba(139, 92, 246, 0.18);
      border-radius: 9px;
      background: rgba(139, 92, 246, 0.1);
      color: var(--gp-violet-soft);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.1;
      text-decoration: none;
      white-space: nowrap;
    }

    .gp-mini-schedule {
      display: grid;
      gap: 6px;
      margin: 12px 0 0;
    }

    .gp-mini-schedule-row {
      display: grid;
      grid-template-columns: 8px 22px minmax(0, 1fr) auto;
      align-items: center;
      gap: 9px;
      min-height: 30px;
      color: var(--gp-text);
    }

    .gp-mini-schedule-row > span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(244, 240, 255, 0.18);
    }

    .gp-mini-schedule-row.done > span {
      background: var(--gp-green);
    }

    .gp-mini-schedule-row b,
    .gp-mini-schedule-row em {
      color: var(--gp-muted);
      font-size: 10px;
      font-style: normal;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .gp-mini-schedule-row p {
      min-width: 0;
      margin: 0;
      overflow: hidden;
      color: inherit;
      font-size: 12px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .gp-primary-btn,
    .gp-ghost-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: 48px;
      margin-top: 13px;
      padding: 0 14px;
      border: 1px solid rgba(139, 92, 246, 0.45);
      border-radius: 12px;
      background: linear-gradient(135deg, var(--gp-violet), var(--gp-indigo));
      color: white;
      font-size: 14px;
      font-weight: 950;
      line-height: 1.1;
      box-shadow: 0 14px 34px rgba(139, 92, 246, 0.25);
    }

    .gp-primary-btn:disabled {
      opacity: 0.45;
      box-shadow: none;
    }

    .gp-ghost-btn {
      background: rgba(139, 92, 246, 0.1);
      color: var(--gp-violet-soft);
      box-shadow: none;
    }

    .gp-grid-two {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .gp-action-card {
      display: grid;
      align-content: start;
      justify-items: start;
      gap: 6px;
      min-width: 0;
      min-height: 104px;
      padding: 14px;
      border: 1px solid var(--gp-border);
      border-radius: 14px;
      background:
        radial-gradient(circle at 80% 10%, rgba(139, 92, 246, 0.16), transparent 36%),

      color: var(--gp-text);
      text-align: left;
    }

    .gp-action-card strong {
      font-size: 14px;
      font-weight: 950;
      line-height: 1.1;
    }

    .gp-action-card span {
      color: var(--gp-muted);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .gp-recovery-card,
    .gp-volume-card,
    .gp-body-card,
    .gp-nutrition-card,
    .gp-calendar-card,
    .gp-profile-card,
    .gp-menu-group,
    .gp-collapsible-card,
    .gp-finish-card,
    .gp-timer-card,
    .gp-achievement-card {
      padding: 15px;

    .gp-recovery-row {
      display: grid;
      grid-template-columns: 80px minmax(0, 1fr) 42px;
      align-items: center;
      gap: 10px;
      min-height: 30px;

      font-size: 12px;
      font-weight: 850;
      line-height: 1.1;
    }

      overflow: hidden;
      border-radius: 999px;
      background: rgba(244, 240, 255, 0.08);
    }

    .gp-recovery-row i {
      background: var(--row);
    }

    .gp-segment,
    .gp-progress-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 5px;
      padding: 4px;
      border: 1px solid rgba(139, 92, 246, 0.16);
      border-radius: 13px;
      background: rgba(14, 15, 24, 0.82);

    .gp-segment button,
    .gp-progress-tabs button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-width: 0;
      min-height: 42px;
      padding: 0 8px;

      border-radius: 10px;
      background: transparent;
      color: var(--gp-muted);
      font-size: 12px;
      font-weight: 900;
      line-height: 1.1;

    .gp-segment button.active,
    .gp-progress-tabs button.active {
      border-color: rgba(139, 92, 246, 0.38);
      background: rgba(139, 92, 246, 0.17);
      color: var(--gp-violet-soft);
      box-shadow: 0 0 18px rgba(139, 92, 246, 0.15);
    }

    .gp-plan-rail {
      display: flex;
      gap: 8px;
      margin: 0 -16px;
      padding: 0 16px 2px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .gp-week-rail {
      display: flex;
      gap: 8px;
      margin: 0 -16px;
      padding: 0 16px 2px;
      overflow-x: auto;
      scrollbar-width: none;

    .gp-plan-rail::-webkit-scrollbar,
    .gp-week-rail::-webkit-scrollbar,

      justify-items: start;
      gap: 4px;
      flex: 0 0 104px;
      min-height: 56px;

      border-radius: 13px;
      background: rgba(19, 21, 42, 0.7);
      color: var(--gp-muted);
      text-align: left;
    }

    .gp-plan-rail button.active {
      border-color: rgba(139, 92, 246, 0.42);
      background:

      color: var(--gp-text);
      box-shadow: 0 0 22px rgba(139, 92, 246, 0.18);
    }

    .gp-plan-rail strong {
      font-size: 12px;
      font-weight: 950;
      line-height: 1;
    }

    .gp-plan-rail span {
      max-width: 100%;
      color: inherit;
      font-size: 10px;
      font-weight: 800;
      line-height: 1.15;
      opacity: 0.72;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .gp-week-rail button {
      display: grid;
      place-items: center;
      flex: 0 0 76px;
      min-height: 58px;

      border-radius: 12px;
      background: rgba(28, 21, 48, 0.76);
      color: var(--gp-muted);

    .gp-week-rail button.active {
      background: color-mix(in srgb, var(--day), transparent 82%);
      color: var(--gp-text);
      box-shadow: 0 0 22px color-mix(in srgb, var(--day), transparent 74%);
    }

    .gp-week-rail strong {
      font-size: 13px;
      font-weight: 950;
    }

    .gp-week-rail span {
      font-size: 10px;
      font-weight: 800;
    }

    .gp-workout-hero {
      padding: 16px;
      background:
        radial-gradient(circle at 86% 10%, color-mix(in srgb, var(--workout), transparent 54%), transparent 34%),
        linear-gradient(145deg, rgba(43, 31, 74, 0.96), rgba(23, 17, 39, 0.96));
    }

    .gp-workout-hero-top > span {
      display: grid;
      place-items: center;
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: color-mix(in srgb, var(--workout), transparent 82%);

      font-size: 18px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;

      border: 1px solid rgba(139, 92, 246, 0.16);
      border-radius: 14px;
      background:

      overflow: hidden;
    }

    .gp-exercise-card.done {
      border-color: rgba(34, 197, 94, 0.28);
    }

    .gp-exercise-head {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr) 44px;

      gap: 10px;

      color: var(--gp-text);

      height: 40px;

      gap: 4px;
      min-width: 0;

    .gp-exercise-copy strong {
      display: block;
      min-width: 0;
      color: var(--gp-text);
      font-size: 14px;
      font-weight: 950;
      line-height: 1.16;
      overflow-wrap: anywhere;
    }

    .gp-exercise-copy em {
      margin-left: 6px;
      padding: 2px 5px;
      border-radius: 6px;
      background: rgba(139, 92, 246, 0.18);
      color: var(--gp-violet-soft);
      font-size: 9px;
      font-style: normal;
      font-weight: 900;
      white-space: nowrap;
    }

    .gp-exercise-copy small {
      display: block;
      color: var(--gp-muted);
      font-size: 11px;
      font-weight: 750;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

      display: grid;
      place-items: center;
      width: 42px;
      height: 34px;
      border: 1px solid rgba(139, 92, 246, 0.2);

      background: rgba(139, 92, 246, 0.1);
      color: var(--gp-violet-soft);
      font-size: 12px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;

    .gp-exercise-detail {

      gap: 12px;

    .gp-detail-metrics {

      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;

    .gp-detail-metrics div,
    .gp-cue-box {
      min-width: 0;
      padding: 10px;
      border: 1px solid rgba(139, 92, 246, 0.14);
      border-radius: 11px;
      background: rgba(5, 5, 5, 0.22);

    .gp-detail-metrics span,
    .gp-cue-box p,
    .gp-alt-grid span {

      color: var(--gp-muted);
      font-size: 10px;
      font-weight: 750;
      line-height: 1.3;
      overflow-wrap: anywhere;

    .gp-detail-metrics strong,
    .gp-cue-box strong,
    .gp-alt-grid strong {
      display: block;
      min-width: 0;
      margin-top: 3px;
      color: var(--gp-text);
      font-size: 12px;
      font-weight: 900;
      line-height: 1.2;
      overflow-wrap: anywhere;
