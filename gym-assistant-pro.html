<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Зал-помощник</title>
  <meta name="theme-color" content="#101114" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Зал" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="gym-icon.svg" type="image/svg+xml" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #101114;
      --surface: #171920;
      --surface-2: #20232b;
      --surface-3: #272b33;
      --line: rgba(255, 255, 255, 0.09);
      --line-strong: rgba(255, 255, 255, 0.16);
      --text: #f2f0eb;
      --muted: #a5a1a0;
      --dim: #6e6a6b;
      --green: #2fc779;
      --red: #ef5350;
      --amber: #f3a928;
      --cyan: #32b6d8;
      --violet: #8a72e8;
      --pink: #e85c9f;
      --blue: #5f8fe8;
      --gold: #ffd166;
      --radius: 8px;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
      --ease-spring: cubic-bezier(0.2, 0.9, 0.22, 1.18);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 280px),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button,
    a.button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--text);
      cursor: pointer;
      transition: transform 180ms var(--ease-spring), border-color 180ms ease, background 180ms ease, color 180ms ease, box-shadow 180ms ease;
      text-decoration: none;
    }

    button:hover,
    a.button:hover {
      border-color: var(--line-strong);
      background: var(--surface-3);
    }

    button:active,
    a.button:active {
      transform: translateY(1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.46;
    }

    input[type="number"],
    input[type="text"] {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #111217;
      color: var(--text);
      padding: 10px 9px;
      outline: none;
    }

    input[type="number"]:focus,
    input[type="text"]:focus {
      border-color: rgba(47, 199, 121, 0.56);
    }

    .app-shell {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 120px;
      animation: appEnter 420ms ease both;
    }

    .app-shell.motion-settled {
      animation: none;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      padding: 18px 0 16px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(28px, 4vw, 50px);
      line-height: 0.98;
      font-weight: 850;
      letter-spacing: 0;
    }

    .top-copy {
      margin-top: 10px;
      color: var(--muted);
      max-width: 620px;
      line-height: 1.55;
      font-size: 15px;
    }

    .month-stat {
      display: grid;
      min-width: 178px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.035);
      box-shadow: var(--shadow);
    }

    .month-stat strong {
      color: var(--green);
      font-size: 34px;
      line-height: 1;
    }

    .month-stat span {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .nav-tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin: 18px 0 16px;
    }

    .nav-tabs button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 12px;
      color: var(--muted);
      font-weight: 750;
    }

    .nav-tabs button.active {
      color: var(--text);
      border-color: rgba(47, 199, 121, 0.56);
      background: rgba(47, 199, 121, 0.14);
    }

    .icon {
      width: 18px;
      height: 18px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 350px;
      gap: 16px;
      align-items: start;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .panel,
    .exercise,
    .set-row,
    .history-row {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .panel {
      padding: 14px;
      animation: riseIn 360ms ease both;
    }

    .app-shell.motion-settled .panel,
    .app-shell.motion-settled .exercise,
    .app-shell.motion-settled .workout-head,
    .app-shell.motion-settled .progress-hero {
      animation: none;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title h2,
    .section-title h3 {
      font-size: 15px;
      line-height: 1.25;
      font-weight: 830;
    }

    .section-title small,
    .subtle {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .week-card {
      min-height: 82px;
      padding: 9px;
      text-align: left;
      background: var(--surface);
      overflow: hidden;
    }

    .week-card.active {
      border-color: rgba(47, 199, 121, 0.58);
      background: rgba(47, 199, 121, 0.11);
      box-shadow: 0 0 0 1px rgba(47, 199, 121, 0.08), 0 14px 34px rgba(47, 199, 121, 0.08);
    }

    .week-card .num {
      display: block;
      font-size: 24px;
      font-weight: 850;
      line-height: 1;
    }

    .week-card .label {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tiny-bar {
      height: 4px;
      margin-top: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .tiny-bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--green);
      transition: width 420ms ease;
    }

    .day-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .day-card {
      min-height: 84px;
      padding: 10px;
      text-align: left;
      background: var(--surface);
    }

    .day-card.active {
      background: color-mix(in srgb, var(--accent), transparent 88%);
      border-color: color-mix(in srgb, var(--accent), transparent 42%);
      box-shadow: 0 10px 30px color-mix(in srgb, var(--accent), transparent 88%);
    }

    .day-card strong {
      display: block;
      font-size: 18px;
    }

    .day-card span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .workout-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 16px;
      border: 1px solid color-mix(in srgb, var(--accent), transparent 68%);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent), transparent 86%), transparent 64%),
        var(--surface);
      animation: riseIn 360ms ease both;
    }

    .workout-head h2 {
      font-size: 22px;
      line-height: 1.12;
    }

    .workout-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      max-width: 100%;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.035);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .progress-ring {
      width: 82px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: conic-gradient(var(--accent) var(--pct), rgba(255, 255, 255, 0.08) 0);
      position: relative;
      color: var(--text);
      font-size: 20px;
      font-weight: 850;
      transition: background 420ms ease;
    }

    .progress-ring::before {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: inherit;
      background: var(--surface);
    }

    .progress-ring span {
      position: relative;
    }

    .collapsible {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      text-align: left;
      background: var(--surface);
    }

    .check-list {
      display: grid;
      gap: 8px;
    }

    .check-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      line-height: 1.45;
      font-size: 13px;
    }

    .check-item:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .check-box {
      width: 24px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: var(--surface-2);
      color: transparent;
      cursor: pointer;
      margin-top: 1px;
      transition: transform 180ms var(--ease-spring), background 180ms ease, border-color 180ms ease;
    }

    .check-box.done {
      border-color: var(--green);
      background: var(--green);
      color: #07140d;
      animation: checkPop 360ms var(--ease-spring);
    }

    .exercise {
      overflow: hidden;
      background: var(--surface);
      animation: riseIn 340ms ease both;
      transition: border-color 180ms ease, background 180ms ease, transform 180ms var(--ease-spring);
    }

    .exercise:hover {
      transform: translateY(-1px);
    }

    .exercise-main {
      width: 100%;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 86px;
      padding: 13px;
      border: 0;
      border-radius: 0;
      background: transparent;
      text-align: left;
    }

    .exercise.done .exercise-main {
      background: rgba(47, 199, 121, 0.07);
    }

    .muscle-dot {
      width: 42px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: color-mix(in srgb, var(--muscle), transparent 82%);
      border: 1px solid color-mix(in srgb, var(--muscle), transparent 52%);
      transition: transform 220ms var(--ease-spring);
    }

    .muscle-dot svg {
      width: 23px;
      height: 23px;
      color: var(--muscle);
    }

    .exercise-name {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
      color: var(--text);
      font-weight: 820;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .replacement-badge {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(243, 169, 40, 0.16);
      color: var(--amber);
      font-size: 11px;
      font-weight: 800;
    }

    .exercise-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 8px;
    }

    .chevron {
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
    }

    .exercise-detail {
      display: grid;
      gap: 12px;
      padding: 0 13px 13px;
      animation: detailIn 300ms ease both;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      min-width: 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.035);
    }

    .metric small {
      display: block;
      color: var(--dim);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .metric strong {
      display: block;
      margin-top: 5px;
      color: var(--text);
      font-size: 13px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .cue-list {
      display: grid;
      gap: 7px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.035);
    }

    .cue-list div {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.48;
    }

    .set-list {
      display: grid;
      gap: 8px;
    }

    .set-row {
      display: grid;
      grid-template-columns: 42px minmax(90px, 1fr) minmax(112px, 1fr) 42px;
      gap: 8px;
      align-items: center;
      padding: 8px;
      background: rgba(255, 255, 255, 0.025);
    }

    .set-row.done {
      border-color: rgba(47, 199, 121, 0.34);
      background: rgba(47, 199, 121, 0.07);
      animation: checkGlow 420ms ease;
    }

    .set-num {
      width: 34px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--muted);
      font-weight: 850;
      font-size: 13px;
    }

    .rep-control {
      display: grid;
      grid-template-columns: 34px minmax(38px, 1fr) 34px;
      gap: 5px;
      align-items: center;
    }

    .rep-control button,
    .set-check,
    .timer-actions button,
    .water-stepper button,
    .icon-button {
      display: grid;
      place-items: center;
      width: 40px;
      min-width: 40px;
      padding: 0;
      aspect-ratio: 1;
    }

    .rep-control input {
      text-align: center;
      padding-left: 4px;
      padding-right: 4px;
    }

    .set-check.done {
      background: var(--green);
      color: #07140d;
      border-color: var(--green);
      animation: checkPop 360ms var(--ease-spring);
    }

    .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .detail-actions .button,
    .detail-actions button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      padding: 8px 11px;
      color: var(--text);
      font-weight: 760;
      font-size: 13px;
    }

    .alt-grid {
      display: grid;
      gap: 8px;
    }

    .alt-button {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      width: 100%;
      min-height: 58px;
      padding: 10px;
      text-align: left;
      background: rgba(255, 255, 255, 0.035);
    }

    .alt-button strong {
      display: block;
      font-size: 13px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .alt-button span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .timer-panel {
      position: sticky;
      top: 12px;
      z-index: 3;
    }

    .timer-face {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }

    .timer-circle {
      width: 98px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: conic-gradient(var(--cyan) var(--timer-pct), rgba(255, 255, 255, 0.08) 0);
      position: relative;
      transition: background 360ms linear;
    }

    .timer-circle::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: inherit;
      background: var(--surface);
    }

    .timer-circle strong {
      position: relative;
      font-size: 24px;
      letter-spacing: 0;
    }

    .timer-label {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .timer-actions,
    .water-stepper,
    .compact-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .compact-actions button {
      min-height: 36px;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 760;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .stat-tile {
      min-width: 0;
      padding: 11px 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.035);
    }

    .stat-tile strong {
      display: block;
      color: var(--text);
      font-size: 22px;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .stat-tile span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .water-meter {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 6px;
      margin-top: 9px;
    }

    .water-cup {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(50, 182, 216, 0.09);
      position: relative;
      overflow: hidden;
    }

    .water-cup.filled::before {
      content: "";
      position: absolute;
      inset: 28% 0 0;
      background: var(--cyan);
      animation: waterRise 260ms ease both;
    }

    .nutrition-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    .nutrition-row:last-child {
      border-bottom: 0;
    }

    .finish-button {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      min-height: 48px;
      margin-top: 12px;
      border-color: rgba(47, 199, 121, 0.42);
      background: rgba(47, 199, 121, 0.14);
      font-weight: 850;
    }

    .finish-button.complete {
      color: #07140d;
      border-color: var(--green);
      background: var(--green);
      animation: checkPop 480ms var(--ease-spring);
    }

    .history-list {
      display: grid;
      gap: 8px;
    }

    .history-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      background: rgba(255, 255, 255, 0.03);
    }

    .history-row strong {
      display: block;
      font-size: 13px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .history-row span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .empty-state {
      padding: 22px 12px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
      line-height: 1.45;
      font-size: 13px;
    }

    .library-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .library-item {
      display: grid;
      gap: 9px;
      min-height: 164px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .library-item h3 {
      font-size: 15px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .library-item p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .library-item a {
      align-self: end;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 36px;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 760;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: min(340px, calc(100% - 36px));
      padding: 13px 14px;
      border: 1px solid rgba(50, 182, 216, 0.44);
      border-radius: var(--radius);
      background: #151b21;
      color: var(--text);
      box-shadow: var(--shadow);
      z-index: 20;
      display: none;
    }

    .toast.show {
      display: block;
      animation: toastIn 280ms ease both;
    }

    .progress-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 16px;
      border: 1px solid rgba(255, 209, 102, 0.34);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at top right, rgba(255, 209, 102, 0.17), transparent 38%),
        linear-gradient(135deg, rgba(47, 199, 121, 0.12), transparent 48%),
        var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .streak-flame {
      width: 88px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 24px;
      border: 1px solid rgba(255, 209, 102, 0.28);
      background: rgba(255, 209, 102, 0.1);
      color: var(--gold);
      animation: flamePulse 1800ms ease-in-out infinite;
    }

    .streak-flame svg {
      width: 44px;
      height: 44px;
    }

    .level-bar {
      height: 8px;
      margin-top: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
      overflow: hidden;
    }

    .level-bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--gold));
      transition: width 520ms ease;
    }

    .reward-grid,
    .calendar-grid,
    .record-grid,
    .muscle-grid,
    .iphone-grid {
      display: grid;
      gap: 8px;
    }

    .reward-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .reward-card {
      min-height: 118px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.03);
      opacity: 0.48;
      transition: transform 180ms var(--ease-spring), opacity 180ms ease, border-color 180ms ease;
    }

    .reward-card.unlocked {
      opacity: 1;
      border-color: rgba(255, 209, 102, 0.38);
      background: rgba(255, 209, 102, 0.08);
    }

    .reward-card:hover {
      transform: translateY(-2px);
    }

    .reward-card .badge-icon {
      width: 38px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--gold);
      margin-bottom: 9px;
    }

    .reward-card strong {
      display: block;
      font-size: 13px;
      line-height: 1.25;
    }

    .reward-card span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .calendar-grid {
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .calendar-label,
    .calendar-day {
      min-width: 0;
      text-align: center;
      border-radius: 7px;
      font-size: 12px;
    }

    .calendar-label {
      color: var(--dim);
      font-weight: 800;
      padding: 4px 0;
    }

    .calendar-day {
      min-height: 48px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.025);
      color: var(--muted);
      position: relative;
      overflow: hidden;
    }

    .calendar-day.done {
      color: #07140d;
      border-color: var(--green);
      background: var(--green);
    }

    .calendar-day.missed {
      color: var(--red);
      border-color: rgba(239, 83, 80, 0.36);
      background: rgba(239, 83, 80, 0.09);
    }

    .calendar-day.planned {
      color: var(--amber);
      border-color: rgba(243, 169, 40, 0.34);
      background: rgba(243, 169, 40, 0.08);
    }

    .calendar-day.rest {
      background: rgba(255, 255, 255, 0.018);
    }

    .calendar-day.freeze {
      color: var(--cyan);
      border-color: rgba(50, 182, 216, 0.36);
      background: rgba(50, 182, 216, 0.1);
    }

    .calendar-day.today {
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.16);
    }

    .calendar-day button {
      position: absolute;
      inset: auto 4px 4px 4px;
      min-height: 20px;
      padding: 0;
      font-size: 10px;
      font-weight: 800;
      background: rgba(50, 182, 216, 0.12);
    }

    .rpe-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
    }

    .rpe-button {
      min-height: 42px;
      padding: 7px;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
    }

    .rpe-button.active {
      color: var(--text);
      border-color: color-mix(in srgb, var(--rpe), transparent 40%);
      background: color-mix(in srgb, var(--rpe), transparent 84%);
    }

    .suggestion-card {
      padding: 11px;
      border: 1px solid rgba(47, 199, 121, 0.26);
      border-radius: var(--radius);
      background: rgba(47, 199, 121, 0.08);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .record-grid,
    .muscle-grid,
    .iphone-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .record-card,
    .muscle-row,
    .iphone-card {
      min-width: 0;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.03);
    }

    .record-card strong,
    .iphone-card strong {
      display: block;
      font-size: 14px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .record-card span,
    .iphone-card span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .muscle-row {
      display: grid;
      gap: 7px;
    }

    .muscle-row header {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .phone-widget {
      padding: 14px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.03)),
        #151820;
      box-shadow: var(--shadow);
    }

    .phone-widget strong {
      display: block;
      font-size: 18px;
      line-height: 1.2;
    }

    .phone-widget span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .confetti-layer {
      pointer-events: none;
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 30;
    }

    .confetti-piece {
      position: absolute;
      top: -12px;
      width: 8px;
      height: 14px;
      border-radius: 2px;
      animation: confettiFall 1100ms ease-in forwards;
    }

    @keyframes appEnter {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes detailIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes checkPop {
      0% { transform: scale(0.88); }
      55% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    @keyframes checkGlow {
      0% { box-shadow: 0 0 0 0 rgba(47, 199, 121, 0.28); }
      100% { box-shadow: 0 0 0 12px rgba(47, 199, 121, 0); }
    }

    @keyframes waterRise {
      from { transform: translateY(18px); }
      to { transform: translateY(0); }
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes flamePulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(255, 209, 102, 0)); }
      50% { transform: scale(1.04); filter: drop-shadow(0 0 18px rgba(255, 209, 102, 0.22)); }
    }

    @keyframes confettiFall {
      to { transform: translateY(105vh) rotate(540deg); opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }

    .mini-timer {
      position: fixed;
      left: 50%;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 15;
      width: min(560px, calc(100% - 24px));
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid rgba(50, 182, 216, 0.4);
      border-radius: var(--radius);
      background: rgba(17, 20, 25, 0.96);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      transition: opacity 180ms ease, transform 220ms var(--ease-spring), border-color 180ms ease;
    }

    .mini-timer.is-hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(16px);
    }

    .mini-timer strong {
      display: block;
      font-size: 20px;
      line-height: 1;
      color: var(--cyan);
    }

    .mini-timer span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mini-timer .timer-actions {
      margin: 0;
    }

    .toast strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .toast span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .timer-panel {
        position: static;
      }
    }

    @media (max-width: 720px) {
      .app-shell {
        width: min(100% - 20px, 1180px);
        padding-top: 12px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .month-stat {
        width: 100%;
      }

      .nav-tabs,
      .day-grid {
        grid-template-columns: 1fr;
      }

      .week-grid,
      .library-grid,
      .reward-grid,
      .record-grid,
      .muscle-grid,
      .iphone-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .workout-head {
        grid-template-columns: 1fr;
      }

      .progress-ring {
        width: 74px;
      }

      .detail-grid,
      .stat-grid {
        grid-template-columns: 1fr;
      }

      .set-row {
        grid-template-columns: 34px minmax(0, 1fr) minmax(0, 1fr) 40px;
        gap: 6px;
      }

      .exercise-main {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .chevron {
        display: none;
      }
    }

    @media (max-width: 440px) {
      .reward-grid,
      .record-grid,
      .muscle-grid,
      .iphone-grid {
        grid-template-columns: 1fr;
      }

      .progress-hero {
        grid-template-columns: 1fr;
      }

      .set-row {
        grid-template-columns: 34px 1fr 40px;
        align-items: end;
      }

      .set-row .set-num {
        grid-column: 1;
        grid-row: 1;
      }

      .set-row label:first-of-type {
        grid-column: 2;
        grid-row: 1;
      }

      .set-row label:nth-of-type(2) {
        grid-column: 1 / 4;
        grid-row: 2;
      }

      .set-row .set-check {
        grid-column: 3;
        grid-row: 1;
      }

      .set-row .rep-control {
        grid-template-columns: 40px minmax(0, 1fr) 40px;
      }
    }
  </style>
</head>

    const WARMUP = [
      "5 мин легкое кардио: дорожка, эллипс или велотренажер.",
      "Вращения плечами 10 раз вперед и назад.",
