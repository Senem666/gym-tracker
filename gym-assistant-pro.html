    ];

    const STRETCH = [
      "Грудь у стены: 40 сек на сторону.",
      "Широчайшие у стойки: 40 сек на сторону.",
      "Квадрицепс стоя: 35 сек на сторону.",
      "Задняя поверхность бедра: 40 сек на сторону.",
      "Поза ребенка или мягкое вытяжение спины: 60 сек."
    ];

    let state = loadState();
    let ui = {
      activeTab: "workout",
      expanded: null,
      showWarmup: false,
      showStretch: true,
      celebrating: false,
      hasMounted: false,
      toastTimer: null
    };

    let tickHandle = null;
    let lastReminderToast = "";

    function defaultState() {
      return {
        weekIdx: 0,
        dayIdx: 0,
        logs: {},
        replacements: {},
        ratings: {},
        freezes: {},
        workoutFeeling: {},
        warmupDone: {},
        stretchDone: {},
        completedWorkouts: {},
        daily: {},
        timer: { total: 90, left: 90, running: false, label: "Отдых между подходами" },
        reminder: { enabled: false, nextAt: 0, intervalMin: 20 },
        trainingReminder: { enabled: false, nextAt: 0, hour: 17 }
      };
    }

    function loadState() {
      try {
        return { ...defaultState(), ...(JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}) };
      } catch (error) {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function mutate(updater) {
      updater(state);
      clampIndexes();
      saveState();
      render();
    }

    function clampIndexes() {
      state.weekIdx = Math.max(0, Math.min(PLAN.length - 1, state.weekIdx || 0));
      const days = PLAN[state.weekIdx].days;
      state.dayIdx = Math.max(0, Math.min(days.length - 1, state.dayIdx || 0));
    }

    function currentWeek() {
      return PLAN[state.weekIdx];
    }

    function currentWorkout() {
      return currentWeek().days[state.dayIdx];
    }

    function workoutKey(weekIdx = state.weekIdx, dayIdx = state.dayIdx) {
      return `${PLAN[weekIdx].id}-${PLAN[weekIdx].days[dayIdx].id}`;
    }

    function exerciseKey(weekIdx, dayIdx, exIdx) {
      return `${PLAN[weekIdx].id}-${PLAN[weekIdx].days[dayIdx].id}-e${exIdx}`;
    }

    function setKey(weekIdx, dayIdx, exIdx, setIdx) {
      return `${exerciseKey(weekIdx, dayIdx, exIdx)}-s${setIdx}`;
    }

    function prescribedExercise(weekIdx, dayIdx, exIdx) {
      const item = PLAN[weekIdx].days[dayIdx].exercises[exIdx];
      return { ...EXERCISES[item.id], planId: item.id, sets: item.sets, reps: item.reps, restSec: item.restSec };
    }

    function displayExercise(weekIdx, dayIdx, exIdx) {
      const base = prescribedExercise(weekIdx, dayIdx, exIdx);
      const eKey = exerciseKey(weekIdx, dayIdx, exIdx);
      const altIdx = state.replacements[eKey];
      if (altIdx === undefined) return base;
      const alt = base.alternatives[altIdx];
      if (!alt) return base;
      return {
        ...base,
        ...alt,
        muscles: base.muscles,
        startWeight: alt.startWeight || base.startWeight,
        alternatives: base.alternatives,
        originalName: base.name,
        isReplacement: true
      };
    }

    function getSetLog(weekIdx, dayIdx, exIdx, setIdx) {
      const key = setKey(weekIdx, dayIdx, exIdx, setIdx);
      const exData = prescribedExercise(weekIdx, dayIdx, exIdx);
      const saved = state.logs[key] || {};
      return {
        weight: saved.weight ?? "",
        reps: saved.reps ?? exData.reps,
        done: !!saved.done,
        doneAt: saved.doneAt || "",
        updatedAt: saved.updatedAt || ""
      };
    }

    function setLog(weekIdx, dayIdx, exIdx, setIdx, patch) {
      const key = setKey(weekIdx, dayIdx, exIdx, setIdx);
      state.logs[key] = { ...getSetLog(weekIdx, dayIdx, exIdx, setIdx), ...patch, updatedAt: new Date().toISOString() };
    }

    function exerciseProgress(weekIdx, dayIdx, exIdx) {
      const planItem = PLAN[weekIdx].days[dayIdx].exercises[exIdx];
      let done = 0;
      for (let i = 0; i < planItem.sets; i++) {
        if (getSetLog(weekIdx, dayIdx, exIdx, i).done) done++;
      }
      return { done, total: planItem.sets, complete: done === planItem.sets };
    }

    function workoutProgress(weekIdx = state.weekIdx, dayIdx = state.dayIdx) {
      const day = PLAN[weekIdx].days[dayIdx];
      let doneSets = 0;
      let totalSets = 0;
      let doneExercises = 0;
      day.exercises.forEach((item, exIdx) => {
        const p = exerciseProgress(weekIdx, dayIdx, exIdx);
        doneSets += p.done;
        totalSets += p.total;
        if (p.complete) doneExercises++;
      });
      const pct = totalSets ? Math.round((doneSets / totalSets) * 100) : 0;
      return { doneSets, totalSets, doneExercises, totalExercises: day.exercises.length, pct };
    }

    function weekProgress(weekIdx) {
      let done = 0;
      let total = 0;
      PLAN[weekIdx].days.forEach((day, dayIdx) => {
        const p = workoutProgress(weekIdx, dayIdx);
        done += p.doneSets;
        total += p.totalSets;
      });
      return total ? Math.round((done / total) * 100) : 0;
    }

    function monthId(date = new Date()) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    function dateKey(date = new Date()) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function parseDateKey(key) {
      const [year, month, day] = key.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function addDays(date, amount) {
      const next = new Date(date);
      next.setDate(next.getDate() + amount);
      return next;
    }

    function startOfWeek(date = new Date()) {
      const next = new Date(date);
      const day = next.getDay() || 7;
      next.setHours(0, 0, 0, 0);
      next.setDate(next.getDate() - day + 1);
      return next;
    }

    function endOfWeek(date = new Date()) {
      const start = startOfWeek(date);
      return addDays(start, 6);
    }

    function weekKey(date = new Date()) {
      return dateKey(startOfWeek(date));
    }

    function isScheduledDate(date) {
      return Boolean(SCHEDULE_DAYS[date.getDay()]);
    }

    function completedWorkoutEntries() {
      return Object.entries(state.completedWorkouts)
        .filter(([, item]) => item && item.completedAt)
        .map(([key, item]) => ({ key, ...item }));
    }

    function completionsByDate() {
      const map = {};
      completedWorkoutEntries().forEach(item => {
        const key = item.completedAt.slice(0, 10);
        map[key] = (map[key] || 0) + 1;
      });
      return map;
    }

    function completionsByWeek() {
      const map = {};
      completedWorkoutEntries().forEach(item => {
        const key = weekKey(new Date(item.completedAt));
        map[key] = (map[key] || 0) + 1;
      });
      return map;
    }

    function currentWeekWorkoutCount() {
      return completionsByWeek()[weekKey()] || 0;
    }

    function perfectWeeksThisMonth() {
      const month = monthId();
      const map = completionsByWeek();
      return Object.entries(map).filter(([key, count]) => key.startsWith(month) && count >= 3).length;
    }

    function planStreak() {
      const map = completionsByWeek();
      let cursor = startOfWeek();
      const currentKey = weekKey(cursor);
      const currentComplete = (map[currentKey] || 0) >= 3;
      if (!currentComplete) cursor = addDays(cursor, -7);
      let streak = 0;
      while ((map[weekKey(cursor)] || 0) >= 3) {
        streak++;
        cursor = addDays(cursor, -7);
      }
      return streak;
    }

    function monthCalendar() {
      const now = new Date();
      const first = new Date(now.getFullYear(), now.getMonth(), 1);
      const last = new Date(now.getFullYear(), now.getMonth() + 1, 0);
      const gridStart = startOfWeek(first);
      const completed = completionsByDate();
      const days = [];
      for (let cursor = new Date(gridStart); cursor <= endOfWeek(last); cursor = addDays(cursor, 1)) {
        const key = dateKey(cursor);
        const inMonth = cursor.getMonth() === now.getMonth();
        const scheduled = isScheduledDate(cursor);
        const done = Boolean(completed[key]);
        const frozen = Boolean(state.freezes[key]);
        const isPast = cursor < new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const status = !inMonth ? "out" : done ? "done" : frozen ? "freeze" : scheduled && isPast ? "missed" : scheduled ? "planned" : "rest";
        days.push({ key, date: new Date(cursor), inMonth, scheduled, done, frozen, status, isToday: key === TODAY_KEY });
      }
      return days;
    }

    function freezeUsesThisMonth() {
      const month = monthId();
      return Object.keys(state.freezes).filter(key => key.startsWith(month)).length;
    }

    function missedScheduledDaysThisMonth() {
      return monthCalendar().filter(day => day.inMonth && day.status === "missed").length;
    }

    function allSetEntries() {
      const entries = [];
      PLAN.forEach((week, weekIdx) => {
        week.days.forEach((day, dayIdx) => {
          day.exercises.forEach((item, exIdx) => {
            const exData = prescribedExercise(weekIdx, dayIdx, exIdx);
            for (let setIdx = 0; setIdx < item.sets; setIdx++) {
              entries.push({
                weekIdx,
                dayIdx,
                exIdx,
                setIdx,
                setKey: setKey(weekIdx, dayIdx, exIdx, setIdx),
                exerciseKey: exerciseKey(weekIdx, dayIdx, exIdx),
                exerciseId: item.id,
                exerciseName: exData.name,
                muscles: exData.muscles,
                prescribedReps: item.reps
              });
            }
          });
        });
      });
      return entries;
    }

    function personalRecords() {
      const byExercise = {};
      let bestVolume = { value: 0, label: "пока нет записей" };
      allSetEntries().forEach(entry => {
        const log = state.logs[entry.setKey];
        if (!log || !log.done) return;
        const weight = Number(String(log.weight).replace(",", "."));
        const reps = Number(log.reps);
        if (!Number.isFinite(weight) || !Number.isFinite(reps)) return;
        const volume = weight * reps;
        byExercise[entry.exerciseId] ||= { name: entry.exerciseName, weight: 0, reps: 0, volume: 0 };
        byExercise[entry.exerciseId].weight = Math.max(byExercise[entry.exerciseId].weight, weight);
        byExercise[entry.exerciseId].reps = Math.max(byExercise[entry.exerciseId].reps, reps);
        byExercise[entry.exerciseId].volume += volume;
        if (volume > bestVolume.value) bestVolume = { value: Math.round(volume), label: entry.exerciseName };
      });
      const bestWeight = Object.values(byExercise).sort((a, b) => b.weight - a.weight)[0];
      const bestReps = Object.values(byExercise).sort((a, b) => b.reps - a.reps)[0];
      return { byExercise, bestWeight, bestReps, bestVolume };
    }

    function muscleMapForWeek() {
      const start = startOfWeek();
      const end = addDays(start, 7);
      const result = {};
      allSetEntries().forEach(entry => {
        const log = state.logs[entry.setKey];
        if (!log || !log.done || !log.doneAt) return;
        const doneAt = new Date(log.doneAt);
        if (doneAt < start || doneAt >= end) return;
        result[entry.muscles] ||= { sets: 0, volume: 0 };
        result[entry.muscles].sets++;
        const weight = Number(String(log.weight).replace(",", "."));
        const reps = Number(log.reps);
        if (Number.isFinite(weight) && Number.isFinite(reps)) result[entry.muscles].volume += weight * reps;
      });
      return result;
    }

    function progressionSuggestion(weekIdx, dayIdx, exIdx) {
      const base = prescribedExercise(weekIdx, dayIdx, exIdx);
      const progress = exerciseProgress(weekIdx, dayIdx, exIdx);
      if (!progress.complete) return null;
      const rating = state.ratings[exerciseKey(weekIdx, dayIdx, exIdx)];
      if (rating === "hard" || rating === "pain") return null;
      let totalWeight = 0;
      let count = 0;
      let allRepsMet = true;
      for (let setIdx = 0; setIdx < base.sets; setIdx++) {
        const log = getSetLog(weekIdx, dayIdx, exIdx, setIdx);
        const weight = Number(String(log.weight).replace(",", "."));
        const reps = Number(log.reps);
        if (Number.isFinite(weight)) {
          totalWeight += weight;
          count++;
        }
        if (Number.isFinite(reps) && reps < Number(base.reps)) allRepsMet = false;
      }
      if (!allRepsMet || count === 0) return null;
      const step = base.muscles === "Ноги" ? 5 : 2.5;
      const avg = totalWeight / count;
      return { step, next: Math.round((avg + step) * 10) / 10, rating: rating || "ok" };
    }

    function currentProgressionSuggestions() {
      return currentWorkout().exercises
        .map((_, exIdx) => ({ exIdx, ex: displayExercise(state.weekIdx, state.dayIdx, exIdx), suggestion: progressionSuggestion(state.weekIdx, state.dayIdx, exIdx) }))
        .filter(item => item.suggestion);
    }

    function progressStats() {
      const month = monthStats();
      const streak = planStreak();
      const perfectWeeks = perfectWeeksThisMonth();
      const daily = dailyState();
      const badges = unlockedAchievements(month, daily);
      const xp = month.workouts * 120 + month.sets * 8 + perfectWeeks * 90 + badges.length * 60;
      const level = Math.floor(xp / 500) + 1;
      const levelXp = xp % 500;
      return { month, streak, perfectWeeks, currentWeekCount: currentWeekWorkoutCount(), badges, xp, level, levelXp, nextLevel: 500 - levelXp };
    }

    function unlockedAchievements(month = monthStats(), daily = dailyState()) {
      const unlocked = [];
      if (month.workouts >= 1) unlocked.push("first");
      if (perfectWeeksThisMonth() >= 1) unlocked.push("perfectWeek");
      if (month.workouts >= 8) unlocked.push("month8");
      if (month.volume >= 10000) unlocked.push("volume10k");
      if ((daily.water || 0) >= 6) unlocked.push("hydrated");
      if (month.workouts > 0 && missedScheduledDaysThisMonth() === 0) unlocked.push("noMiss");
      return unlocked;
    }

    function nextWorkoutLabel() {
      const now = new Date();
      for (let offset = 0; offset < 10; offset++) {
        const date = addDays(now, offset);
        if (!isScheduledDate(date)) continue;
        const key = dateKey(date);
        if (completionsByDate()[key]) continue;
        return `${SCHEDULE_DAYS[date.getDay()]} · ${date.toLocaleDateString("ru-RU", { day: "2-digit", month: "short" })}`;
      }
      return "план закрыт";
    }

    function dailyState() {
      if (!state.daily[TODAY_KEY]) {
        state.daily[TODAY_KEY] = { water: 0, preMeal: false, postProtein: false, creatine: false };
      }
      return state.daily[TODAY_KEY];
    }

    function monthStats() {
      const month = monthId();
      const workouts = Object.values(state.completedWorkouts).filter(item => (item.completedAt || "").startsWith(month));
      let sets = 0;
      let volume = 0;
      Object.values(state.logs).forEach(log => {
        if (!log.done || !(log.doneAt || "").startsWith(month)) return;
        sets++;
        const weight = Number(String(log.weight).replace(",", "."));
        const reps = Number(log.reps);
        if (Number.isFinite(weight) && Number.isFinite(reps)) volume += weight * reps;
      });
      return {
        workouts: workouts.length,
        sets,
        volume: Math.round(volume),
        history: workouts.sort((a, b) => (b.completedAt || "").localeCompare(a.completedAt || "")).slice(0, 6)
      };
    }

    function formatTimer(seconds) {
      const safe = Math.max(0, Number(seconds) || 0);
      const m = Math.floor(safe / 60);
      const s = safe % 60;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function formatDateTime(iso) {
      if (!iso) return "";
      const date = new Date(iso);
      return date.toLocaleDateString("ru-RU", { day: "2-digit", month: "short" }) + " " + date.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
    }

    function startTimer(seconds, label) {
      state.timer = { total: seconds, left: seconds, running: true, label };
      saveState();
      ensureTicker();
      updateTimerDom();
    }

    function ensureTicker() {
      if (tickHandle) return;
      tickHandle = setInterval(() => {
        let timerChanged = false;
        let needsRender = false;
        if (state.timer.running && state.timer.left > 0) {
          state.timer.left -= 1;
          timerChanged = true;
          if (state.timer.left === 0) {
            state.timer.running = false;
            showToast("Отдых закончен", "Можно начинать следующий подход.");
          }
        }
        if (state.reminder.enabled && state.reminder.nextAt && Date.now() >= state.reminder.nextAt) {
          const stamp = String(state.reminder.nextAt);
          if (lastReminderToast !== stamp) {
            lastReminderToast = stamp;
            notifyUser("Вода", "Сделай несколько глотков и отметь стакан.");
          }
          state.reminder.nextAt = Date.now() + state.reminder.intervalMin * 60 * 1000;
          needsRender = true;
        }
        if (state.trainingReminder.enabled && state.trainingReminder.nextAt && Date.now() >= state.trainingReminder.nextAt) {
          notifyUser("Через час зал", "Поешь, выпей воды и проверь тренировочную сумку.");
          state.trainingReminder.nextAt = nextTrainingReminderTime(Date.now() + 60 * 1000);
          needsRender = true;
        }
        if (timerChanged || needsRender) {
          saveState();
          updateTimerDom();
          if (needsRender) render();
        }
      }, 1000);
    }

    function updateTimerDom() {
      const timer = state.timer;
      const pct = timer.total ? Math.round((timer.left / timer.total) * 100) : 0;
      const hidden = !timer.running && (timer.left === timer.total || timer.left === 0);
      document.querySelectorAll("[data-timer-time]").forEach(el => {
        el.textContent = formatTimer(timer.left);
      });
      document.querySelectorAll("[data-timer-label]").forEach(el => {
        el.textContent = timer.label || "Отдых между подходами";
      });
      document.querySelectorAll("[data-timer-status]").forEach(el => {
        el.textContent = timer.running ? "идет" : "пауза";
      });
      document.querySelectorAll("[data-timer-circle]").forEach(el => {
        el.style.setProperty("--timer-pct", `${pct}%`);
      });
      document.querySelectorAll("[data-timer-toggle]").forEach(button => {
        button.innerHTML = timer.running ? ICONS.pause : ICONS.play;
        button.title = timer.running ? "Пауза" : "Старт";
      });
      const mini = document.querySelector(".mini-timer");
      if (mini) {
        mini.classList.toggle("is-hidden", hidden);
        mini.setAttribute("aria-hidden", hidden ? "true" : "false");
      }
    }

    function nextTrainingReminderTime(after = Date.now()) {
      const base = new Date(after);
      for (let offset = 0; offset < 21; offset++) {
        const day = addDays(base, offset);
        if (!isScheduledDate(day)) continue;
        const trigger = new Date(day);
        trigger.setHours(Math.max(0, state.trainingReminder.hour - 1), 0, 0, 0);
        if (trigger.getTime() > after) return trigger.getTime();
      }
      return Date.now() + 24 * 60 * 60 * 1000;
    }

    function notifyUser(title, message) {
      showToast(title, message);
      if ("Notification" in window && Notification.permission === "granted") {
        new Notification(title, { body: message });
      }
    }

    function haptic(pattern = 18) {
      if ("vibrate" in navigator) navigator.vibrate(pattern);
    }

    function icon(name) {
      return `<span class="icon" aria-hidden="true">${ICONS[name] || ""}</span>`;
    }

    function escapeAttr(value) {
      return String(value ?? "").replaceAll("&", "&amp;").replaceAll('"', "&quot;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    function escapeHtml(value) {
      return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    function render() {
      const stats = monthStats();
      const progress = progressStats();
      const app = document.getElementById("app");
      app.classList.toggle("motion-settled", ui.hasMounted);
      app.innerHTML = `
        <header class="topbar">
          <div>
            <p class="eyebrow">Full body · тренажерный зал</p>
            <h1>Зал-помощник</h1>
            <p class="top-copy">4 недели, 3 тренировки в неделю, стрик по плану, награды, журнал веса и умный отдых между подходами.</p>
          </div>
          <div class="month-stat">
            <strong>${progress.streak}</strong>
            <span>недель стрика · уровень ${progress.level}</span>
          </div>
        </header>
        <nav class="nav-tabs" aria-label="Разделы">
          ${tabButton("workout", "dumbbell", "Тренировка")}
          ${tabButton("diary", "book", "Журнал")}
          ${tabButton("progress", "flame", "Прогресс")}
          ${tabButton("stats", "chart", "База")}
        </nav>
        ${ui.activeTab === "workout" ? renderWorkoutTab() : ""}
        ${ui.activeTab === "diary" ? renderDiaryTab() : ""}
        ${ui.activeTab === "progress" ? renderProgressTab() : ""}
        ${ui.activeTab === "stats" ? renderStatsTab() : ""}
      `;
      document.getElementById("floating-root").innerHTML = `${renderMiniTimer()}${ui.celebrating ? renderConfetti() : ""}`;
      bindEvents();
      ensureTicker();
      if (!ui.hasMounted) {
        ui.hasMounted = true;
        setTimeout(() => app.classList.add("motion-settled"), 460);
      }
    }

    function tabButton(id, iconName, label) {
      return `<button type="button" class="${ui.activeTab === id ? "active" : ""}" data-action="tab" data-tab="${id}">${icon(iconName)}<span>${label}</span></button>`;
    }

    function renderWorkoutTab() {
      const week = currentWeek();
      const workout = currentWorkout();
      const progress = workoutProgress();
      return `
        <div class="layout">
          <section class="stack">
            <div class="panel">
              <div class="section-title">
                <h2>Неделя</h2>
                <small>${escapeHtml(week.tag)}</small>
              </div>
              <div class="week-grid">
                ${PLAN.map((item, idx) => `
                  <button type="button" class="week-card ${idx === state.weekIdx ? "active" : ""}" data-action="week" data-week="${idx}">
                    <span class="num">${item.week}</span>
                    <span class="label">${escapeHtml(item.label)}</span>
                    <div class="tiny-bar"><span style="width:${weekProgress(idx)}%"></span></div>
                  </button>
                `).join("")}
              </div>
            </div>

            <div class="panel">
              <div class="section-title">
                <h2>День</h2>
                <small>${escapeHtml(workout.schedule)}</small>
              </div>
              <div class="day-grid">
                ${week.days.map((day, idx) => {
                  const p = workoutProgress(state.weekIdx, idx);
                  return `
                    <button type="button" class="day-card ${idx === state.dayIdx ? "active" : ""}" style="--accent:${day.color}" data-action="day" data-day="${idx}">
                      <strong>${day.type}</strong>
                      <span>${escapeHtml(day.typeLabel)}</span>
                      <span>${p.doneExercises}/${p.totalExercises} упр.</span>
                    </button>
                  `;
                }).join("")}
              </div>
            </div>

            <div class="workout-head" style="--accent:${workout.color}; --pct:${progress.pct}%">
              <div>
                <p class="eyebrow">${escapeHtml(workout.schedule)} · тренировка ${escapeHtml(workout.type)}</p>
                <h2>${escapeHtml(workout.focus)}</h2>
                <div class="workout-meta">
                  <span class="pill">${progress.doneExercises}/${progress.totalExercises} упражнений</span>
                  <span class="pill">${progress.doneSets}/${progress.totalSets} подходов</span>
                  <span class="pill">~45 мин</span>
                </div>
              </div>
              <div class="progress-ring" style="--accent:${workout.color}; --pct:${progress.pct}%"><span>${progress.pct}%</span></div>
            </div>

            ${renderWarmup()}

            <section class="stack">
              <div class="section-title">
                <h2>Упражнения</h2>
                <small>веса и повторы сохраняются</small>
              </div>
              ${workout.exercises.map((item, exIdx) => renderExercise(state.weekIdx, state.dayIdx, exIdx)).join("")}
            </section>

            ${renderStretch()}
            ${renderFinish()}
          </section>

          <aside class="stack side-column">
            ${renderTimerPanel()}
            ${renderQuickStats()}
            ${renderNutritionPanel()}
          </aside>
        </div>
      `;
    }

    function renderWarmup() {
      return `
        <section class="panel">
          <button type="button" class="collapsible" data-action="toggle-warmup">
            <span>${icon("dumbbell")}Разминка · 5-7 мин</span>
            <span class="subtle">${ui.showWarmup ? "Скрыть" : "Открыть"}</span>
          </button>
          ${ui.showWarmup ? `
            <div class="check-list" style="margin-top:12px">
              ${WARMUP.map((item, idx) => {
                const key = `${workoutKey()}-warmup-${idx}`;
                const done = !!state.warmupDone[key];
                return `
                  <div class="check-item">
                    <button type="button" class="check-box ${done ? "done" : ""}" data-action="warmup-check" data-key="${key}" title="Отметить">${done ? ICONS.check : ""}</button>
                    <span>${escapeHtml(item)}</span>
                  </div>
                `;
              }).join("")}
            </div>
          ` : ""}
        </section>
      `;
    }

    function renderExercise(weekIdx, dayIdx, exIdx) {
      const exData = displayExercise(weekIdx, dayIdx, exIdx);
      const base = prescribedExercise(weekIdx, dayIdx, exIdx);
      const eKey = exerciseKey(weekIdx, dayIdx, exIdx);
      const progress = exerciseProgress(weekIdx, dayIdx, exIdx);
      const expanded = ui.expanded === eKey;
      const muscleColor = MUSCLE_COLOR[exData.muscles] || "#a5a1a0";
      const repsLabel = exData.reps >= 25 && exData.planId === "plank" ? `${exData.reps} сек` : exData.reps;
      return `
        <article class="exercise ${progress.complete ? "done" : ""}" style="--muscle:${muscleColor}">
          <button type="button" class="exercise-main" data-action="expand" data-key="${eKey}">
            <span class="muscle-dot">${ICONS.dumbbell}</span>
            <span>
              <span class="exercise-name">
                ${escapeHtml(exData.name)}
                ${exData.isReplacement ? `<span class="replacement-badge">замена</span>` : ""}
              </span>
              <span class="exercise-summary">
                <span class="pill" style="color:${muscleColor}">${escapeHtml(exData.muscles)}</span>
                <span class="pill">${base.sets} × ${escapeHtml(repsLabel)}</span>
                <span class="pill">отдых ${formatTimer(base.restSec)}</span>
                <span class="pill">${progress.done}/${progress.total} подходов</span>
              </span>
            </span>
            <span class="chevron">${expanded ? "⌃" : "⌄"}</span>
          </button>
          ${expanded ? renderExerciseDetail(weekIdx, dayIdx, exIdx, exData, base) : ""}
        </article>
      `;
    }

    function renderExerciseDetail(weekIdx, dayIdx, exIdx, exData, base) {
      const eKey = exerciseKey(weekIdx, dayIdx, exIdx);
      return `
        <div class="exercise-detail">
          <div class="detail-grid">
            <div class="metric"><small>Тренажер</small><strong>${escapeHtml(exData.machine)}</strong></div>
            <div class="metric"><small>Стартовый вес</small><strong>${escapeHtml(exData.startWeight)}</strong></div>
            <div class="metric"><small>Отдых</small><strong>${formatTimer(base.restSec)}</strong></div>
          </div>

          <div class="cue-list">
            <div><strong style="color:var(--text)">Техника:</strong> ${escapeHtml(exData.tip)}</div>
            ${exData.cues.map(cue => `<div>• ${escapeHtml(cue)}</div>`).join("")}
          </div>

          <div class="detail-actions">
            <a class="button" href="${escapeAttr(exData.video)}" target="_blank" rel="noreferrer">${icon("video")}Видео / GIF</a>
            <button type="button" data-action="timer-start" data-seconds="${base.restSec}" data-label="${escapeAttr(exData.name)}">${icon("timer")}Таймер отдыха</button>
            ${exData.isReplacement ? `<button type="button" data-action="reset-alt" data-key="${eKey}">${icon("swap")}Вернуть базовое</button>` : ""}
          </div>

          <div>
            <div class="section-title">
              <h3>Подходы</h3>
              <small>вес · повторы · готово</small>
            </div>
            <div class="set-list">
              ${Array.from({ length: base.sets }, (_, setIdx) => renderSetRow(weekIdx, dayIdx, exIdx, setIdx, base, exData)).join("")}
            </div>
          </div>

          ${renderRpeBlock(weekIdx, dayIdx, exIdx)}
          ${renderProgressionBlock(weekIdx, dayIdx, exIdx, exData)}

          <div>
            <div class="section-title">
              <h3>Если занято</h3>
              <small>${exData.alternatives.length} альтернативы</small>
            </div>
            <div class="alt-grid">
              ${exData.alternatives.map((alt, altIdx) => `
                <button type="button" class="alt-button" data-action="choose-alt" data-key="${eKey}" data-alt="${altIdx}">
                  <span>
                    <strong>${escapeHtml(alt.name)}</strong>
                    <span>${escapeHtml(alt.machine)} · ${escapeHtml(alt.tip)}</span>
                  </span>
                  ${icon("swap")}
                </button>
              `).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function renderRpeBlock(weekIdx, dayIdx, exIdx) {
      const eKey = exerciseKey(weekIdx, dayIdx, exIdx);
      const selected = state.ratings[eKey];
      return `
        <div>
          <div class="section-title">
            <h3>Сложность</h3>
            <small>для автопрогрессии</small>
          </div>
          <div class="rpe-grid">
            ${RPE_OPTIONS.map(option => `
              <button type="button" class="rpe-button ${selected === option.id ? "active" : ""}" style="--rpe:${option.color}" data-action="rpe" data-key="${eKey}" data-rpe="${option.id}">
                ${escapeHtml(option.label)}
              </button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderProgressionBlock(weekIdx, dayIdx, exIdx, exData) {
      const suggestion = progressionSuggestion(weekIdx, dayIdx, exIdx);
      if (!suggestion) {
        return `
          <div class="suggestion-card">
            ${icon("target")} Закрой все подходы и отметь сложность. Если было легко или нормально, я предложу следующий вес.
          </div>
        `;
      }
      return `
        <div class="suggestion-card">
          ${icon("sparkles")} Следующий раз попробуй <strong style="color:var(--text)">+${suggestion.step} кг</strong>: ориентир ${suggestion.next} кг на "${escapeHtml(exData.name)}".
        </div>
      `;
    }

    function renderSetRow(weekIdx, dayIdx, exIdx, setIdx, base, exData) {
      const log = getSetLog(weekIdx, dayIdx, exIdx, setIdx);
      return `
        <div class="set-row ${log.done ? "done" : ""}">
          <div class="set-num">${setIdx + 1}</div>
          <label>
            <span class="subtle">кг</span>
            <input type="number" min="0" step="0.5" inputmode="decimal" value="${escapeAttr(log.weight)}" data-action="weight" data-week="${weekIdx}" data-day="${dayIdx}" data-ex="${exIdx}" data-set="${setIdx}" aria-label="Вес, кг">
          </label>
          <label>
            <span class="subtle">${exData.planId === "plank" ? "сек" : "повторы"}</span>
            <span class="rep-control">
              <button type="button" data-action="rep-minus" data-week="${weekIdx}" data-day="${dayIdx}" data-ex="${exIdx}" data-set="${setIdx}" title="Минус">${ICONS.minus}</button>
              <input type="number" min="0" step="1" inputmode="numeric" value="${escapeAttr(log.reps)}" data-action="reps" data-week="${weekIdx}" data-day="${dayIdx}" data-ex="${exIdx}" data-set="${setIdx}" aria-label="Повторы">
              <button type="button" data-action="rep-plus" data-week="${weekIdx}" data-day="${dayIdx}" data-ex="${exIdx}" data-set="${setIdx}" title="Плюс">${ICONS.plus}</button>
            </span>
          </label>
          <button type="button" class="set-check ${log.done ? "done" : ""}" data-action="set-done" data-week="${weekIdx}" data-day="${dayIdx}" data-ex="${exIdx}" data-set="${setIdx}" data-rest="${base.restSec}" data-label="${escapeAttr(exData.name)}" title="Подход готов">${log.done ? ICONS.check : ICONS.timer}</button>
        </div>
      `;
    }

    function renderStretch() {
      const doneCount = STRETCH.filter((_, idx) => state.stretchDone[`${workoutKey()}-stretch-${idx}`]).length;
      return `
        <section class="panel">
          <button type="button" class="collapsible" data-action="toggle-stretch">
            <span>${icon("stretch")}Растяжка · ${doneCount}/${STRETCH.length}</span>
            <span class="subtle">${ui.showStretch ? "Скрыть" : "Открыть"}</span>
          </button>
          ${ui.showStretch ? `
            <div class="check-list" style="margin-top:12px">
              ${STRETCH.map((item, idx) => {
                const key = `${workoutKey()}-stretch-${idx}`;
                const done = !!state.stretchDone[key];
                return `
                  <div class="check-item">
                    <button type="button" class="check-box ${done ? "done" : ""}" data-action="stretch-check" data-key="${key}" title="Отметить">${done ? ICONS.check : ""}</button>
                    <span>${escapeHtml(item)}</span>
                  </div>
                `;
              }).join("")}
            </div>
          ` : ""}
        </section>
      `;
    }

    function renderFinish() {
      const key = workoutKey();
      const progress = workoutProgress();
      const completed = state.completedWorkouts[key];
      const ready = progress.doneSets === progress.totalSets;
      const feeling = state.workoutFeeling[key] || "";
      return `
        <section class="panel">
          <div class="section-title">
            <h2>Финиш тренировки</h2>
            <small>${completed ? formatDateTime(completed.completedAt) : `${progress.doneSets}/${progress.totalSets} подходов`}</small>
          </div>
          <div class="rpe-grid" style="margin-bottom:10px">
            ${[
              ["great", "отлично", "#2fc779"],
              ["ok", "норм", "#32b6d8"],
              ["tired", "устал", "#f3a928"],
              ["pain", "боль", "#ef5350"]
            ].map(([id, label, color]) => `
              <button type="button" class="rpe-button ${feeling === id ? "active" : ""}" style="--rpe:${color}" data-action="feeling" data-key="${key}" data-feeling="${id}">
                ${label}
              </button>
            `).join("")}
          </div>
          <p class="subtle">После сохранения я обновлю стрик, XP, PR и календарь. Если есть боль, следующую тренировку лучше облегчить.</p>
          <button type="button" class="finish-button ${completed ? "complete" : ""}" data-action="finish" ${ready ? "" : "disabled"}>
            ${icon("check")}${completed ? "Тренировка записана" : "Завершить тренировку"}
          </button>
        </section>
      `;
    }

    function renderTimerPanel() {
      const timer = state.timer;
      const pct = timer.total ? Math.round((timer.left / timer.total) * 100) : 0;
      return `
        <section class="panel timer-panel">
          <div class="section-title">
            <h2>${icon("timer")}Таймер отдыха</h2>
            <small data-timer-status>${timer.running ? "идет" : "пауза"}</small>
          </div>
          <div class="timer-face">
            <div class="timer-circle" data-timer-circle style="--timer-pct:${pct}%"><strong data-timer-time>${formatTimer(timer.left)}</strong></div>
            <div>
              <p class="timer-label" data-timer-label>${escapeHtml(timer.label || "Отдых между подходами")}</p>
              <p class="subtle" style="margin-top:8px">Стартует автоматически, когда отмечаешь подход готовым.</p>
            </div>
          </div>
          <div class="timer-actions">
            <button type="button" data-action="timer-toggle" data-timer-toggle title="${timer.running ? "Пауза" : "Старт"}">${timer.running ? ICONS.pause : ICONS.play}</button>
            <button type="button" data-action="timer-add" data-delta="15" title="Добавить 15 секунд">${ICONS.plus}</button>
            <button type="button" data-action="timer-add" data-delta="-15" title="Убрать 15 секунд">${ICONS.minus}</button>
            <button type="button" data-action="timer-reset" title="Сброс">${ICONS.stop}</button>
          </div>
        </section>
      `;
    }

    function renderMiniTimer() {
      const timer = state.timer;
      const hidden = !timer.running && (timer.left === timer.total || timer.left === 0);
      return `
        <aside class="mini-timer ${hidden ? "is-hidden" : ""}" aria-live="polite" aria-hidden="${hidden ? "true" : "false"}">
          <div>
            <strong data-timer-time>${formatTimer(timer.left)}</strong>
            <span data-timer-label>${escapeHtml(timer.label || "Отдых между подходами")}</span>
          </div>
          <div class="timer-actions">
            <button type="button" data-action="timer-toggle" data-timer-toggle title="${timer.running ? "Пауза" : "Старт"}">${timer.running ? ICONS.pause : ICONS.play}</button>
            <button type="button" data-action="timer-reset" title="Сброс">${ICONS.stop}</button>
          </div>
        </aside>
      `;
    }

    function renderQuickStats() {
      const stats = monthStats();
      const progress = workoutProgress();
      const game = progressStats();
      return `
        <section class="panel">
          <div class="section-title">
            <h2>${icon("chart")}Сводка</h2>
            <small>${monthId()}</small>
          </div>
          <div class="stat-grid">
            <div class="stat-tile"><strong>${stats.workouts}</strong><span>тренировок</span></div>
            <div class="stat-tile"><strong>${game.streak}</strong><span>недель стрика</span></div>
            <div class="stat-tile"><strong>${game.level}</strong><span>уровень</span></div>
          </div>
          <div class="tiny-bar" style="height:6px;margin-top:12px"><span style="width:${progress.pct}%"></span></div>
          <p class="subtle" style="margin-top:9px">${progress.pct}% текущей тренировки готово</p>
        </section>
      `;
    }

    function renderNutritionPanel() {
      const daily = dailyState();
      const next = state.reminder.enabled && state.reminder.nextAt ? Math.max(0, Math.ceil((state.reminder.nextAt - Date.now()) / 1000)) : 0;
      return `
        <section class="panel">
          <div class="section-title">
            <h2>${icon("water")}Вода и питание</h2>
            <small>${TODAY_KEY}</small>
          </div>
          <div class="water-meter" aria-label="Стаканы воды">
            ${Array.from({ length: 6 }, (_, idx) => `<span class="water-cup ${idx < daily.water ? "filled" : ""}"></span>`).join("")}
          </div>
          <div class="water-stepper">
            <button type="button" data-action="water-minus" title="Минус стакан">${ICONS.minus}</button>
            <button type="button" data-action="water-plus" title="Плюс стакан">${ICONS.plus}</button>
            <button type="button" data-action="reminder-toggle" class="button" style="width:auto;aspect-ratio:auto;padding:0 10px">${state.reminder.enabled ? "Вода через " + formatTimer(next) : "Напоминать"}</button>
          </div>
          <div style="margin-top:12px">
            ${nutritionCheck("preMeal", "Еда за 1-2 часа до зала")}
            ${nutritionCheck("postProtein", "Белок после тренировки")}
            ${nutritionCheck("creatine", "Вода/креатин/электролиты по плану")}
          </div>
        </section>
      `;
    }

    function nutritionCheck(key, label) {
      const daily = dailyState();
      return `
        <div class="nutrition-row">
          <button type="button" class="check-box ${daily[key] ? "done" : ""}" data-action="nutrition" data-key="${key}" title="Отметить">${daily[key] ? ICONS.check : ""}</button>
          <span>${escapeHtml(label)}</span>
        </div>
      `;
    }

    function renderDiaryTab() {
      const week = currentWeek();
      const workout = currentWorkout();
      return `
        <div class="layout">
          <section class="stack">
            <div class="workout-head" style="--accent:${workout.color}; --pct:${workoutProgress().pct}%">
              <div>
                <p class="eyebrow">Журнал текущей тренировки</p>
                <h2>${escapeHtml(week.label)} · ${escapeHtml(workout.schedule)}</h2>
                <div class="workout-meta">
                  <span class="pill">${escapeHtml(workout.focus)}</span>
                  <span class="pill">${workoutProgress().doneSets}/${workoutProgress().totalSets} подходов</span>
                </div>
              </div>
              <div class="progress-ring" style="--accent:${workout.color}; --pct:${workoutProgress().pct}%"><span>${workoutProgress().pct}%</span></div>
            </div>
            ${workout.exercises.map((item, exIdx) => renderDiaryExercise(state.weekIdx, state.dayIdx, exIdx)).join("")}
          </section>
          <aside class="stack side-column">
            ${renderTimerPanel()}
            ${renderNutritionPanel()}
          </aside>
        </div>
      `;
    }

    function renderDiaryExercise(weekIdx, dayIdx, exIdx) {
      const exData = displayExercise(weekIdx, dayIdx, exIdx);
      const base = prescribedExercise(weekIdx, dayIdx, exIdx);
      return `
        <section class="panel">
          <div class="section-title">
            <h2>${escapeHtml(exData.name)}</h2>
            <small>${base.sets} × ${base.reps}</small>
          </div>
          <div class="set-list">
            ${Array.from({ length: base.sets }, (_, setIdx) => renderSetRow(weekIdx, dayIdx, exIdx, setIdx, base, exData)).join("")}
          </div>
        </section>
      `;
    }

    function renderProgressTab() {
      const progress = progressStats();
      return `
        <div class="layout">
          <section class="stack">
            ${renderProgressHero(progress)}
            ${renderCalendarPanel()}
            ${renderAchievementsPanel(progress)}
            ${renderRecordsPanel()}
            ${renderMuscleMapPanel()}
          </section>
          <aside class="stack side-column">
            ${renderIphonePanel(progress)}
            ${renderExportPanel()}
            ${renderNutritionPanel()}
          </aside>
        </div>
      `;
    }

    function renderProgressHero(progress) {
      return `
        <section class="progress-hero">
          <div>
            <p class="eyebrow">Стрик по плану · 3 тренировки в неделю</p>
            <h2 style="font-size:24px;line-height:1.1">${progress.streak} недель подряд</h2>
            <div class="workout-meta">
              <span class="pill">${progress.currentWeekCount}/3 на этой неделе</span>
              <span class="pill">${progress.perfectWeeks} идеальных недель</span>
              <span class="pill">уровень ${progress.level}</span>
            </div>
            <div class="level-bar"><span style="width:${Math.round((progress.levelXp / 500) * 100)}%"></span></div>
            <p class="subtle" style="margin-top:8px">${progress.xp} XP · до следующего уровня ${progress.nextLevel} XP</p>
          </div>
          <div class="streak-flame">${ICONS.flame}</div>
        </section>
      `;
    }

    function renderCalendarPanel() {
      const days = monthCalendar();
      const freezes = freezeUsesThisMonth();
      return `
        <section class="panel">
          <div class="section-title">
            <h2>${icon("calendar")}Календарь месяца</h2>
            <small>заморозки ${freezes}/2</small>
          </div>
          <div class="calendar-grid">
            ${["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"].map(label => `<div class="calendar-label">${label}</div>`).join("")}
            ${days.map(day => `
              <div class="calendar-day ${day.status} ${day.isToday ? "today" : ""}" title="${day.key}">
                <span style="${day.inMonth ? "" : "opacity:.25"}">${day.date.getDate()}</span>
                ${day.status === "missed" && freezes < 2 ? `<button type="button" data-action="freeze-day" data-date="${day.key}">щит</button>` : ""}
              </div>
            `).join("")}
          </div>
          <p class="subtle" style="margin-top:10px">Зеленый - тренировка закрыта, красный - пропуск по плану, голубой - использована заморозка.</p>
        </section>
      `;
    }

    function renderAchievementsPanel(progress) {
      const unlocked = new Set(progress.badges);
      return `
        <section class="panel">
          <div class="section-title">
            <h2>${icon("trophy")}Награды</h2>
            <small>${unlocked.size}/${ACHIEVEMENTS.length}</small>
          </div>
          <div class="reward-grid">
            ${ACHIEVEMENTS.map(item => `
              <article class="reward-card ${unlocked.has(item.id) ? "unlocked" : ""}">
                <div class="badge-icon">${ICONS[item.icon]}</div>
                <strong>${escapeHtml(item.title)}</strong>
                <span>${escapeHtml(item.desc)}</span>
              </article>
            `).join("")}
          </div>
        </section>
      `;
    }

    function renderRecordsPanel() {
      const records = personalRecords();
      const bestWeight = records.bestWeight;
      const bestReps = records.bestReps;
      return `
        <section class="panel">
          <div class="section-title">
            <h2>${icon("star")}PR-рекорды</h2>
            <small>по журналу</small>
          </div>
          <div class="record-grid">
            <div class="record-card"><strong>${bestWeight ? `${bestWeight.weight} кг` : "0 кг"}</strong><span>${bestWeight ? bestWeight.name : "лучший вес появится после записи"}</span></div>
            <div class="record-card"><strong>${bestReps ? `${bestReps.reps} повторов` : "0 повторов"}</strong><span>${bestReps ? bestReps.name : "лучшие повторы появятся после записи"}</span></div>
            <div class="record-card"><strong>${records.bestVolume.value} кг</strong><span>${records.bestVolume.label} · лучший подход по объему</span></div>
            <div class="record-card"><strong>${Object.keys(records.byExercise).length}</strong><span>упражнений с личными данными</span></div>
          </div>
        </section>
      `;
    }

    function renderMuscleMapPanel() {
      const muscles = muscleMapForWeek();
      const maxSets = Math.max(1, ...Object.values(muscles).map(item => item.sets));
      const ordered = Object.keys(MUSCLE_COLOR);
      return `
        <section class="panel">
          <div class="section-title">
            <h2>${icon("activity")}Muscle map недели</h2>
            <small>${weekKey()}</small>
          </div>
          <div class="muscle-grid">
            ${ordered.map(name => {
              const item = muscles[name] || { sets: 0, volume: 0 };
              const pct = Math.round((item.sets / maxSets) * 100);
              return `
                <div class="muscle-row">
                  <header><span>${escapeHtml(name)}</span><span>${item.sets} сетов</span></header>
                  <div class="tiny-bar"><span style="width:${pct}%;background:${MUSCLE_COLOR[name]}"></span></div>
                  <span class="subtle">${Math.round(item.volume)} кг объема</span>
                </div>
              `;
            }).join("")}
          </div>
        </section>
      `;
    }

    function renderIphonePanel(progress = progressStats()) {
      const workout = currentWorkout();
      const wp = workoutProgress();
      return `
        <section class="panel">
          <div class="section-title">
            <h2>${icon("phone")}iPhone-ready</h2>
            <small>под PWA/native</small>
          </div>
          <div class="phone-widget">
            <strong>${nextWorkoutLabel()}</strong>
            <span>Стрик ${progress.streak} нед. · сегодня ${wp.doneSets}/${wp.totalSets} подходов</span>
          </div>
          <div class="iphone-grid" style="margin-top:10px">
            <div class="iphone-card"><strong>${icon("bell")}Перед залом</strong><span>еда, вода и сумка за час до тренировки</span></div>
            <div class="iphone-card"><strong>${icon("timer")}Live Activity</strong><span>таймер отдыха готов к native-версии</span></div>
            <div class="iphone-card"><strong>${icon("watch")}Apple Watch</strong><span>следующий подход и кнопка готово</span></div>
            <div class="iphone-card"><strong>${icon("shield")}Сохранность</strong><span>сейчас локально + экспорт, далее синк</span></div>
          </div>
          <div class="compact-actions">
            <button type="button" data-action="training-reminder">${state.trainingReminder.enabled ? "Напоминание включено" : "Включить перед залом"}</button>
          </div>
          <p class="subtle" style="margin-top:9px">В web-версии уведомления надежны, пока приложение открыто или установлено как PWA. Постоянные push, Live Activity и Watch сделаем на native-этапе.</p>
        </section>
      `;
    }

    function renderExportPanel() {
      return `
        <section class="panel">
          <div class="section-title">
            <h2>${icon("download")}Экспорт</h2>
            <small>бэкап прогресса</small>
          </div>
          <div class="compact-actions">
            <button type="button" data-action="export-json">${icon("download")}JSON</button>
            <button type="button" data-action="export-csv">${icon("download")}CSV</button>
          </div>
          <p class="subtle" style="margin-top:9px">JSON хранит весь прогресс. CSV удобен для таблиц и анализа весов.</p>
        </section>
      `;
    }

    function renderConfetti() {
      const colors = ["#2fc779", "#ffd166", "#32b6d8", "#ef5350", "#8a72e8"];
      return `
        <div class="confetti-layer">
          ${Array.from({ length: 34 }, (_, idx) => `
            <span class="confetti-piece" style="left:${3 + Math.random() * 94}%;background:${colors[idx % colors.length]};animation-delay:${Math.random() * 220}ms"></span>
          `).join("")}
        </div>
      `;
    }

    function renderStatsTab() {
      const stats = monthStats();
      const libraryItems = Object.entries(EXERCISES);
      return `
        <div class="layout">
          <section class="stack">
            <div class="panel">
              <div class="section-title">
                <h2>Статистика месяца</h2>
                <small>${monthId()}</small>
              </div>
              <div class="stat-grid">
                <div class="stat-tile"><strong>${stats.workouts}</strong><span>тренировок</span></div>
                <div class="stat-tile"><strong>${stats.sets}</strong><span>готовых подходов</span></div>
                <div class="stat-tile"><strong>${stats.volume}</strong><span>кг общего объема</span></div>
              </div>
            </div>

            <div class="panel">
              <div class="section-title">
                <h2>История</h2>
                <small>последние записи</small>
              </div>
              <div class="history-list">
                ${stats.history.length ? stats.history.map(item => `
                  <div class="history-row">
                    <span>
                      <strong>${escapeHtml(item.title)}</strong>
                      <span>${escapeHtml(item.focus)}</span>
                    </span>
                    <span class="pill">${formatDateTime(item.completedAt)}</span>
                  </div>
                `).join("") : `<div class="empty-state">Заверши первую тренировку, и здесь появится история.</div>`}
              </div>
            </div>

            <div class="panel">
              <div class="section-title">
                <h2>Библиотека упражнений</h2>
                <small>${libraryItems.length} вариантов</small>
              </div>
              <div class="library-grid">
                ${libraryItems.map(([id, item]) => `
                  <article class="library-item">
                    <span class="pill" style="color:${MUSCLE_COLOR[item.muscles] || "var(--muted)"}">${escapeHtml(item.muscles)}</span>
                    <h3>${escapeHtml(item.name)}</h3>
                    <p>${escapeHtml(item.tip)}</p>
                    <a class="button" href="${escapeAttr(item.video)}" target="_blank" rel="noreferrer">${icon("video")}Техника</a>
                  </article>
                `).join("")}
              </div>
            </div>
          </section>
          <aside class="stack side-column">
            ${renderQuickStats()}
            ${renderNutritionPanel()}
          </aside>
        </div>
      `;
    }

    function bindEvents() {
      document.querySelectorAll("[data-action]").forEach(el => {
        const action = el.dataset.action;
        if (action === "weight" || action === "reps") {
          el.addEventListener("change", handleInput);
          el.addEventListener("input", handleInput);
        } else {
          el.addEventListener("click", handleAction);
        }
      });
    }

    function handleInput(event) {
      const target = event.currentTarget;
      const weekIdx = Number(target.dataset.week);
      const dayIdx = Number(target.dataset.day);
      const exIdx = Number(target.dataset.ex);
      const setIdx = Number(target.dataset.set);
      mutate(draft => {
        setLog(weekIdx, dayIdx, exIdx, setIdx, { [target.dataset.action === "weight" ? "weight" : "reps"]: target.value });
      });
    }

    function handleAction(event) {
      const target = event.currentTarget;
      const action = target.dataset.action;
      if (action === "tab") {
        ui.activeTab = target.dataset.tab;
        render();
        return;
      }
      if (action === "week") {
        mutate(draft => {
          draft.weekIdx = Number(target.dataset.week);
          draft.dayIdx = 0;
          ui.expanded = null;
        });
        return;
      }
      if (action === "day") {
        mutate(draft => {
          draft.dayIdx = Number(target.dataset.day);
          ui.expanded = null;
        });
        return;
      }
      if (action === "expand") {
        ui.expanded = ui.expanded === target.dataset.key ? null : target.dataset.key;
        render();
        return;
      }
      if (action === "toggle-warmup") {
        ui.showWarmup = !ui.showWarmup;
        render();
        return;
      }
      if (action === "toggle-stretch") {
        ui.showStretch = !ui.showStretch;
        render();
        return;
      }
      if (action === "warmup-check" || action === "stretch-check") {
        const bucket = action === "warmup-check" ? "warmupDone" : "stretchDone";
        mutate(draft => {
          draft[bucket][target.dataset.key] = !draft[bucket][target.dataset.key];
        });
        haptic();
        return;
      }
      if (action === "rpe") {
        mutate(draft => {
          draft.ratings[target.dataset.key] = target.dataset.rpe;
        });
        haptic(12);
        return;
      }
      if (action === "feeling") {
        mutate(draft => {
          draft.workoutFeeling[target.dataset.key] = target.dataset.feeling;
        });
        haptic(12);
        return;
      }
      if (action === "choose-alt") {
        mutate(draft => {
          draft.replacements[target.dataset.key] = Number(target.dataset.alt);
        });
        showToast("Замена выбрана", "Упражнение обновлено, подходы сохранятся в этой тренировке.");
        return;
      }
      if (action === "reset-alt") {
        mutate(draft => {
          delete draft.replacements[target.dataset.key];
        });
        return;
      }
      if (action === "timer-start") {
        startTimer(Number(target.dataset.seconds), target.dataset.label || "Отдых");
        return;
      }
      if (action === "timer-toggle") {
        state.timer.running = !state.timer.running;
        if (state.timer.left <= 0) state.timer.left = state.timer.total || 90;
        saveState();
        ensureTicker();
        updateTimerDom();
        return;
      }
      if (action === "timer-add") {
        const next = Math.max(0, state.timer.left + Number(target.dataset.delta));
        state.timer.left = next;
        state.timer.total = Math.max(state.timer.total, next);
        saveState();
        updateTimerDom();
        return;
      }
      if (action === "timer-reset") {
        state.timer.left = state.timer.total || 90;
        state.timer.running = false;
        saveState();
        updateTimerDom();
        return;
      }
      if (action === "set-done") {
        const weekIdx = Number(target.dataset.week);
        const dayIdx = Number(target.dataset.day);
        const exIdx = Number(target.dataset.ex);
        const setIdx = Number(target.dataset.set);
        const rest = Number(target.dataset.rest);
        const label = target.dataset.label || "Отдых";
        const current = getSetLog(weekIdx, dayIdx, exIdx, setIdx);
        mutate(draft => {
          setLog(weekIdx, dayIdx, exIdx, setIdx, {
            done: !current.done,
            doneAt: current.done ? "" : new Date().toISOString()
          });
        });
        haptic(current.done ? 10 : [16, 35, 16]);
        if (!current.done) startTimer(rest, label);
        return;
      }
      if (action === "rep-minus" || action === "rep-plus") {
        const weekIdx = Number(target.dataset.week);
        const dayIdx = Number(target.dataset.day);
        const exIdx = Number(target.dataset.ex);
        const setIdx = Number(target.dataset.set);
        const current = Number(getSetLog(weekIdx, dayIdx, exIdx, setIdx).reps) || 0;
        mutate(draft => {
          setLog(weekIdx, dayIdx, exIdx, setIdx, { reps: Math.max(0, current + (action === "rep-plus" ? 1 : -1)) });
        });
        return;
      }
      if (action === "water-plus" || action === "water-minus") {
        mutate(draft => {
          const daily = dailyState();
          daily.water = Math.max(0, Math.min(6, daily.water + (action === "water-plus" ? 1 : -1)));
        });
        haptic(10);
        return;
      }
      if (action === "nutrition") {
        mutate(draft => {
          const daily = dailyState();
          daily[target.dataset.key] = !daily[target.dataset.key];
        });
        return;
      }
      if (action === "reminder-toggle") {
        mutate(draft => {
          draft.reminder.enabled = !draft.reminder.enabled;
          draft.reminder.intervalMin = 20;
          draft.reminder.nextAt = draft.reminder.enabled ? Date.now() + draft.reminder.intervalMin * 60 * 1000 : 0;
        });
        if (state.reminder.enabled && "Notification" in window && Notification.permission === "default") {
          Notification.requestPermission().catch(() => {});
        }
        return;
      }
      if (action === "training-reminder") {
        mutate(draft => {
          draft.trainingReminder.enabled = !draft.trainingReminder.enabled;
          draft.trainingReminder.nextAt = draft.trainingReminder.enabled ? nextTrainingReminderTime() : 0;
        });
        if (state.trainingReminder.enabled && "Notification" in window && Notification.permission === "default") {
          Notification.requestPermission().catch(() => {});
        }
        showToast(state.trainingReminder.enabled ? "Напоминание включено" : "Напоминание выключено", state.trainingReminder.enabled ? "Я напомню за час до ближайшей плановой тренировки, если приложение сможет показать уведомление." : "Ок, больше не трогаю перед залом.");
        return;
      }
      if (action === "freeze-day") {
        const key = target.dataset.date;
        if (freezeUsesThisMonth() >= 2) {
          showToast("Лимит freeze", "В этом месяце уже использованы 2 заморозки.");
          return;
        }
        mutate(draft => {
          draft.freezes[key] = { usedAt: new Date().toISOString() };
        });
        showToast("Стрик защищен", "Этот пропуск не будет считаться красным днем.");
        return;
      }
      if (action === "export-json") {
        exportJson();
        return;
      }
      if (action === "export-csv") {
        exportCsv();
        return;
      }
      if (action === "finish") {
        const key = workoutKey();
        const progress = workoutProgress();
        if (progress.doneSets !== progress.totalSets) return;
        if (state.completedWorkouts[key]) {
          showToast("Уже сохранено", "Эта тренировка уже есть в истории.");
          return;
        }
        ui.celebrating = true;
        mutate(draft => {
          const week = currentWeek();
          const day = currentWorkout();
          draft.completedWorkouts[key] = {
            completedAt: new Date().toISOString(),
            title: `Неделя ${week.week}, тренировка ${day.type}`,
            focus: day.focus,
            feeling: draft.workoutFeeling[key] || "",
            xp: 120 + progress.doneSets * 8
          };
        });
        haptic([25, 40, 25]);
        showToast("Тренировка сохранена", `+${120 + progress.doneSets * 8} XP · стрик и PR обновлены.`);
        setTimeout(() => {
          ui.celebrating = false;
          render();
        }, 1200);
      }
    }

    function exportJson() {
      const payload = {
        exportedAt: new Date().toISOString(),
        app: "gym-assistant-pro",
        state
      };
      downloadFile(`gym-progress-${TODAY_KEY}.json`, JSON.stringify(payload, null, 2), "application/json");
      showToast("JSON готов", "Полный бэкап прогресса скачан.");
    }

    function exportCsv() {
      const rows = [["date", "week", "day", "exercise", "muscle", "set", "weight", "reps", "done"]];
      allSetEntries().forEach(entry => {
        const log = state.logs[entry.setKey];
        if (!log) return;
        rows.push([
          log.doneAt || log.updatedAt || "",
          PLAN[entry.weekIdx].week,
          PLAN[entry.weekIdx].days[entry.dayIdx].type,
          entry.exerciseName,
          entry.muscles,
          entry.setIdx + 1,
          log.weight ?? "",
          log.reps ?? "",
          log.done ? "yes" : "no"
        ]);
      });
      const csv = rows.map(row => row.map(cell => `"${String(cell).replaceAll('"', '""')}"`).join(",")).join("\n");
      downloadFile(`gym-progress-${TODAY_KEY}.csv`, csv, "text/csv");
      showToast("CSV готов", "Таблица подходов скачана.");
    }

    function downloadFile(name, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = name;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 500);
    }

    function showToast(title, message) {
      const toast = document.getElementById("toast");
      toast.innerHTML = `<strong>${escapeHtml(title)}</strong><span>${escapeHtml(message)}</span>`;
      toast.classList.add("show");
      clearTimeout(ui.toastTimer);
      ui.toastTimer = setTimeout(() => toast.classList.remove("show"), 4200);
    }

    clampIndexes();
    render();
    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
